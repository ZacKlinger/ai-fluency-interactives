<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What AI carries with it - Module 3 - AI Fluency for K-12 Educators</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300..700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f5;
  --surface:#f0eee6;
  --dark:#141413;
  --muted:rgba(20,20,19,0.42);
  --border:rgba(20,20,19,0.1);
  --coral:#d97757;
  --blue:#6a9bcc;
  --green:#3d6b4f;
  --amber:#9a6e2a;
  --gray:#888780;
  --sans:'DM Sans',Arial,sans-serif;
  --serif:'Source Serif 4',Georgia,serif;
}
html,body{
  min-height:100vh;
  background:var(--bg);
  font-family:var(--sans);
  color:var(--dark);
}

/* Scroll track */
.track{position:relative;height:300vh}
.stage{
  position:sticky;top:0;height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:2rem 1rem;
  width:100%;max-width:820px;margin:0 auto;
}

/* Badge */
.status-badge{
  position:absolute;top:0;right:0;z-index:10;
  font-size:9.5px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;
  background:var(--surface);border:0.5px solid var(--border);color:var(--muted);
  padding:4px 12px;border-radius:0 6px 0 4px;
}

/* Card */
.card{
  background:var(--bg);border:0.5px solid var(--border);border-radius:6px;
  overflow:hidden;color:var(--dark);width:100%;
}
.top-bar{padding:1.75rem 2rem 0;padding-right:8rem}
.eyebrow{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted)}
.title-area{padding:0.75rem 2rem 0}
.headline{
  font-family:var(--serif);font-variation-settings:'opsz' 24;
  font-size:clamp(20px,3.2vw,28px);font-weight:600;color:var(--dark);
  line-height:1.2;margin-bottom:0.25rem;letter-spacing:-0.025em;
}
.subhead{font-size:12px;font-weight:400;color:var(--muted);line-height:1.5}

/* Canvas field */
.field-wrap{
  position:relative;width:100%;height:420px;margin-top:0.5rem;
  cursor:none;background:var(--surface);
  border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border);
  overflow:hidden;
}
canvas{display:block;width:100%;height:100%}

/* Info panel */
.panel{padding:1.25rem 2rem 1.75rem;background:var(--bg);min-height:230px}
.panel-inner{
  display:grid;grid-template-columns:1fr 1.8fr;gap:2rem;
  align-items:start;opacity:0;transition:opacity 0.35s;
}
.panel-inner.show{opacity:1}
.pleft{border-right:0.5px solid var(--border);padding-right:2rem;min-height:175px}
.plabel{
  font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--coral);margin-bottom:0.4rem;display:block;
}
.pname{font-family:var(--sans);font-size:17px;font-weight:600;color:var(--dark);margin-bottom:0.3rem;line-height:1.3;letter-spacing:-0.01em}
.pdesc{font-size:13px;font-weight:400;color:var(--muted);line-height:1.6;margin-bottom:0.75rem}
.pinsight{font-family:var(--serif);font-size:16px;font-weight:400;color:var(--dark);line-height:1.75;margin-bottom:0.65rem}
.panchor{font-family:var(--sans);font-size:12px;font-weight:500;color:var(--coral)}

/* Hint bar */
.hint-bar{
  text-align:center;font-size:11px;font-weight:400;color:var(--muted);
  padding:0.5rem 0 1.25rem;border-top:0.5px solid var(--border);
  background:var(--surface);transition:color 0.5s,opacity 0.5s;
}

@media(max-width:540px){
  .panel-inner{grid-template-columns:1fr}
  .pleft{border-right:none;border-bottom:0.5px solid var(--border);padding-right:0;padding-bottom:1rem;min-height:0}
  .field-wrap{height:340px}
}
</style>
</head>
<body>
<div class="track" id="track">
  <div class="stage">
    <div class="status-badge">Draft &middot; Module 3</div>
    <div class="card">
      <div class="top-bar"><span class="eyebrow">AI Fluency for K&ndash;12 Educators &nbsp;&middot;&nbsp; Module 3</span></div>
      <div class="title-area">
        <h1 class="headline">What AI carries with it.</h1>
        <p class="subhead">Scroll to move between scales. Hover to sit with each one.</p>
      </div>
      <div class="field-wrap" id="field">
        <canvas id="c"></canvas>
      </div>
      <div class="panel">
        <div class="panel-inner" id="pi">
          <div class="pleft">
            <span class="plabel" id="pl"></span>
            <p class="pname" id="pn"></p>
            <p class="pdesc" id="pd"></p>
          </div>
          <div>
            <p class="pinsight" id="pins"></p>
            <span class="panchor" id="panc"></span>
          </div>
        </div>
      </div>
      <div class="hint-bar" id="hint">Scroll to reveal the wider picture.</div>
    </div>
  </div>
</div>
<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var field = document.getElementById('field');
var W = 0, H = 0, dpr = 1;
var mx = -999, my = -999;
var trail = [];
var activeNode = null;
var revealedSet = {};
var smoothP = 0;

/* ── Node data ── */
var MICRO = [
  {
    l1: "What students",
    l2: "leave behind",
    ang: 270,
    name: "Student privacy",
    desc: "Students leave traces in AI tools -- questions asked, mistakes made, thinking still in formation.",
    col: "rgba(106,155,204,",
    insight: "A thirteen-year-old exploring a difficult topic deserves the same confidentiality they would expect in a conversation with you.",
    anchor: "The traces persist."
  },
  {
    l1: "Where student",
    l2: "writing goes",
    ang: 342,
    name: "Children's data & model training",
    desc: "Some models learn from student interactions. Work typed into a tool may become training data without meaningful consent.",
    col: "rgba(196,149,106,",
    insight: "A parent signing off on educational technology may not understand what that consent actually covers.",
    anchor: "Consent is not comprehension."
  },
  {
    l1: "Who has",
    l2: "access",
    ang: 54,
    name: "Equity of access",
    desc: "Not every student goes home to the same tools, the same connectivity, the same support.",
    col: "rgba(154,110,42,",
    insight: "When you assign work that benefits from AI, you are making an assumption about what your students have at home.",
    anchor: "Access shapes outcomes."
  },
  {
    l1: "What you",
    l2: "stand behind",
    ang: 126,
    name: "Teacher accountability",
    desc: "An AI tool can draft a lesson, write feedback, or generate a report. But your name is on it.",
    col: "rgba(61,107,79,",
    insight: "If a parent questions a comment on their child's report card, the answer cannot be that the AI wrote it.",
    anchor: "Your name. Your responsibility."
  },
  {
    l1: "What the",
    l2: "model absorbed",
    ang: 198,
    name: "Bias in training data",
    desc: "AI models learn from the world as it has been written down. That record is uneven.",
    col: "rgba(136,135,128,",
    insight: "When AI generates a story about a scientist, notice who it imagines. That pattern did not come from nowhere.",
    anchor: "The data carries history."
  }
];

var MACRO = [
  {
    l1: "What AI",
    l2: "presents as true",
    ang: 90,
    name: "AI and truth",
    desc: "AI can fabricate facts with total confidence and tell you exactly what you want to hear. Both failures look like helpfulness.",
    col: "rgba(204,107,90,",
    insight: "Hallucination invents. Sycophancy flatters. Neither one will tell you it is doing it. The only safeguard is your own judgment.",
    anchor: "Confidence is not accuracy."
  },
  {
    l1: "What it",
    l2: "costs to run",
    ang: 162,
    name: "Energy consumption",
    desc: "Every query has a physical cost. Data centers draw power, water, and land.",
    col: "rgba(106,155,204,",
    insight: "The convenience of an instant answer sits on top of an infrastructure most users never see and rarely consider.",
    anchor: "Invisible does not mean free."
  },
  {
    l1: "Who builds",
    l2: "the tools",
    ang: 234,
    name: "Power concentration",
    desc: "A small number of companies control the models that millions of people rely on.",
    col: "rgba(154,110,42,",
    insight: "When a few organizations shape the tool that shapes how people think, the question of whose values are embedded is not abstract.",
    anchor: "Tools carry their makers."
  },
  {
    l1: "How fast",
    l2: "things move",
    ang: 306,
    name: "Pace outrunning policy",
    desc: "Technology moves in months. Policy moves in years. In the meantime, your professional judgment is the policy.",
    col: "rgba(61,107,79,",
    insight: "There is no guidebook yet for most of what you will encounter. You are writing the norms as you go.",
    anchor: "You are shaping the norms."
  },
  {
    l1: "What work",
    l2: "looks like now",
    ang: 18,
    name: "Labor displacement",
    desc: "AI is changing what work looks like across industries, including education.",
    col: "rgba(128,160,166,",
    insight: "Your ability to see a student, hold complexity, and make judgment calls -- these are not automatable. But they must be named and valued.",
    anchor: "Name what is human."
  }
];

MICRO.forEach(function(n) { n.ring = 'micro'; n.d4 = 'Micro'; });
MACRO.forEach(function(n) { n.ring = 'macro'; n.d4 = 'Macro'; });
var nodes = MICRO.concat(MACRO);
nodes.forEach(function(n) {
  n.x = 0; n.y = 0; n.tx = 0; n.ty = 0;
  n.r = n.ring === 'macro' ? 30 : 26;
  n.pulse = Math.random() * Math.PI * 2;
  n.vis = n.ring === 'micro' ? 1 : 0;
});

function resize() {
  dpr = window.devicePixelRatio || 1;
  var rect = field.getBoundingClientRect();
  W = rect.width; H = rect.height;
  if (W === 0) W = field.offsetWidth;
  if (H === 0) H = field.offsetHeight;
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  computeTargets(smoothP);
}

function computeTargets(p) {
  var cx = W / 2;
  var cy = H / 2;
  var shortSide = Math.min(W, H);

  /* Micro: comfortable ring at p=0, compressed cluster at center at p=1 */
  var microStartR = shortSide * 0.28;
  var microEndR = shortSide * 0.06;
  var microR = microStartR + (microEndR - microStartR) * p;

  MICRO.forEach(function(n) {
    var rad = n.ang * Math.PI / 180;
    n.tx = cx + Math.cos(rad) * microR;
    n.ty = cy + Math.sin(rad) * microR;
  });

  /* Macro: far outside canvas at p=0, ring at p=1 */
  var macroEndR = shortSide * 0.36;
  var macroR = macroEndR + (1 - p) * shortSide * 1.0;

  MACRO.forEach(function(n) {
    var rad = n.ang * Math.PI / 180;
    n.tx = cx + Math.cos(rad) * macroR;
    n.ty = cy + Math.sin(rad) * macroR;
  });
}

/* Mouse */
field.addEventListener('mousemove', function(e) {
  var r = field.getBoundingClientRect();
  mx = e.clientX - r.left;
  my = e.clientY - r.top;
  trail.push({ x: mx, y: my, a: 1, s: Math.random() * 1.5 + 1 });
  if (trail.length > 48) trail.shift();
});
field.addEventListener('mouseleave', function() { mx = -999; my = -999; });

function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)*(x2-x1) + (y2-y1)*(y2-y1)); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }

function getScrollP() {
  var trackEl = document.getElementById('track');
  var maxS = trackEl.offsetHeight - window.innerHeight;
  return maxS > 0 ? window.scrollY / maxS : 0;
}

function getHov() {
  var isMacroView = smoothP > 0.45;
  var b = null, bd = 9999;
  nodes.forEach(function(n) {
    if (n.vis < 0.3) return;
    if (isMacroView && n.ring === 'micro') return;
    if (!isMacroView && n.ring === 'macro') return;
    var d = dist(mx, my, n.x, n.y);
    if (d < bd) { bd = d; b = n; }
  });
  return b && bd < (b.r + 36) ? b : null;
}

/* ── Draw ── */
function draw() {
  requestAnimationFrame(draw);
  if (W === 0 || H === 0) { resize(); return; }

  var rawP = getScrollP();
  smoothP = lerp(smoothP, rawP, 0.09);
  computeTargets(smoothP);

  /* Visibility */
  var microDim = 1 - clamp(smoothP / 0.5, 0, 1) * 0.65;
  var macroVis = clamp((smoothP - 0.12) / 0.38, 0, 1);

  MICRO.forEach(function(n) { n.vis = microDim; });
  MACRO.forEach(function(n) { n.vis = macroVis; });

  /* Move nodes */
  nodes.forEach(function(n) {
    n.x = lerp(n.x, n.tx, 0.07);
    n.y = lerp(n.y, n.ty, 0.07);
  });

  /* Hint bar */
  var hint = document.getElementById('hint');
  var revCount = Object.keys(revealedSet).length;
  if (revCount >= 10) {
    hint.textContent = 'These are considerations to carry as you go.';
  } else if (revCount > 0) {
    hint.textContent = revCount + ' of 10 explored. Hover to continue.';
  } else if (rawP < 0.1) {
    hint.textContent = 'Scroll to reveal the wider picture.';
  } else {
    hint.textContent = 'Hover any node to explore.';
  }

  ctx.clearRect(0, 0, W, H);

  /* ── Single scope label: crossfade between micro and macro ── */
  var isMacro = smoothP > 0.4;
  var labelText = isMacro ? 'BEYOND YOUR CLASSROOM' : 'IN YOUR CLASSROOM';
  var labelA = isMacro ? clamp((smoothP - 0.4) / 0.2, 0, 0.5) : clamp(1 - smoothP * 2.5, 0, 0.5);

  if (labelA > 0.01) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = '500 10px "DM Sans",Arial,sans-serif';
    ctx.fillStyle = 'rgba(20,20,19,' + labelA + ')';
    drawTrackedText(ctx, labelText, W / 2, 24, 4.5);
    ctx.restore();
  }

  /* Connection lines */
  function drawConns(ring, vis) {
    if (vis < 0.08) return;
    for (var i = 0; i < ring.length; i++) {
      var a = ring[i], b = ring[(i + 1) % ring.length];
      ctx.beginPath();
      ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = 'rgba(20,20,19,' + (0.05 * vis) + ')';
      ctx.lineWidth = 0.5; ctx.stroke();
    }
  }
  drawConns(MICRO, microDim);
  drawConns(MACRO, macroVis);

  /* Cross-ring dashed lines */
  if (microDim > 0.2 && macroVis > 0.15) {
    var crossA = clamp((macroVis - 0.2) / 0.5, 0, 1) * 0.028;
    ctx.setLineDash([2, 6]);
    for (var ci = 0; ci < MICRO.length; ci++) {
      ctx.beginPath();
      ctx.moveTo(MICRO[ci].x, MICRO[ci].y);
      ctx.lineTo(MACRO[ci].x, MACRO[ci].y);
      ctx.strokeStyle = 'rgba(20,20,19,' + crossA + ')';
      ctx.lineWidth = 0.5; ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  /* Trail */
  for (var ti = 0; ti < trail.length; ti++) {
    var tr = trail[ti];
    tr.a *= 0.88;
    if (tr.a < 0.008) continue;
    ctx.beginPath();
    ctx.arc(tr.x, tr.y, tr.s * (ti / trail.length) + 0.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(217,119,87,' + tr.a * 0.25 + ')';
    ctx.fill();
  }

  /* ── Nodes ── */
  var hov = getHov();
  var isMacroView = smoothP > 0.45;

  nodes.forEach(function(n) {
    if (n.vis < 0.01) return;
    /* Skip rendering macro nodes that are far off screen */
    if (n.x < -80 || n.x > W + 80 || n.y < -80 || n.y > H + 80) return;

    var isH = hov === n;
    var wasR = revealedSet[n.l1];

    /* Circle radius: micro shrinks on zoom, macro stays constant */
    var baseR;
    if (n.ring === 'micro') {
      baseR = lerp(26, 8, clamp(smoothP / 0.55, 0, 1));
    } else {
      baseR = 30;
    }
    var tgt = isH ? baseR + 14 : (wasR ? baseR + 5 : baseR);
    n.r = lerp(n.r, tgt, 0.1);
    n.pulse += 0.018;
    var pls = isH ? 0 : Math.sin(n.pulse) * 1.2;
    var vf = n.vis;

    /* Glow */
    if (isH || (wasR && !(n.ring === 'micro' && isMacroView))) {
      var glowR = n.r + (isH ? 24 : 14);
      var grd = ctx.createRadialGradient(n.x, n.y, n.r * 0.3, n.x, n.y, glowR);
      grd.addColorStop(0, n.col + (isH ? 0.22 * vf : 0.06 * vf) + ')');
      grd.addColorStop(1, n.col + '0)');
      ctx.beginPath();
      ctx.arc(n.x, n.y, glowR + pls, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    /* Circle fill */
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r + pls, 0, Math.PI * 2);
    ctx.fillStyle = n.col + (isH ? 0.82 * vf : (wasR ? 0.42 * vf : 0.13 * vf)) + ')';
    ctx.fill();
    ctx.strokeStyle = isH ? 'rgba(20,20,19,' + (0.2 * vf) + ')' : 'rgba(20,20,19,' + (0.055 * vf) + ')';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    /* Labels: fixed 12px. Micro labels hidden in macro view. */
    var canShowLabel = isH || wasR;
    if (n.ring === 'micro' && isMacroView) canShowLabel = false;

    if (canShowLabel) {
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = (isH ? '500 12px' : '400 11px') + ' "DM Sans",Arial,sans-serif';
      ctx.fillStyle = isH ? 'rgba(20,20,19,' + (0.88 * vf) + ')' : 'rgba(20,20,19,' + (0.38 * vf) + ')';
      ctx.fillText(n.name, n.x, n.y);
      if (isH) {
        ctx.font = '600 8.5px "DM Sans",Arial,sans-serif';
        ctx.fillStyle = 'rgba(217,119,87,' + (0.75 * vf) + ')';
        var labelBelow = n.y + n.r + 14;
        var labelAbove = n.y - n.r - 14;
        var labelY = labelBelow > H - 10 ? labelAbove : labelBelow;
        ctx.fillText(n.d4.toUpperCase(), n.x, labelY);
      }
      ctx.restore();
    } else if (n.vis > 0.05) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(20,20,19,' + (0.14 * vf) + ')';
      ctx.fill();
    }
  });

  /* Dashed line to hovered node */
  if (hov) {
    ctx.beginPath();
    ctx.moveTo(mx, my);
    ctx.quadraticCurveTo(
      mx + (hov.x - mx) * 0.3,
      my + (hov.y - my) * 0.3,
      hov.x, hov.y
    );
    ctx.strokeStyle = 'rgba(217,119,87,0.12)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  /* Custom cursor */
  if (mx > 0 && mx < W && my > 0 && my < H) {
    ctx.beginPath();
    ctx.arc(mx, my, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(20,20,19,0.48)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(mx, my, 8, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(20,20,19,0.1)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  /* Panel */
  if (hov && hov !== activeNode) {
    activeNode = hov;
    revealedSet[hov.l1] = true;
    showNode(hov);
  }
}

/* Draw text with manual letter-spacing */
function drawTrackedText(c, text, cx, cy, tracking) {
  var chars = text.split('');
  var widths = chars.map(function(ch) { return c.measureText(ch).width; });
  var total = 0;
  widths.forEach(function(w) { total += w + tracking; });
  total -= tracking;
  var x = cx - total / 2;
  chars.forEach(function(ch, i) {
    c.fillText(ch, x + widths[i] / 2, cy);
    x += widths[i] + tracking;
  });
}

function showNode(n) {
  var env = n.ring === 'micro' ? 'In your classroom' : 'Beyond your classroom';
  document.getElementById('pl').textContent = env;
  document.getElementById('pn').textContent = n.l1 + ' ' + n.l2;
  document.getElementById('pd').textContent = n.desc;
  document.getElementById('pins').textContent = n.insight;
  document.getElementById('panc').textContent = n.anchor;
  var pi = document.getElementById('pi');
  pi.classList.remove('show');
  void pi.offsetWidth;
  pi.classList.add('show');
}

/* Init */
window.addEventListener('load', function() {
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      resize();
      computeTargets(0);
      nodes.forEach(function(n) { n.x = n.tx; n.y = n.ty; });
      draw();
    });
  });
});
window.addEventListener('resize', resize);
if (window.ResizeObserver) {
  new ResizeObserver(function() { resize(); }).observe(field);
}
</script>
</body>
</html>
