<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Stream - Module 3 - AI Fluency for K-12 Educators</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300..700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f5;
  --surface:#f0eee6;
  --dark:#141413;
  --muted:rgba(20,20,19,0.42);
  --border:rgba(20,20,19,0.12);
  --coral:#d97757;
  --sans:'DM Sans',Arial,sans-serif;
  --serif:'Source Serif 4',Georgia,serif
}
html,body{
  height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:var(--sans);
  color:var(--dark)
}

/* ── Header ─────────────────────────────────────────── */
.hdr{
  position:fixed;
  top:0;left:0;right:0;
  height:44px;
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 20px;
  border-bottom:0.5px solid var(--border);
  background:var(--bg);
  z-index:300
}
.hdr-back{
  font-size:17px;
  line-height:1;
  color:var(--muted);
  text-decoration:none;
  padding:4px 2px;
  transition:color 0.15s
}
.hdr-back:hover{color:var(--dark)}
.hdr-label{
  font-size:11px;
  font-weight:500;
  letter-spacing:0.03em;
  color:var(--muted)
}

/* ── Screens ─────────────────────────────────────────── */
.screen{
  position:fixed;
  top:44px;left:0;right:0;bottom:0;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.5s ease
}
.screen.active{opacity:1;pointer-events:auto}

/* ── Screen 1: Entry ─────────────────────────────────── */
.entry{
  text-align:center;
  padding:2rem 1.5rem;
  max-width:520px;
  width:100%
}
.eyebrow{
  font-size:11px;
  font-weight:500;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:2rem
}
.entry h1{
  font-family:var(--sans);
  font-size:clamp(26px,5vw,42px);
  font-weight:500;
  color:var(--dark);
  line-height:1.15;
  letter-spacing:-0.02em;
  margin-bottom:0.9rem
}
.subhead{
  font-family:var(--serif);
  font-size:clamp(15px,2.5vw,19px);
  font-weight:400;
  color:var(--muted);
  line-height:1.6;
  margin-bottom:2.5rem
}
.btn{
  font-family:var(--sans);
  font-size:14px;
  font-weight:500;
  color:var(--bg);
  background:var(--dark);
  border:none;
  border-radius:3px;
  padding:11px 32px;
  cursor:pointer;
  letter-spacing:0.03em;
  transition:opacity 0.15s;
  text-decoration:none;
  display:inline-block
}
.btn:hover{opacity:0.8}
.btn:active{box-shadow:0 0 0 3px rgba(20,20,19,0.18)}

/* ── Screen 2: Stream ────────────────────────────────── */
#s2{
  flex-direction:column;
  align-items:stretch;
  justify-content:stretch
}
#stream-area{
  flex:1;
  position:relative;
  overflow:hidden
}
#kept-strip{
  height:56px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  padding:0 16px;
  gap:8px;
  overflow-x:auto;
  overflow-y:hidden;
  border-top:0.5px solid var(--border);
  scrollbar-width:none
}
#kept-strip::-webkit-scrollbar{display:none}

.frag{
  position:absolute;
  top:50%;
  left:50%;
  max-width:min(580px,88vw);
  width:max-content;
  font-family:var(--serif);
  font-size:clamp(18px,3.5vw,28px);
  font-weight:400;
  color:var(--dark);
  text-align:center;
  line-height:1.45;
  cursor:pointer;
  user-select:none;
  touch-action:manipulation;
  opacity:0;
  will-change:transform,opacity
}
.frag:hover{color:rgba(20,20,19,0.7)}

.pill{
  display:inline-flex;
  align-items:center;
  background:var(--coral);
  color:#fff;
  font-family:var(--sans);
  font-size:11px;
  font-weight:500;
  padding:4px 11px;
  border-radius:20px;
  white-space:nowrap;
  flex-shrink:0;
  transition:opacity 0.25s
}

/* ── Screen 3: Reveal ────────────────────────────────── */
#s3{
  flex-direction:column;
  align-items:stretch;
  justify-content:flex-start
}
#reveal-field{
  flex:1;
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  align-content:center;
  justify-content:center;
  padding:3rem 2.5rem 1.5rem;
  overflow:hidden
}
.rev-chip{
  background:var(--coral);
  color:#fff;
  font-family:var(--sans);
  font-size:13px;
  font-weight:500;
  padding:8px 18px;
  border-radius:24px;
  white-space:nowrap;
  opacity:0;
  transform:translateY(40px);
  transition:opacity 0.5s ease,transform 0.55s cubic-bezier(0.2,0,0.1,1)
}
.rev-chip.up{
  opacity:1;
  transform:translateY(0)
}
#reveal-bottom{
  min-height:160px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0.65rem;
  border-top:0.5px solid var(--border);
  padding:1.5rem 2rem 2rem
}
.r-line1{
  font-family:var(--sans);
  font-size:clamp(14px,2.2vw,18px);
  font-weight:500;
  color:var(--dark);
  text-align:center;
  opacity:0;
  transition:opacity 0.7s ease
}
.r-line2{
  font-family:var(--serif);
  font-size:clamp(13px,2vw,17px);
  color:var(--muted);
  text-align:center;
  margin-bottom:0.75rem;
  opacity:0;
  transition:opacity 0.7s ease
}
.r-show{opacity:1!important}
#exercise-btn{
  opacity:0;
  transition:opacity 0.5s ease
}
#back-link{
  font-family:var(--sans);
  font-size:12px;
  color:var(--muted);
  text-decoration:none;
  opacity:0;
  transition:opacity 0.5s ease
}
#back-link:hover{color:var(--dark)}
</style>
</head>
<body>

<!-- Header -->
<header class="hdr">
  <a href="https://zacklinger.github.io/ai-fluency-interactives/" class="hdr-back" aria-label="Back to course">&larr;</a>
  <span class="hdr-label">AI Fluency for K&ndash;12 Educators &middot; Module 3</span>
</header>

<!-- Screen 1: Entry -->
<div id="s1" class="screen active">
  <div class="entry">
    <p class="eyebrow">Module 3 &middot; Pedagogy, AI &amp; You</p>
    <h1>AI never stops generating.</h1>
    <p class="subhead">Tap anything worth keeping.</p>
    <button class="btn" id="begin-btn">Begin</button>
  </div>
</div>

<!-- Screen 2: Stream -->
<div id="s2" class="screen">
  <div id="stream-area"></div>
  <div id="kept-strip"></div>
</div>

<!-- Screen 3: Reveal -->
<div id="s3" class="screen">
  <div id="reveal-field"></div>
  <div id="reveal-bottom">
    <p class="r-line1" id="r-line1"></p>
    <p class="r-line2" id="r-line2"></p>
    <a href="#exercise" class="btn" id="exercise-btn">Go to the exercise</a>
    <a href="https://zacklinger.github.io/ai-fluency-interactives/" id="back-link">Back to course</a>
  </div>
</div>

<script>
(function() {
'use strict';

/* ── Fragments ── all ASCII, straight apostrophes only ── */
var FRAGS = [
  "Email to a parent about a hard week",
  "Sub plan for Friday",
  "Differentiated reading passage on the water cycle",
  "Feedback on a student's first essay draft",
  "Agenda for Thursday's staff meeting",
  "IEP goal language for a student who struggles with written expression",
  "A letter of recommendation for a student you know well",
  "Unit assessment for the civil rights unit",
  "Reply to a colleague asking for your honest opinion",
  "Vocabulary list for next week's chapter",
  "End-of-quarter comment for a student who surprised you",
  "Lesson plan for a concept you have taught ten times",
  "A message to a student who has been having a rough month",
  "Rubric for the culminating project"
];

/* ── Timing constants (ms) ── */
var FADE_IN   = 400;
var STILL     = 1200;
var DRIFT     = 3000;
var TOTAL     = FADE_IN + STILL + DRIFT;   /* 4600 */
var CYCLE     = 4200;                       /* next frag starts 4200ms after prev; 400ms overlap */
var FADE_START = TOTAL - 600;              /* 4000ms -- begin fade-out 600ms before end */

/* ── DOM refs ── */
var s1         = document.getElementById('s1');
var s2         = document.getElementById('s2');
var s3         = document.getElementById('s3');
var streamArea = document.getElementById('stream-area');
var keptStrip  = document.getElementById('kept-strip');

/* ── State ── */
var caughtTexts  = [];
var activeFrags  = [];
var fragIndex    = 0;
var streamStart  = 0;
var streamRunning = false;
var streamEnded  = false;
var areaH        = 0;

/* ── Ease in-out quadratic ── */
function eio(t) {
  return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
}

/* ── Entry ── */
document.getElementById('begin-btn').addEventListener('click', function() {
  s1.classList.remove('active');
  s2.classList.add('active');
  setTimeout(startStream, 500);
});

/* ── Stream start ── */
function startStream() {
  areaH = streamArea.offsetHeight;
  streamStart = performance.now();
  streamRunning = true;
  requestAnimationFrame(tick);
}

/* ── Main animation loop ── */
function tick(now) {
  if (!streamRunning) return;

  var elapsed = now - streamStart;

  /* launch due fragments */
  while (fragIndex < FRAGS.length && elapsed >= fragIndex * CYCLE) {
    launchFrag(fragIndex, now);
    fragIndex++;
  }

  /* update active fragments */
  for (var i = 0; i < activeFrags.length; i++) {
    var f = activeFrags[i];
    if (!f.done && !f.caught) updateFrag(f, now);
  }

  /* check completion */
  if (fragIndex >= FRAGS.length) {
    var allGone = true;
    for (var j = 0; j < activeFrags.length; j++) {
      if (!activeFrags[j].done) { allGone = false; break; }
    }
    if (allGone && !streamEnded) {
      streamEnded = true;
      streamRunning = false;
      setTimeout(showReveal, 600);
      return;
    }
  }

  requestAnimationFrame(tick);
}

/* ── Launch a fragment element ── */
function launchFrag(index, now) {
  var el = document.createElement('div');
  el.className = 'frag';
  el.textContent = FRAGS[index];
  el.style.transform = 'translate(-50%,-50%)';
  streamArea.appendChild(el);

  var frag = {
    el: el,
    text: FRAGS[index],
    startTime: now,
    caught: false,
    done: false
  };

  /* closure to capture frag reference */
  (function(f) {
    el.addEventListener('click', function() { catchFrag(f); });
  }(frag));

  activeFrags.push(frag);
}

/* ── Update fragment position + opacity ── */
function updateFrag(frag, now) {
  var e  = now - frag.startTime;
  var op, dy;

  if (e < FADE_IN) {
    op = e / FADE_IN;
    dy = 0;
  } else if (e < FADE_IN + STILL) {
    op = 1;
    dy = 0;
  } else if (e < TOTAL) {
    var dp = (e - FADE_IN - STILL) / DRIFT;
    dy = -eio(dp) * areaH * 0.58;
    op = e > FADE_START ? 1 - (e - FADE_START) / 600 : 1;
    if (op < 0) op = 0;
  } else {
    frag.el.remove();
    frag.done = true;
    return;
  }

  frag.el.style.opacity = op;
  frag.el.style.transform = 'translate(-50%,calc(-50% + ' + dy.toFixed(1) + 'px))';
}

/* ── Catch a fragment ── */
function catchFrag(frag) {
  if (frag.caught || frag.done) return;
  frag.caught = true;
  frag.done = true;

  var el = frag.el;
  var rect = el.getBoundingClientRect();
  var stripRect = keptStrip.getBoundingClientRect();
  var stripMidY = stripRect.top + stripRect.height / 2;

  /* create fixed clone for slide-down animation */
  var clone = document.createElement('div');
  clone.style.position = 'fixed';
  clone.style.top = rect.top + 'px';
  clone.style.left = rect.left + 'px';
  clone.style.width = rect.width + 'px';
  clone.style.fontFamily = 'var(--serif)';
  clone.style.fontSize = getComputedStyle(el).fontSize;
  clone.style.fontWeight = '400';
  clone.style.color = 'var(--dark)';
  clone.style.textAlign = 'center';
  clone.style.lineHeight = '1.45';
  clone.style.opacity = '1';
  clone.style.pointerEvents = 'none';
  clone.style.zIndex = '200';
  clone.textContent = frag.text;
  document.body.appendChild(clone);

  el.remove();

  /* animate clone toward strip */
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      clone.style.transition = 'top 0.45s ease-in-out, opacity 0.45s ease-in-out, font-size 0.45s ease-in-out';
      clone.style.top = (stripMidY - 8) + 'px';
      clone.style.opacity = '0';
      clone.style.fontSize = '11px';
    });
  });

  /* add pill to strip */
  caughtTexts.push(frag.text);
  var pill = document.createElement('span');
  pill.className = 'pill';
  pill.textContent = frag.text;
  pill.style.opacity = '0';
  keptStrip.appendChild(pill);
  keptStrip.scrollLeft = keptStrip.scrollWidth;

  setTimeout(function() {
    pill.style.opacity = '1';
    clone.remove();
  }, 450);
}

/* ── Transition to reveal screen ── */
function showReveal() {
  s2.classList.remove('active');
  s3.classList.add('active');
  setTimeout(buildReveal, 300);
}

/* ── Build reveal screen ── */
function buildReveal() {
  var field     = document.getElementById('reveal-field');
  var line1     = document.getElementById('r-line1');
  var line2     = document.getElementById('r-line2');
  var exerciseBtn = document.getElementById('exercise-btn');
  var backLink  = document.getElementById('back-link');
  var n         = caughtTexts.length;

  /* stagger chips rising from bottom */
  if (n > 0) {
    caughtTexts.forEach(function(text, i) {
      var chip = document.createElement('div');
      chip.className = 'rev-chip';
      chip.textContent = text;
      field.appendChild(chip);
      setTimeout(function() {
        chip.classList.add('up');
      }, 60 + i * 90);
    });
    line1.textContent = 'These are the ones you did not let pass.';
    line2.textContent = 'Why these?';
  } else {
    line1.textContent = 'You let everything pass.';
    line2.textContent = 'That is a position too. Why?';
  }

  /* text and button delays -- after chips settle */
  var chipSettle = n > 0 ? 60 + n * 90 : 0;

  setTimeout(function() {
    line1.classList.add('r-show');
  }, chipSettle + 1000);

  setTimeout(function() {
    line2.classList.add('r-show');
  }, chipSettle + 2500);

  setTimeout(function() {
    exerciseBtn.classList.add('r-show');
    backLink.classList.add('r-show');
  }, chipSettle + 4000);
}

}());
</script>
</body>
</html>
