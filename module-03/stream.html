<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Stream - Module 3 - AI Fluency for K-12 Educators</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300..700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf9f5;--surface:#f0eee6;--dark:#141413;--muted:rgba(20,20,19,0.42);--border:rgba(20,20,19,0.1);--coral:#d97757;--sans:'DM Sans',Arial,sans-serif;--serif:'Source Serif 4',Georgia,serif}
html,body{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;font-family:var(--sans);color:var(--dark)}
.stage{width:100%;max-width:720px;position:relative}
.status-badge{position:absolute;top:0;right:0;z-index:10;font-size:9.5px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;background:var(--surface);border:0.5px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:0 6px 0 4px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:6px;overflow:hidden}
.top-bar{padding:1.5rem 2rem 0;padding-right:9rem;display:flex;align-items:center;gap:10px}
.back-arrow{font-size:14px;color:var(--muted);text-decoration:none;flex-shrink:0;transition:color 0.15s;line-height:1}
.back-arrow:hover{color:var(--dark)}
.eyebrow{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted)}

/* ── Three-pane panel ─────────────────────────────────── */
.panel{position:relative;min-height:380px;overflow:hidden}
.pane{
  position:absolute;inset:0;
  opacity:0;pointer-events:none;
  transition:opacity 0.4s ease
}
.pane.active{opacity:1;pointer-events:auto}

/* ── Pane 1: Entry ──────────────────────────────────────  */
#s1b{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:2.5rem 2rem
}
.headline{
  font-family:var(--serif);
  font-variation-settings:'opsz' 24;
  font-size:clamp(20px,3vw,26px);
  font-weight:600;color:var(--dark);
  line-height:1.2;margin-bottom:0.35rem;
  letter-spacing:-0.025em
}
.subhead{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:1.75rem}
.btn{
  font-family:var(--sans);font-size:14px;font-weight:500;
  color:var(--bg);background:var(--dark);
  border:none;border-radius:3px;
  padding:10px 28px;cursor:pointer;
  letter-spacing:0.03em;
  transition:opacity 0.15s;
  text-decoration:none;display:inline-block
}
.btn:hover{opacity:0.8}
.btn:active{box-shadow:0 0 0 3px rgba(20,20,19,0.18)}

/* ── Pane 2: Stream ─────────────────────────────────────  */
#stream-area{
  height:310px;
  position:relative;
  overflow:hidden;
  border-top:0.5px solid var(--border)
}
#kept-strip{
  height:48px;
  display:flex;align-items:center;
  padding:0 16px;gap:8px;
  overflow-x:auto;overflow-y:hidden;
  border-top:0.5px solid var(--border);
  scrollbar-width:none
}
#kept-strip::-webkit-scrollbar{display:none}
.frag{
  position:absolute;top:50%;left:50%;
  max-width:min(520px,88%);
  width:max-content;
  font-family:var(--serif);
  font-size:clamp(16px,2.8vw,22px);
  font-weight:400;color:var(--dark);
  text-align:center;line-height:1.5;
  cursor:pointer;user-select:none;
  touch-action:manipulation;
  opacity:0;will-change:transform,opacity
}
.frag:hover{color:rgba(20,20,19,0.7)}
.pill{
  display:inline-flex;align-items:center;
  background:var(--coral);color:#fff;
  font-family:var(--sans);font-size:11px;font-weight:500;
  padding:4px 11px;border-radius:20px;
  white-space:nowrap;flex-shrink:0;
  transition:opacity 0.25s
}

/* ── Pane 3: Reveal ─────────────────────────────────────  */
#reveal-field{
  min-height:180px;
  display:flex;flex-wrap:wrap;
  gap:10px;align-content:center;justify-content:flex-start;
  padding:2rem 2rem 1.25rem;
  border-top:0.5px solid var(--border)
}
.rev-chip{
  background:var(--coral);color:#fff;
  font-family:var(--sans);font-size:12px;font-weight:500;
  padding:6px 14px;border-radius:20px;
  white-space:nowrap;
  opacity:0;transform:translateY(30px);
  transition:opacity 0.45s ease,transform 0.5s cubic-bezier(0.2,0,0.1,1)
}
.rev-chip.up{opacity:1;transform:translateY(0)}
#reveal-bottom{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0.6rem;
  border-top:0.5px solid var(--border);
  padding:1.5rem 2rem 2rem
}
.r-line1{
  font-family:var(--sans);font-size:15px;font-weight:500;
  color:var(--dark);text-align:center;
  opacity:0;transition:opacity 0.7s ease
}
.r-line2{
  font-family:var(--serif);font-size:14px;
  color:var(--muted);text-align:center;
  margin-bottom:0.5rem;
  opacity:0;transition:opacity 0.7s ease
}
.r-show{opacity:1!important}
#exercise-btn{opacity:0;transition:opacity 0.5s ease}
#back-link{
  font-family:var(--sans);font-size:12px;
  color:var(--muted);text-decoration:none;
  opacity:0;transition:opacity 0.5s ease
}
#back-link:hover{color:var(--dark)}

/* ── Card foot ──────────────────────────────────────────  */
.foot{
  text-align:center;font-size:11px;color:var(--muted);
  padding:0.6rem 0 1rem;background:var(--surface);
  border-top:0.5px solid var(--border)
}
.foot a{color:var(--muted);text-decoration:none}
.foot a:hover{color:var(--dark)}
</style>
</head>
<body>
<div class="stage">
  <span class="status-badge">Draft &middot; Module 3</span>
  <div class="card">

    <div class="top-bar">
      <a href="https://zacklinger.github.io/ai-fluency-interactives/" class="back-arrow" aria-label="Back to course">&larr;</a>
      <span class="eyebrow">AI Fluency for K&ndash;12 Educators &nbsp;&middot;&nbsp; Module 3</span>
    </div>

    <div class="panel">

      <!-- Pane 1: Entry -->
      <div id="s1b" class="pane active">
        <h1 class="headline">AI never stops generating.</h1>
        <p class="subhead">Tap anything worth keeping.</p>
        <button class="btn" id="begin-btn">Begin</button>
      </div>

      <!-- Pane 2: Stream -->
      <div id="s2b" class="pane">
        <div id="stream-area"></div>
        <div id="kept-strip"></div>
      </div>

      <!-- Pane 3: Reveal -->
      <div id="s3b" class="pane">
        <div id="reveal-field"></div>
        <div id="reveal-bottom">
          <p class="r-line1" id="r-line1"></p>
          <p class="r-line2" id="r-line2"></p>
          <a href="#exercise" class="btn" id="exercise-btn">Go to the exercise</a>
          <a href="https://zacklinger.github.io/ai-fluency-interactives/" id="back-link">Back to course</a>
        </div>
      </div>

    </div><!-- /panel -->

    <div class="foot"><a href="https://zacklinger.github.io/ai-fluency-interactives/">&larr; Back to course</a></div>

  </div><!-- /card -->
</div><!-- /stage -->

<script>
(function() {
'use strict';

/* ── Fragments -- ASCII only, straight apostrophes ── */
var FRAGS = [
  "Email to a parent about a hard week",
  "Sub plan for Friday",
  "Differentiated reading passage on the water cycle",
  "Feedback on a student's first essay draft",
  "Agenda for Thursday's staff meeting",
  "IEP goal language for a student who struggles with written expression",
  "A letter of recommendation for a student you know well",
  "Unit assessment for the civil rights unit",
  "Reply to a colleague asking for your honest opinion",
  "Vocabulary list for next week's chapter",
  "End-of-quarter comment for a student who surprised you",
  "Lesson plan for a concept you have taught ten times",
  "A message to a student who has been having a rough month",
  "Rubric for the culminating project"
];

/* ── Timing (ms) ── */
var FADE_IN    = 400;
var STILL      = 1200;
var DRIFT      = 3000;
var TOTAL      = FADE_IN + STILL + DRIFT;  /* 4600 */
var CYCLE      = 4200;                      /* 400ms crossfade overlap */
var FADE_START = TOTAL - 600;              /* 4000 */

/* ── DOM ── */
var s1b        = document.getElementById('s1b');
var s2b        = document.getElementById('s2b');
var s3b        = document.getElementById('s3b');
var streamArea = document.getElementById('stream-area');
var keptStrip  = document.getElementById('kept-strip');

/* ── State ── */
var caughtTexts  = [];
var activeFrags  = [];
var fragIndex    = 0;
var streamStart  = 0;
var streamRunning = false;
var streamEnded  = false;
var areaH        = 0;

function eio(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

/* ── Begin ── */
document.getElementById('begin-btn').addEventListener('click', function() {
  s1b.classList.remove('active');
  s2b.classList.add('active');
  setTimeout(startStream, 450);
});

/* ── Stream ── */
function startStream() {
  areaH = streamArea.offsetHeight;
  streamStart = performance.now();
  streamRunning = true;
  requestAnimationFrame(tick);
}

function tick(now) {
  if (!streamRunning) return;
  var elapsed = now - streamStart;

  while (fragIndex < FRAGS.length && elapsed >= fragIndex * CYCLE) {
    launchFrag(fragIndex, now);
    fragIndex++;
  }

  for (var i = 0; i < activeFrags.length; i++) {
    var f = activeFrags[i];
    if (!f.done && !f.caught) updateFrag(f, now);
  }

  if (fragIndex >= FRAGS.length) {
    var allGone = true;
    for (var j = 0; j < activeFrags.length; j++) {
      if (!activeFrags[j].done) { allGone = false; break; }
    }
    if (allGone && !streamEnded) {
      streamEnded = true;
      streamRunning = false;
      setTimeout(showReveal, 600);
      return;
    }
  }

  requestAnimationFrame(tick);
}

function launchFrag(index, now) {
  var el = document.createElement('div');
  el.className = 'frag';
  el.textContent = FRAGS[index];
  el.style.transform = 'translate(-50%,-50%)';
  streamArea.appendChild(el);

  var frag = { el: el, text: FRAGS[index], startTime: now, caught: false, done: false };
  (function(f) {
    el.addEventListener('click', function() { catchFrag(f); });
  }(frag));
  activeFrags.push(frag);
}

function updateFrag(frag, now) {
  var e = now - frag.startTime;
  var op, dy;

  if (e < FADE_IN) {
    op = e / FADE_IN; dy = 0;
  } else if (e < FADE_IN + STILL) {
    op = 1; dy = 0;
  } else if (e < TOTAL) {
    var dp = (e - FADE_IN - STILL) / DRIFT;
    dy = -eio(dp) * areaH * 0.58;
    op = e > FADE_START ? Math.max(0, 1 - (e - FADE_START) / 600) : 1;
  } else {
    frag.el.remove(); frag.done = true; return;
  }

  frag.el.style.opacity = op;
  frag.el.style.transform = 'translate(-50%,calc(-50% + ' + dy.toFixed(1) + 'px))';
}

/* ── Catch ── */
function catchFrag(frag) {
  if (frag.caught || frag.done) return;
  frag.caught = true;
  frag.done = true;

  var el = frag.el;
  var rect = el.getBoundingClientRect();
  var stripRect = keptStrip.getBoundingClientRect();
  var stripMidY = stripRect.top + stripRect.height / 2;

  /* fixed clone slides toward strip */
  var clone = document.createElement('div');
  clone.style.cssText = [
    'position:fixed',
    'top:' + rect.top + 'px',
    'left:' + rect.left + 'px',
    'width:' + rect.width + 'px',
    'font-family:var(--serif)',
    'font-size:' + getComputedStyle(el).fontSize,
    'font-weight:400',
    'color:var(--dark)',
    'text-align:center',
    'line-height:1.5',
    'pointer-events:none',
    'z-index:200',
    'opacity:1'
  ].join(';');
  clone.textContent = frag.text;
  document.body.appendChild(clone);
  el.remove();

  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      clone.style.transition = 'top 0.42s ease-in-out,opacity 0.42s ease-in-out,font-size 0.42s ease-in-out';
      clone.style.top = (stripMidY - 8) + 'px';
      clone.style.opacity = '0';
      clone.style.fontSize = '11px';
    });
  });

  /* pill in strip */
  caughtTexts.push(frag.text);
  var pill = document.createElement('span');
  pill.className = 'pill';
  pill.textContent = frag.text;
  pill.style.opacity = '0';
  keptStrip.appendChild(pill);
  keptStrip.scrollLeft = keptStrip.scrollWidth;
  setTimeout(function() { pill.style.opacity = '1'; clone.remove(); }, 430);
}

/* ── Reveal ── */
function showReveal() {
  s2b.classList.remove('active');
  s3b.classList.add('active');
  setTimeout(buildReveal, 300);
}

function buildReveal() {
  var field       = document.getElementById('reveal-field');
  var line1       = document.getElementById('r-line1');
  var line2       = document.getElementById('r-line2');
  var exerciseBtn = document.getElementById('exercise-btn');
  var backLink    = document.getElementById('back-link');
  var n           = caughtTexts.length;

  if (n > 0) {
    caughtTexts.forEach(function(text, i) {
      var chip = document.createElement('div');
      chip.className = 'rev-chip';
      chip.textContent = text;
      field.appendChild(chip);
      setTimeout(function() { chip.classList.add('up'); }, 60 + i * 80);
    });
    line1.textContent = 'These are the ones you did not let pass.';
    line2.textContent = 'Why these?';
  } else {
    line1.textContent = 'You let everything pass.';
    line2.textContent = 'That is a position too. Why?';
  }

  var settle = n > 0 ? 60 + n * 80 : 0;
  setTimeout(function() { line1.classList.add('r-show'); }, settle + 1000);
  setTimeout(function() { line2.classList.add('r-show'); }, settle + 2500);
  setTimeout(function() { exerciseBtn.classList.add('r-show'); backLink.classList.add('r-show'); }, settle + 4000);
}

}());
</script>
</body>
</html>
