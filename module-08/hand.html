<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf9f5;--surface:#f0eee6;--dark:#141413;--muted:rgba(20,20,19,0.42);--border:rgba(20,20,19,0.1);--coral:#d97757;--sans:'DM Sans',Arial,sans-serif;--serif:'Source Serif 4',Georgia,serif}
html,body{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;font-family:var(--sans);color:var(--dark)}
.stage{width:100%;max-width:820px;position:relative}
.status-badge{position:absolute;top:0;right:0;z-index:10;font-size:9.5px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;background:var(--surface);border:0.5px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:0 6px 0 4px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:6px;overflow:hidden}
.top-bar{padding:1.75rem 2rem 0;padding-right:8rem}
.eyebrow{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted)}
.title-area{padding:0.75rem 2rem 0.25rem}
.headline{font-family:var(--serif);font-variation-settings:'opsz' 24;font-size:clamp(20px,3.2vw,28px);font-weight:600;color:var(--dark);line-height:1.2;margin-bottom:0.25rem;letter-spacing:-0.025em}
.subhead{font-size:13px;color:var(--muted);line-height:1.5}
.field-wrap{position:relative;background:#07060f;border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border);aspect-ratio:50/41}
canvas{display:block;width:100%;height:100%;cursor:pointer}
.controls{padding:1.25rem 2rem 0.25rem;background:var(--bg)}
.controls-label{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:0.85rem;display:block}
.btn-row{display:flex;gap:0.5rem;flex-wrap:wrap}
.ctx-btn{font-family:var(--sans);font-size:12px;font-weight:500;padding:0.45rem 1rem;border-radius:3px;cursor:pointer;border:0.5px solid var(--border);background:var(--bg);color:var(--muted);transition:background 0.2s,border-color 0.2s,color 0.2s,box-shadow 0.2s,opacity 0.3s;letter-spacing:0.02em;user-select:none}
.ctx-btn:hover{border-color:rgba(217,119,87,0.4);color:var(--dark)}
.ctx-btn.active{background:var(--coral);border-color:var(--coral);color:#fff;box-shadow:0 2px 8px rgba(217,119,87,0.25)}
.ctx-btn.fifth{border-style:dashed;border-color:rgba(217,119,87,0.3);color:rgba(217,119,87,0.45);background:transparent;opacity:0.5;pointer-events:none;cursor:default}
.ctx-btn.fifth.ready{opacity:1;pointer-events:auto;border-color:rgba(217,119,87,0.55);color:rgba(217,119,87,0.9)}
.ctx-btn.fifth.active{border-style:solid;background:var(--coral);color:#fff;opacity:1;box-shadow:0 2px 14px rgba(217,119,87,0.45)}
.panel{padding:1.25rem 2rem 1.75rem;background:var(--bg);height:218px;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
.panel-inner{max-width:680px;margin:0 auto;width:100%;opacity:0;transition:opacity 0.35s}
.panel-inner.show{opacity:1}
.plabel{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--coral);margin-bottom:0.55rem;display:block}
.pinsight{font-family:var(--serif);font-size:16px;font-weight:400;color:var(--dark);line-height:1.7}
.default-hint{font-family:var(--serif);font-size:13px;color:var(--muted);opacity:0.6;text-align:center;transition:opacity 0.35s}
.foot{text-align:center;font-size:11px;font-weight:400;color:var(--muted);padding:0.6rem 0 1rem;border-top:0.5px solid var(--border);background:var(--surface);transition:color 0.4s;letter-spacing:0.02em}
@media(max-width:540px){.panel{height:auto;min-height:220px}}

function vbToNormX(vx){ return 0.202  + vx * 0.001492; }
function vbToNormY(vy){ return 0.0745 + vy * 0.001820; }

// Coarse group assignment by column for a sampled point (viewBox coords).
// Only used to color intermediate outline points; the five fingertip glow
// nodes are force-assigned below regardless of this classification.
function classifyPoint(vx,vy){
  if(vy>200) return 4;
  if(vx>260) return 4;
  if(vx<=135) return 3; // pinky
  if(vx<=185) return 2; // ring
  if(vx<=225) return 1; // middle
  return 0;             // index (135..260)
}

function buildHandFromPath(){
  // The five glow nodes encountered in path order map to the five
  // dimensions: thumb, index, middle, ring, pinky.
  var GLOW_TO_GROUP=[4,0,1,2,3];
  var glowSeen=0;
  var outline=[];
  var labelIdx=[0,0,0,0,0];
  for(var i=0;i<STARS_RAW.length;i++){
    var s=STARS_RAW[i];
    var vx=s[0], vy=s[1], isGlow=(s[2]===1);
    var group;
    if(isGlow){
      group=GLOW_TO_GROUP[glowSeen];
      labelIdx[group]=i;
      glowSeen++;
    } else {
      group=classifyPoint(vx,vy);
    }
    // Entry: [normX, normY, group, isGlow, vbX, vbY]
    outline.push([vbToNormX(vx), vbToNormY(vy), group, isGlow, vx, vy]);
  }
  return {outline:outline, labelIdx:labelIdx};
}

function seedStrays(){
  strayStars=[];
  var step=N/STRAY_COUNT;
  for(var s=0;s<STRAY_COUNT;s++){
    // Sample at regular intervals along the outline, with small t-jitter so
    // the strays feel scattered rather than gridded.
    var t=(s+(Math.random()-0.5)*0.6)*step;
    var tf=Math.floor(t);
    var i0=((tf%N)+N)%N;
    var i1=(i0+1)%N;
    var frac=t-tf;
    var a=OUTLINE_BASE[i0], b=OUTLINE_BASE[i1];
    var baseX=a[0]+(b[0]-a[0])*frac;
    var baseY=a[1]+(b[1]-a[1])*frac;
    // Push stray stars outward slightly (not directly on outline)
    var ang=Math.random()*Math.PI*2;
    var dist=0.010+Math.random()*0.024;
    var ox=baseX+Math.cos(ang)*dist;
    var oy=baseY+Math.sin(ang)*dist*0.85;
    strayStars.push({
      normX:ox,normY:oy,group:a[2],x:0,y:0,
      glow:0,contrib:[0,0,0,0,0],
      baseR:0.7+Math.random()*0.9,
      pulsePhase:Math.random()*Math.PI*2,
      lightDelay:0,activateTime:0
    });
  }
}

// ===========================================================================
// RUNTIME STATE
// ===========================================================================
var activated=[false,false,false,false,false];
var activatedCount=0;
var lastActivated=-1;
var allActive=false;
var revealGlow=0,revealStart=0;
var thumbPulseT=0,thumbPulsing=false;

var hStars=[];
var cLines=[];
var bgStars=[];
var driftParts=[];
var twinkles=[];
var shoots=[];
var nebulaT=Math.random()*100;
var hoveredGroup=-1;
var breathPhase=Math.random()*Math.PI*2;

function buildStars(){
  hStars=[];
  for(var i=0;i<N;i++){
    var ob=OUTLINE_BASE[i];
    var isGlow=ob[3];
    hStars.push({
      x:ob[0]*W, y:ob[1]*H,
      normX:ob[0], normY:ob[1],
      group:ob[2],
      isGlow:isGlow,
      glow:0, contrib:[0,0,0,0,0],
      // Non-glow stars: r=1.2..2.4, varying per star.
      baseR:isGlow?3:(1.2+Math.random()*1.2),
      pulsePhase:Math.random()*Math.PI*2,
      lightDelay:0, activateTime:0
    });
  }
  for(var i=0;i<strayStars.length;i++){
    strayStars[i].x=strayStars[i].normX*W;
    strayStars[i].y=strayStars[i].normY*H;
  }
}

function buildLines(){
  cLines=[];
  // Sequential walk i -> i+1 (and N-1 -> 0), skipping any pair whose
  // viewBox distance exceeds 30px.
  for(var i=0;i<N;i++){
    var j=(i+1)%N;
    var a=OUTLINE_BASE[i], b=OUTLINE_BASE[j];
    var dx=a[4]-b[4], dy=a[5]-b[5];
    if(dx*dx+dy*dy>EDGE_THRESHOLD2) continue;
    cLines.push({a:i,b:j,progress:0,targetProgress:0,active:false,startTime:0,stagger:i*36});
  }
  // Forced bridge edges that exceed the distance threshold but are
  // required for the constellation shape.
  for(var k=0;k<FORCED_EDGES.length;k++){
    var fe=FORCED_EDGES[k];
    cLines.push({a:fe[0],b:fe[1],progress:0,targetProgress:0,active:false,startTime:0,stagger:fe[0]*36});
  }
}

function initBg(){
  bgStars=[];
  for(var i=0;i<620;i++){
    var a=0.08+Math.random()*0.55;
    // Color variation: warm white / cool blue / amber / deep rose / pale violet
    var hue=Math.random();
    var r,g,b;
    if(hue<0.62){r=245+Math.floor(Math.random()*10);g=242+Math.floor(Math.random()*12);b=225+Math.floor(Math.random()*25);}
    else if(hue<0.80){r=200+Math.floor(Math.random()*25);g=218+Math.floor(Math.random()*22);b=250+Math.floor(Math.random()*5);}
    else if(hue<0.92){r=250+Math.floor(Math.random()*5);g=210+Math.floor(Math.random()*22);b=170+Math.floor(Math.random()*30);}
    else if(hue<0.97){r=230+Math.floor(Math.random()*20);g=200+Math.floor(Math.random()*15);b=220+Math.floor(Math.random()*25);}
    else{r=250+Math.floor(Math.random()*5);g=180+Math.floor(Math.random()*30);b=165+Math.floor(Math.random()*25);}
    bgStars.push({x:Math.random()*W,y:Math.random()*H,alpha:a,baseAlpha:a,sz:Math.random()*1.5+0.3,r:r,g:g,b:b,pulse:Math.random()*Math.PI*2,pulseSpeed:0.004+Math.random()*0.010});
  }
  driftParts=[];
  for(var i=0;i<170;i++){
    var ang=Math.random()*Math.PI*2;
    var spd=0.04+Math.random()*0.11;
    var big=Math.random()<0.16;
    driftParts.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
      alpha:big?0.16+Math.random()*0.12:0.04+Math.random()*0.09,
      sz:big?1.1+Math.random()*0.9:0.35+Math.random()*0.7
    });
  }
  twinkles=[];
  for(var i=0;i<6;i++) twinkles.push({idx:-1,t:0,next:0});
  shoots=[{s:null,next:0},{s:null,next:0},{s:null,next:0}];
}

function resize(){
  dpr=window.devicePixelRatio||1;
  var r=wrap.getBoundingClientRect();
  W=r.width;H=Math.round(W*0.82);
  CV.width=Math.round(W*dpr);CV.height=Math.round(H*dpr);
  CV.style.width=W+'px';CV.style.height=H+'px';
  CTX.setTransform(dpr,0,0,dpr,0,0);
  for(var i=0;i<hStars.length;i++){hStars[i].x=hStars[i].normX*W;hStars[i].y=hStars[i].normY*H;}
  for(var i=0;i<strayStars.length;i++){strayStars[i].x=strayStars[i].normX*W;strayStars[i].y=strayStars[i].normY*H;}
  if(bgStars.length>0) initBg();
}

// ===========================================================================
// ACTIVATION - full light for group + random scatter across whole constellation
// ===========================================================================
function shuffleArr(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}}

function activateGroup(gi){
  activated[gi]=true;
  activatedCount=activated.filter(Boolean).length;
  lastActivated=gi;
  var now=performance.now();

  // Full brightness for stars in this group
  for(var i=0;i<N;i++){
    if(hStars[i].group===gi){
      hStars[i].contrib[gi]=0.85+Math.random()*0.15;
      hStars[i].lightDelay=Math.random()*600;
      hStars[i].activateTime=now;
    }
  }
  for(var i=0;i<strayStars.length;i++){
    if(strayStars[i].group===gi){
      strayStars[i].contrib[gi]=0.55+Math.random()*0.30;
      strayStars[i].lightDelay=Math.random()*800;
      strayStars[i].activateTime=now;
    }
  }

  // Random scatter: partial glow anywhere in the constellation
  var others=[];
  for(var i=0;i<N;i++){if(hStars[i].group!==gi)others.push({type:'h',idx:i});}
  for(var i=0;i<strayStars.length;i++){if(strayStars[i].group!==gi)others.push({type:'s',idx:i});}
  shuffleArr(others);
  var scatter=10+Math.floor(Math.random()*8); // 10-17 random stars
  for(var i=0;i<scatter&&i<others.length;i++){
    var o=others[i];
    var arr=o.type==='h'?hStars:strayStars;
    var st=arr[o.idx];
    st.contrib[gi]=0.22+Math.random()*0.32;
    st.lightDelay=Math.random()*750;
    st.activateTime=now;
  }

  if(activatedCount===5){
    allActive=true;
    revealStart=now;
    revealGlow=1;
    thumbPulsing=true;
    thumbPulseT=0;
    for(var i=0;i<N;i++){
      hStars[i].contrib[4]=Math.max(hStars[i].contrib[4],0.92);
      for(var g=0;g<5;g++){if(hStars[i].contrib[g]>0)hStars[i].contrib[g]=Math.max(hStars[i].contrib[g],0.88);}
    }
    for(var i=0;i<strayStars.length;i++){
      strayStars[i].contrib[4]=Math.max(strayStars[i].contrib[4],0.6);
    }
    for(var i=0;i<cLines.length;i++){
      cLines[i].active=true;
      cLines[i].targetProgress=1;
      cLines[i].startTime=now+cLines[i].stagger;
    }
  }
  showInfo(gi);
  updateFoot();
  updateFifth();
}

function deactivateGroup(gi){
  activated[gi]=false;
  activatedCount=activated.filter(Boolean).length;
  for(var i=0;i<N;i++) hStars[i].contrib[gi]=0;
  for(var i=0;i<strayStars.length;i++) strayStars[i].contrib[gi]=0;

  if(allActive){
    allActive=false;revealGlow=0;
    for(var i=0;i<cLines.length;i++){cLines[i].targetProgress=0;cLines[i].active=false;}
    if(activated[4]&&gi!==4){
      activated[4]=false;
      activatedCount=activated.filter(Boolean).length;
      for(var i=0;i<N;i++) hStars[i].contrib[4]=0;
      for(var i=0;i<strayStars.length;i++) strayStars[i].contrib[4]=0;
      var b=document.querySelector('.ctx-btn[data-i="4"]');if(b)b.classList.remove('active');
    }
  }

  if(lastActivated===gi){
    lastActivated=-1;
    for(var g=4;g>=0;g--){if(activated[g]){lastActivated=g;break;}}
  }
  showLastOrDefault();
  updateFoot();
  updateFifth();
}

function updateFifth(){
  var ok=activated[0]&&activated[1]&&activated[2]&&activated[3];
  if(ok)fifthBtn.classList.add('ready');else fifthBtn.classList.remove('ready');
}

function updateFoot(){
  var mi=allActive?5:activatedCount;
  footEl.textContent=footMsgs[mi];
  footEl.style.color=mi>=5?'rgba(20,20,19,0.72)':mi>=3?'rgba(20,20,19,0.55)':'rgba(20,20,19,0.42)';
}

// ===========================================================================
// DRAWING
// ===========================================================================
function drawBg(){
  // Base sky gradient - deep indigo crown, warmer floor
  var baseGrad=CTX.createLinearGradient(0,0,0,H);
  baseGrad.addColorStop(0,'#05040d');
  baseGrad.addColorStop(0.55,'#0a0812');
  baseGrad.addColorStop(1,'#100a10');
  CTX.fillStyle=baseGrad;CTX.fillRect(0,0,W,H);

  // Nebula 1 - violet, upper left, drifts slowly
  var nbA=0.034+Math.sin(nebulaT*0.12)*0.010;
  if(nbA>0.002){
    var cx=W*(0.30+Math.sin(nebulaT*0.07)*0.08);
    var cy=H*(0.38+Math.cos(nebulaT*0.055)*0.07);
    var gr=CTX.createRadialGradient(cx,cy,0,cx,cy,W*0.78);
    gr.addColorStop(0,'rgba(100,80,150,'+nbA+')');
    gr.addColorStop(0.42,'rgba(60,55,115,'+nbA*0.55+')');
    gr.addColorStop(1,'rgba(10,8,25,0)');
    CTX.fillStyle=gr;CTX.fillRect(0,0,W,H);
  }
  // Nebula 2 - warm rose, lower right
  var nb2A=0.028+Math.cos(nebulaT*0.09)*0.008;
  if(nb2A>0.002){
    var cx2=W*(0.74+Math.cos(nebulaT*0.06)*0.08);
    var cy2=H*(0.66+Math.sin(nebulaT*0.08)*0.06);
    var gr2=CTX.createRadialGradient(cx2,cy2,0,cx2,cy2,W*0.60);
    gr2.addColorStop(0,'rgba(150,85,110,'+nb2A+')');
    gr2.addColorStop(0.5,'rgba(90,45,75,'+nb2A*0.45+')');
    gr2.addColorStop(1,'rgba(20,8,20,0)');
    CTX.fillStyle=gr2;CTX.fillRect(0,0,W,H);
  }
  // Nebula 3 - cool teal, upper right (new depth layer)
  var nb3A=0.020+Math.sin(nebulaT*0.11+1.7)*0.007;
  if(nb3A>0.002){
    var cx3=W*(0.64+Math.sin(nebulaT*0.05)*0.06);
    var cy3=H*(0.18+Math.cos(nebulaT*0.07)*0.05);
    var gr3=CTX.createRadialGradient(cx3,cy3,0,cx3,cy3,W*0.48);
    gr3.addColorStop(0,'rgba(60,115,140,'+nb3A+')');
    gr3.addColorStop(1,'rgba(10,30,45,0)');
    CTX.fillStyle=gr3;CTX.fillRect(0,0,W,H);
  }

  // Milky Way - a soft diagonal band of dust and light
  CTX.save();
  CTX.translate(W*0.50,H*0.50);
  CTX.rotate(-0.42);
  var mwA=0.038+Math.sin(nebulaT*0.06)*0.010;
  var mwGrad=CTX.createLinearGradient(0,-H*0.28,0,H*0.28);
  mwGrad.addColorStop(0,'rgba(70,60,105,0)');
  mwGrad.addColorStop(0.38,'rgba(95,82,135,'+mwA*0.75+')');
  mwGrad.addColorStop(0.50,'rgba(130,110,160,'+mwA+')');
  mwGrad.addColorStop(0.62,'rgba(95,82,135,'+mwA*0.75+')');
  mwGrad.addColorStop(1,'rgba(70,60,105,0)');
  CTX.fillStyle=mwGrad;
  CTX.fillRect(-W,-H*0.28,W*2,H*0.56);
  CTX.restore();

  var breathAlpha=Math.sin(tick*0.8+breathPhase)*0.010+0.012;
  if(breathAlpha>0.001){CTX.fillStyle='rgba(255,250,235,'+breathAlpha+')';CTX.fillRect(0,0,W,H);}

  for(var i=0;i<bgStars.length;i++){
    var s=bgStars[i];
    s.pulse+=s.pulseSpeed;
    var pulseMod=Math.sin(s.pulse)*0.18;
    var a=s.alpha+pulseMod+(allActive?revealGlow*0.25:0);
    if(a<0.01)continue;
    CTX.fillStyle='rgba('+s.r+','+s.g+','+s.b+','+Math.min(1,a)+')';
    CTX.beginPath();CTX.arc(s.x,s.y,s.sz,0,Math.PI*2);CTX.fill();
  }
  for(var i=0;i<driftParts.length;i++){
    var p=driftParts[i];
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    var a=p.alpha+(allActive?revealGlow*0.08:0);
    CTX.fillStyle='rgba(255,252,240,'+a+')';
    CTX.beginPath();CTX.arc(p.x,p.y,p.sz,0,Math.PI*2);CTX.fill();
  }

  // Vignette - subtle darkening at the edges for depth
  var vig=CTX.createRadialGradient(W*0.50,H*0.50,W*0.28,W*0.50,H*0.50,W*0.80);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(0.7,'rgba(0,0,0,0.18)');
  vig.addColorStop(1,'rgba(0,0,0,0.42)');
  CTX.fillStyle=vig;CTX.fillRect(0,0,W,H);
}

function drawLines(){
  var now=performance.now();
  for(var i=0;i<cLines.length;i++){
    var l=cLines[i];
    if(l.active){
      var elapsed=now-l.startTime;
      if(elapsed>0){var tgt=Math.min(1,elapsed/420);l.progress+=(tgt-l.progress)*0.10;}
    } else {
      l.progress+=(0-l.progress)*0.07;
    }
    if(l.progress<0.005)continue;
    var sa=hStars[l.a],sb=hStars[l.b];
    var ex=sa.x+(sb.x-sa.x)*l.progress;
    var ey=sa.y+(sb.y-sa.y)*l.progress;
    var alpha=0.45*l.progress+revealGlow*0.10;
    CTX.strokeStyle='rgba(255,255,255,'+alpha+')';
    CTX.lineWidth=0.7;
    CTX.beginPath();CTX.moveTo(sa.x,sa.y);CTX.lineTo(ex,ey);CTX.stroke();
  }
}

function drawPalmLines(){
  var target=activatedCount>0?0.22:0;
  palmLineAlpha+=(target-palmLineAlpha)*0.04;
  if(palmLineAlpha<0.004)return;
  CTX.save();
  CTX.strokeStyle='rgba(255,255,255,'+palmLineAlpha+')';
  CTX.lineWidth=0.8;
  for(var i=0;i<PALM_LINES.length;i++){
    var p=PALM_LINES[i];
    CTX.beginPath();
    CTX.moveTo(vbToNormX(p[0][0])*W, vbToNormY(p[0][1])*H);
    CTX.bezierCurveTo(
      vbToNormX(p[1][0])*W, vbToNormY(p[1][1])*H,
      vbToNormX(p[2][0])*W, vbToNormY(p[2][1])*H,
      vbToNormX(p[3][0])*W, vbToNormY(p[3][1])*H
    );
    CTX.stroke();
  }
  CTX.restore();
}

function updateStarGlow(s,now){
  var target=Math.max(s.contrib[0],s.contrib[1],s.contrib[2],s.contrib[3],s.contrib[4]);
  if(target>0&&s.activateTime>0){
    var elapsed=now-s.activateTime;
    if(elapsed<s.lightDelay){s.glow+=(s.glow*0.97-s.glow)*0.04;}
    else{s.glow+=(target-s.glow)*0.045;}
  } else {
    s.glow+=(target-s.glow)*0.05;
  }
}

function drawStar(x,y,glow,baseR,pulsePhase,isHovered,isGlow){
  // Layered halo for glow nodes: r=14/0.05, r=9/0.09, r=5/0.13
  if(isGlow){
    CTX.fillStyle='rgba(255,255,240,0.05)';
    CTX.beginPath();CTX.arc(x,y,14,0,Math.PI*2);CTX.fill();
    CTX.fillStyle='rgba(255,255,240,0.09)';
    CTX.beginPath();CTX.arc(x,y,9,0,Math.PI*2);CTX.fill();
    CTX.fillStyle='rgba(255,255,240,0.13)';
    CTX.beginPath();CTX.arc(x,y,5,0,Math.PI*2);CTX.fill();
  }
  var breath=allActive?Math.sin(tick*1.3+pulsePhase)*0.08:0;
  var shimmer=glow>0.2?Math.sin(tick*4.0+pulsePhase)*0.06:0;
  var r=baseR*(1+breath+shimmer);
  if(isHovered) r*=1.35;
  var glowVal=glow+(isHovered?0.28:0)+(allActive?revealGlow*0.14:0);
  if(glowVal>0.04){
    var gr=CTX.createRadialGradient(x,y,r*0.3,x,y,r*5.5+(isHovered?6:0));
    gr.addColorStop(0,'rgba(255,255,220,'+glowVal*0.40+')');
    gr.addColorStop(0.35,'rgba(255,240,200,'+glowVal*0.15+')');
    gr.addColorStop(1,'rgba(255,230,180,0)');
    CTX.fillStyle=gr;
    CTX.beginPath();CTX.arc(x,y,r*5.5+(isHovered?6:0),0,Math.PI*2);CTX.fill();
  }
  // Core: glow nodes are r=3 op 0.95; other stars are r=baseR op 0.88.
  if(isGlow){
    CTX.fillStyle='rgba(255,255,240,0.95)';
    CTX.beginPath();CTX.arc(x,y,3,0,Math.PI*2);CTX.fill();
  } else {
    CTX.fillStyle='rgba(255,255,240,0.88)';
    CTX.beginPath();CTX.arc(x,y,Math.max(0.4,r),0,Math.PI*2);CTX.fill();
  }
}

function drawHandStars(){
  var now=performance.now();
  for(var i=0;i<N;i++){
    var s=hStars[i];
    updateStarGlow(s,now);
    var isH=hoveredGroup>=0&&s.group===hoveredGroup;
    drawStar(s.x,s.y,s.glow,s.baseR,s.pulsePhase,isH,s.isGlow);
  }
  for(var i=0;i<strayStars.length;i++){
    var s=strayStars[i];
    updateStarGlow(s,now);
    var isH=hoveredGroup>=0&&s.group===hoveredGroup;
    drawStar(s.x,s.y,s.glow,s.baseR,s.pulsePhase,isH,false);
  }
}

// Faint ghost outline of the raw hand path. Drawn behind constellation
// lines so the overall hand silhouette is hinted at all times.
function drawOutlinePath(){
  if(!HAND_PATH2D) return;
  CTX.save();
  CTX.translate(0.202*W, 0.0745*H);
  CTX.scale(0.001492*W, 0.001820*H);
  CTX.fillStyle='rgba(255,255,255,0.02)';
  CTX.fill(HAND_PATH2D);
  CTX.lineWidth=0.5;
  CTX.strokeStyle='rgba(255,255,255,0.07)';
  CTX.stroke(HAND_PATH2D);
  CTX.restore();
}

// ===========================================================================
// LABELS - staggered with leader lines so they never collide
// ===========================================================================
// Offsets are in pixels relative to the tip star. Heights staggered.
// DILIGENCE(pinky/g3): left-outward, DISCERNMENT(ring/g2): up-left tier,
// DESCRIPTION(mid/g1): highest, DELEGATION(idx/g0): up-right tier,
// DOMAIN EXPERTISE(thumb/g4): right of thumb.
var LABEL_OFFSETS=[
  {dx: 26, dy:-38, align:'left'},   // 0 DELEGATION (index) upper-right
  {dx:  0, dy:-52, align:'center'}, // 1 DESCRIPTION (middle) highest above
  {dx:-26, dy:-34, align:'right'},  // 2 DISCERNMENT (ring) upper-left
  {dx:-44, dy:-10, align:'right'},  // 3 DILIGENCE (pinky) left
  {dx: 22, dy:  4, align:'left'}    // 4 DOMAIN EXPERTISE (thumb) right
];

function measureLabel(txt,spacing){
  var w=0;
  for(var c=0;c<txt.length;c++) w+=CTX.measureText(txt.charAt(c)).width+spacing;
  return w-spacing;
}

function drawLabels(){
  CTX.save();
  CTX.font='500 10.5px "DM Sans",Arial,sans-serif';
  var spacing=1.2;
  for(var gi=0;gi<5;gi++){
    if(!activated[gi])continue;
    var s=hStars[LABEL_IDX[gi]];
    var la=Math.min(1,s.glow*1.5);
    if(la<0.04)continue;
    var lbl=NODE_DATA[gi].label;
    var off=LABEL_OFFSETS[gi];
    var tw=measureLabel(lbl,spacing);
    var anchorX=s.x+off.dx, anchorY=s.y+off.dy;
    var lx;
    if(off.align==='center') lx=anchorX-tw/2;
    else if(off.align==='right') lx=anchorX-tw;
    else lx=anchorX;
    var ly=anchorY;

    // Leader line from star to label anchor (clean thin line)
    CTX.strokeStyle='rgba(255,255,255,'+la*0.22+')';
    CTX.lineWidth=0.5;
    CTX.beginPath();
    CTX.moveTo(s.x,s.y);
    CTX.lineTo(anchorX + (off.align==='center'?0:(off.align==='right'?-2:2)), anchorY+3);
    CTX.stroke();

    // Text (letter-spaced)
    CTX.fillStyle='rgba(255,255,255,'+la+')';
    var cx=lx;
    for(var c=0;c<lbl.length;c++){
      var ch=lbl.charAt(c);
      CTX.fillText(ch,cx,ly);
      cx+=CTX.measureText(ch).width+spacing;
    }
  }
  CTX.restore();
}

function drawThumbPulse(){
  if(!thumbPulsing)return;
  thumbPulseT+=0.012;
  if(thumbPulseT>1.0){thumbPulsing=false;return;}
  var f=thumbPulseT;
  var radius=18+f*80;
  var alpha=(1-f)*(1-f)*0.38;
  var s=hStars[LABEL_IDX[4]];
  var gr=CTX.createRadialGradient(s.x,s.y,0,s.x,s.y,radius);
  gr.addColorStop(0,'rgba(255,235,200,'+alpha+')');
  gr.addColorStop(0.5,'rgba(255,220,170,'+alpha*0.35+')');
  gr.addColorStop(1,'rgba(255,200,140,0)');
  CTX.fillStyle=gr;
  CTX.beginPath();CTX.arc(s.x,s.y,radius,0,Math.PI*2);CTX.fill();
}

function drawRevealGlow(){
  if(revealGlow<0.01)return;
  var cx=W*0.48,cy=H*0.55;
  var gr=CTX.createRadialGradient(cx,cy,0,cx,cy,W*0.45);
  gr.addColorStop(0,'rgba(255,230,180,'+revealGlow*0.12+')');
  gr.addColorStop(0.5,'rgba(255,210,150,'+revealGlow*0.05+')');
  gr.addColorStop(1,'rgba(255,200,130,0)');
  CTX.fillStyle=gr;
  CTX.fillRect(0,0,W,H);
}

// ===========================================================================
// LIVELIER BACKGROUND EVENTS
// ===========================================================================
function updateTwinkles(){
  var now=performance.now()/1000;
  var base=allActive?0.8:1.3;
  for(var t=0;t<twinkles.length;t++){
    var tw=twinkles[t];
    if(tw.idx>=0){
      tw.t+=0.06;
      var s=bgStars[tw.idx];
      if(s){
        if(tw.t<1) s.alpha=s.baseAlpha+Math.sin(tw.t*Math.PI)*0.72;
        else{s.alpha=s.baseAlpha;tw.idx=-1;tw.next=now+base+Math.random()*2.0;}
      } else {tw.idx=-1;tw.next=now+base+Math.random()*2.0;}
    } else if(now>tw.next){
      tw.idx=Math.floor(Math.random()*bgStars.length);
      tw.t=0;
    }
  }
}

function updateShoot(ref){
  var now=performance.now()/1000;
  if(ref.s){
    ref.s.t+=0.018;ref.s.x+=ref.s.vx;ref.s.y+=ref.s.vy;
    if(ref.s.t>0.65){ref.s=null;ref.next=now+(allActive?2.2+Math.random()*3.5:3.5+Math.random()*4.5);}
  } else if(now>ref.next){
    if(Math.random()<(allActive?0.75:0.60)){
      var sx=Math.random()*W*0.8+W*0.1,sy=Math.random()*H*0.5;
      var angle=0.2+Math.random()*0.7;
      var speed=2.6+Math.random()*2.4;
      ref.s={x:sx,y:sy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,t:0,len:3.5+Math.random()*5};
    }
    ref.next=now+(allActive?2.2+Math.random()*3.5:3.5+Math.random()*4.5);
  }
}

function drawShootStar(s){
  if(!s)return;
  var alpha=Math.max(0,(1-s.t/0.65))*0.95;
  CTX.fillStyle='rgba(255,255,250,'+alpha+')';
  CTX.beginPath();CTX.arc(s.x,s.y,1.4,0,Math.PI*2);CTX.fill();
  CTX.strokeStyle='rgba(255,255,240,'+alpha*0.72+')';
  CTX.lineWidth=0.9;
  CTX.beginPath();CTX.moveTo(s.x,s.y);
  CTX.lineTo(s.x-s.vx*s.len,s.y-s.vy*s.len);CTX.stroke();
}

// ===========================================================================
// HOVER + INFO PANEL
// ===========================================================================
function handleMouseMove(e){
  var rect=CV.getBoundingClientRect();
  var mx=e.clientX-rect.left,my=e.clientY-rect.top;
  var found=-1,closest=60;
  for(var gi=0;gi<5;gi++){
    if(!activated[gi])continue;
    var s=hStars[LABEL_IDX[gi]];
    var dx=s.x-mx,dy=s.y-my;
    var d=Math.sqrt(dx*dx+dy*dy);
    if(d<closest){closest=d;found=gi;}
  }
  if(found!==hoveredGroup){
    hoveredGroup=found;
    if(found>=0) showInfo(found);
    else showLastOrDefault();
  }
}

function handleMouseLeave(){hoveredGroup=-1;showLastOrDefault();}

function showInfo(gi){
  defaultHint.style.opacity='0';
  pLabel.textContent='Your strength  '+String.fromCharCode(8594)+'  '+NODE_DATA[gi].label;
  pDesc.textContent=NODE_DATA[gi].desc;
  panelInner.classList.add('show');
}

function showFinal(){
  defaultHint.style.opacity='0';
  pLabel.textContent=FINAL_LABEL;
  pDesc.textContent=FINAL_DESC;
  panelInner.classList.add('show');
}

function showLastOrDefault(){
  if(allActive){showFinal();return;}
  if(lastActivated>=0){showInfo(lastActivated);return;}
  panelInner.classList.remove('show');
  defaultHint.style.opacity='0.6';
}

CV.addEventListener('mousemove',handleMouseMove);
CV.addEventListener('mouseleave',handleMouseLeave);
CV.addEventListener('touchstart',function(e){if(e.touches.length>0)handleMouseMove({clientX:e.touches[0].clientX,clientY:e.touches[0].clientY});},{passive:true});
CV.addEventListener('touchend',function(){handleMouseLeave();},{passive:true});

// ===========================================================================
// CLICK
// ===========================================================================
function advanceNext(){
  for(var i=0;i<5;i++){
    if(!activated[i]){
      if(i===4&&!(activated[0]&&activated[1]&&activated[2]&&activated[3]))return;
      toggleGroup(i);return;
    }
  }
}

function toggleGroup(gi){
  var btn=document.querySelector('.ctx-btn[data-i="'+gi+'"]');
  if(activated[gi]){
    deactivateGroup(gi);
    if(btn) btn.classList.remove('active');
  } else {
    if(gi===4&&!(activated[0]&&activated[1]&&activated[2]&&activated[3]))return;
    activateGroup(gi);
    if(btn) btn.classList.add('active');
  }
}

wrap.addEventListener('click',function(){advanceNext();});
document.querySelectorAll('.ctx-btn').forEach(function(btn){
  btn.addEventListener('click',function(e){e.stopPropagation();toggleGroup(parseInt(btn.getAttribute('data-i')));});
});

// ===========================================================================
// MAIN LOOP
// ===========================================================================
function loop(){
  requestAnimationFrame(loop);
  if(W===0){resize();return;}
  tick+=0.007;
  nebulaT+=0.010;
  if(allActive&&revealGlow>0.14){var el=(performance.now()-revealStart)/1000;revealGlow=Math.max(0.14,1-el*0.30);}
  else if(!allActive){revealGlow*=0.93;}

  updateTwinkles();
  for(var i=0;i<shoots.length;i++) updateShoot(shoots[i]);

  drawBg();
  drawRevealGlow();
  drawOutlinePath();
  drawLines();
  drawPalmLines();
  drawThumbPulse();
  drawHandStars();
  drawLabels();
  for(var i=0;i<shoots.length;i++) drawShootStar(shoots[i].s);
}

function init(){
  seedStrays();
  resize();
  buildStars();
  buildLines();
  initBg();
  var now=performance.now()/1000;
  for(var i=0;i<twinkles.length;i++) twinkles[i].next=now+0.4*i+Math.random()*1.5;
  for(var i=0;i<shoots.length;i++) shoots[i].next=now+2+i*1.5+Math.random()*3;
  loop();
}

window.addEventListener('load',function(){requestAnimationFrame(function(){requestAnimationFrame(init);});});
window.addEventListener('resize',resize);
if(window.ResizeObserver){new ResizeObserver(resize).observe(wrap);}

})();
</script>
