<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Loops &mdash; Module 7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf9f5;--surface:#f0eee6;--dark:#141413;
  --muted:rgba(20,20,19,0.42);--border:rgba(20,20,19,0.1);
  --coral:#d97757;--green:#3d6b4f;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--dark);font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
}
.wrap{width:100%;max-width:520px}
.eyebrow{
  text-align:center;font-size:11px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);margin-bottom:8px;
}
h1{
  text-align:center;font-family:'Source Serif 4',serif;
  font-size:20px;font-weight:400;line-height:1.35;margin-bottom:18px;
}
canvas{display:block;width:100%;border-radius:8px;background:var(--surface);touch-action:none}
.desc{min-height:44px;margin-top:14px;text-align:center;padding:0 4px}
.desc p{
  font-family:'Source Serif 4',serif;font-size:15px;
  line-height:1.6;color:var(--dark);opacity:0;transition:opacity .45s;
}
.desc p.show{opacity:1}
.btns{display:flex;gap:10px;margin-top:14px;justify-content:center}
.lbtn{
  flex:1;max-width:210px;padding:10px 16px;
  border-radius:6px;font:600 13px 'DM Sans',sans-serif;
  cursor:pointer;transition:background .2s,border-color .2s,color .2s,box-shadow .2s,opacity .2s;
}
.lbtn.outer{
  background:none;color:var(--dark);
  border:.5px solid rgba(20,20,19,0.28);
}
.lbtn.outer:hover:not(:disabled){border-color:rgba(20,20,19,0.6)}
.lbtn.outer.lit{
  background:rgba(20,20,19,0.88);color:#fff;
  border-color:transparent;
  box-shadow:0 2px 12px rgba(20,20,19,0.22);
}
.lbtn.outer.pulse{animation:pdark 0.75s ease-in-out 3}
@keyframes pdark{
  0%,100%{box-shadow:0 2px 12px rgba(20,20,19,0.2)}
  50%{box-shadow:0 2px 22px rgba(20,20,19,0.5)}
}
.lbtn.inner{
  background:none;color:var(--coral);
  border:.5px solid rgba(217,119,87,0.32);
  opacity:.38;pointer-events:none;
}
.lbtn.inner.ready{opacity:1;pointer-events:auto}
.lbtn.inner:hover:not(:disabled){border-color:rgba(217,119,87,0.7)}
.lbtn.inner.lit{
  background:var(--coral);color:#fff;
  border-color:transparent;
  box-shadow:0 2px 12px rgba(217,119,87,0.3);
}
.hint{font-size:12px;color:var(--muted);text-align:center;margin-top:8px;min-height:18px}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Module 7 &middot; Tying It All Together</div>
  <h1>Two loops. One framework. Watch it come alive.</h1>
  <canvas id="c"></canvas>
  <div class="desc"><p id="desc"></p></div>
  <div class="btns">
    <button class="lbtn outer" id="btn-out" onclick="clickOuter()">Outer Loop</button>
    <button class="lbtn inner" id="btn-in"  onclick="clickInner()">Inner Loop</button>
  </div>
  <div class="hint" id="hint">Start with the outer loop</div>
</div>

<script>
var C   = document.getElementById('c');
var CTX = C.getContext('2d');
var descEl  = document.getElementById('desc');
var btnOut  = document.getElementById('btn-out');
var btnIn   = document.getElementById('btn-in');
var hintEl  = document.getElementById('hint');

// ── Layout ────────────────────────────────────────────────────
var W,H,CX,CY,R1,R2,N=5;

function resize(){
  W = C.offsetWidth;
  H = Math.round(W * 0.90);
  C.width  = Math.round(W * devicePixelRatio);
  C.height = Math.round(H * devicePixelRatio);
  C.style.height = H + 'px';
  CTX.setTransform(1,0,0,1,0,0);
  CTX.scale(devicePixelRatio, devicePixelRatio);
  CX = W / 2;
  CY = H / 2;
  var S = Math.min(W, H);
  R1 = S * 0.30;  // outer loop radius
  R2 = R1 * 0.42; // inner loop amplitude → flower petals
}

// ── State ─────────────────────────────────────────────────────
// IDLE → OUTER → TRACING → DONE → COMPLETE
var STATE = 'IDLE';
var traceT = 0;
var tracePts = [];
var SPEED = (2 * Math.PI) / 6.5; // rad/s  (completes in ~6.5s)
var lastT  = performance.now();

// Smoothed alphas for ring glows
var outerA = 0.18;  // outer ring alpha
var innerA = 0.0;   // inner ring alpha
var traceA = 0.0;   // trace alpha

// ── Helpers ───────────────────────────────────────────────────
function lerp(a,b,t){ return a + (b-a)*t; }

function pt(t){
  return {
    x: CX + R1*Math.cos(t) + R2*Math.cos(N*t),
    y: CY + R1*Math.sin(t) - R2*Math.sin(N*t)
  };
}

function setDesc(text){
  descEl.classList.remove('show');
  setTimeout(function(){ descEl.textContent = text; descEl.classList.add('show'); }, 180);
}

// ── Interactions ──────────────────────────────────────────────
function clickOuter(){
  if(STATE === 'IDLE'){
    STATE = 'OUTER';
    btnOut.classList.add('lit');
    btnIn.classList.add('ready');
    setDesc('Delegation and Diligence anchor every decision. The outer loop sets the terms.');
    hintEl.textContent = 'Now activate the inner loop';
  } else if(STATE === 'DONE'){
    // Final sign-off
    STATE = 'COMPLETE';
    btnOut.classList.remove('pulse');
    setDesc('The outer loop closes. Your professional sign-off before anything reaches students.');
    hintEl.textContent = '';
    setTimeout(function(){
      setDesc('Two loops working together. That is the complete 4D workflow. Now it is yours to run.');
    }, 2200);
  }
}

function clickInner(){
  if(STATE !== 'OUTER') return;
  STATE = 'TRACING';
  btnIn.classList.add('lit');
  tracePts = [];
  traceT = 0;
  setDesc('Description and Discernment — the inner loop does the quality work.');
  hintEl.textContent = 'Watch both loops build the framework...';
}

// ── Update ────────────────────────────────────────────────────
function update(dt){
  // Target alphas by state
  var tOuter = (STATE==='IDLE') ? 0.18 : 0.62;
  var tInner = (STATE==='TRACING'||STATE==='DONE'||STATE==='COMPLETE') ? 0.55 : 0.0;
  var tTrace = (STATE==='TRACING'||STATE==='DONE'||STATE==='COMPLETE') ? 1.0 : 0.0;

  outerA = lerp(outerA, tOuter, 0.06);
  innerA = lerp(innerA, tInner, 0.06);
  traceA = lerp(traceA, tTrace, 0.08);

  if(STATE === 'TRACING'){
    traceT += SPEED * dt;
    if(traceT < 2*Math.PI){
      tracePts.push(pt(traceT));
    } else {
      traceT = 2 * Math.PI;
      // Fill in any remaining points
      if(tracePts.length < 500){
        for(var tt = tracePts.length/500*2*Math.PI; tt <= 2*Math.PI; tt += 0.02){
          tracePts.push(pt(tt));
        }
      }
      STATE = 'DONE';
      btnOut.classList.add('pulse');
      hintEl.textContent = 'Close the outer loop to complete the workflow';
      setDesc('The pattern is complete — but the outer loop needs to sign off.');
    }
  }
}

// ── Draw ──────────────────────────────────────────────────────
function draw(){
  CTX.clearRect(0,0,W,H);

  // ── Outer ring ──
  CTX.beginPath();
  CTX.arc(CX, CY, R1+R2, 0, Math.PI*2);
  if(STATE==='IDLE') CTX.setLineDash([7,6]);
  else               CTX.setLineDash([]);
  CTX.strokeStyle = 'rgba(20,20,19,'+ outerA +')';
  CTX.lineWidth = (STATE==='COMPLETE') ? 1.8 : 1;
  CTX.stroke();
  CTX.setLineDash([]);

  // ── Inner ring ──
  if(innerA > 0.01){
    CTX.beginPath();
    CTX.arc(CX, CY, R2, 0, Math.PI*2);
    CTX.setLineDash([4,4]);
    CTX.strokeStyle = 'rgba(217,119,87,'+ innerA +')';
    CTX.lineWidth = 1;
    CTX.stroke();
    CTX.setLineDash([]);
  }

  // ── Outer-loop orbiting dot (OUTER state) ──
  if(STATE === 'OUTER'){
    var angle = performance.now() * 0.00085;
    var dx = CX + (R1+R2) * Math.cos(angle);
    var dy = CY + (R1+R2) * Math.sin(angle);
    // Trail
    for(var i=1;i<=6;i++){
      var ta = angle - i*0.18;
      CTX.beginPath();
      CTX.arc(CX+(R1+R2)*Math.cos(ta), CY+(R1+R2)*Math.sin(ta), 3-i*0.35, 0, Math.PI*2);
      CTX.fillStyle = 'rgba(20,20,19,'+(0.12-i*0.017)+')';
      CTX.fill();
    }
    CTX.beginPath();
    CTX.arc(dx, dy, 4.5, 0, Math.PI*2);
    CTX.fillStyle = 'rgba(20,20,19,0.72)';
    CTX.fill();
  }

  // ── Trace path ──
  if(tracePts.length > 1 && traceA > 0.01){
    CTX.beginPath();
    CTX.moveTo(tracePts[0].x, tracePts[0].y);
    for(var i=1; i<tracePts.length; i++){
      CTX.lineTo(tracePts[i].x, tracePts[i].y);
    }
    var lw = STATE==='COMPLETE' ? 2.2 : 1.6;
    CTX.strokeStyle = 'rgba(217,119,87,'+ (traceA * 0.82) +')';
    CTX.lineWidth = lw;
    CTX.lineJoin = 'round';
    CTX.stroke();
  }

  // ── Complete glow on outer ring ──
  if(STATE === 'COMPLETE'){
    var pulse = 0.28 + 0.18 * Math.sin(performance.now() * 0.0025);
    CTX.beginPath();
    CTX.arc(CX, CY, R1+R2, 0, Math.PI*2);
    CTX.strokeStyle = 'rgba(20,20,19,'+ pulse +')';
    CTX.lineWidth = 2.5;
    CTX.stroke();
    // Faint inner glow fill
    var grad = CTX.createRadialGradient(CX,CY,0,CX,CY,R1+R2);
    grad.addColorStop(0, 'rgba(217,119,87,0.06)');
    grad.addColorStop(0.6,'rgba(217,119,87,0.04)');
    grad.addColorStop(1,  'rgba(217,119,87,0)');
    CTX.fillStyle = grad;
    CTX.beginPath();
    CTX.arc(CX,CY,R1+R2,0,Math.PI*2);
    CTX.fill();
  }

  // ── D labels ──
  drawLabels();
}

function drawLabels(){
  // Outer loop labels (Delegation, Diligence) — shown when OUTER+
  if(STATE==='IDLE') return;
  CTX.font = '500 10px "DM Sans"';
  CTX.textAlign = 'center';
  CTX.textBaseline = 'middle';

  var outerLabelA = Math.min(1,(outerA - 0.18) / 0.44);
  if(outerLabelA > 0){
    CTX.fillStyle = 'rgba(20,20,19,'+(outerLabelA * 0.62)+')';
    var lr = R1 + R2 + 22;
    // Delegation ~215°, Diligence ~325°
    CTX.fillText('Delegation',
      CX + lr * Math.cos(3.75), CY + lr * Math.sin(3.75));
    CTX.fillText('Diligence',
      CX + lr * Math.cos(5.67), CY + lr * Math.sin(5.67));
  }

  // Inner loop labels (Description, Discernment) — shown when TRACING+
  var innerLabelA = Math.min(1, innerA / 0.55);
  if(innerLabelA > 0.05){
    CTX.fillStyle = 'rgba(217,119,87,'+(innerLabelA * 0.75)+')';
    var ir = R2 + 20;
    // Description ~135°, Discernment ~45°
    CTX.fillText('Description',
      CX + ir * Math.cos(2.36), CY + ir * Math.sin(2.36));
    CTX.fillText('Discernment',
      CX + ir * Math.cos(0.79), CY + ir * Math.sin(0.79));
  }
}

// ── Loop ──────────────────────────────────────────────────────
function loop(ts){
  var dt = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('resize', function(){ resize(); });
resize();
requestAnimationFrame(function(ts){ lastT = ts; loop(ts); });
</script>
</body>
</html>
