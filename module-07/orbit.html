<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resonance — Module 7 — AI Fluency for K-12 Educators</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300..700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f5;--surface:#f0eee6;--dark:#141413;
  --muted:rgba(20,20,19,0.42);--border:rgba(20,20,19,0.1);
  --coral:#d97757;--green:#3d6b4f;
  --sans:'DM Sans',Arial,sans-serif;--serif:'Source Serif 4',Georgia,serif;
}
html,body{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;font-family:var(--sans);color:var(--dark)}
.stage{width:100%;max-width:720px;position:relative}
.status-badge{position:absolute;top:0;right:0;z-index:10;font-size:9.5px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;background:var(--surface);border:0.5px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:0 6px 0 4px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:6px;overflow:hidden}
.top-bar{padding:1.75rem 2rem 0;padding-right:9rem}
.eyebrow{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted)}
.title-area{padding:0.75rem 2rem 0.5rem}
.headline{font-family:var(--serif);font-variation-settings:'opsz' 24;font-size:clamp(20px,2.8vw,26px);font-weight:600;color:var(--dark);line-height:1.2;margin-bottom:0.25rem;letter-spacing:-0.025em}
.subhead{font-size:13px;color:var(--muted);line-height:1.5}
.field-wrap{position:relative;background:var(--surface);border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none}
canvas{display:block;width:100%}
.step-text{padding:1.3rem 2rem 1.1rem;min-height:95px;display:flex;flex-direction:column;justify-content:center;transition:opacity 0.2s}
.step-title{font-family:var(--serif);font-variation-settings:'opsz' 20;font-size:clamp(16px,2.2vw,20px);font-weight:600;color:var(--dark);letter-spacing:-0.02em;line-height:1.2;margin-bottom:0.28rem;min-height:1.35em}
.step-body{font-size:13px;color:var(--muted);line-height:1.65;max-width:500px}
.nav-area{padding:0.8rem 2rem 1.05rem;background:var(--surface);border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.dots{display:flex;gap:5px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:var(--border);transition:background 0.3s,transform 0.3s}
.dot.active{background:var(--coral);transform:scale(1.4)}
.dot.done{background:rgba(217,119,87,0.38)}
.nav-btn{font-family:var(--sans);font-size:12px;font-weight:500;padding:0.42rem 1.1rem;border-radius:3px;cursor:pointer;border:0.5px solid var(--border);background:var(--bg);color:var(--muted);transition:border-color 0.15s,color 0.15s,background 0.15s}
.nav-btn:hover{border-color:var(--coral);color:var(--coral)}
.nav-btn.primary{background:var(--coral);border-color:var(--coral);color:#fff}
.nav-btn.primary:hover{background:#c46848;border-color:#c46848;color:#fff}
</style>
</head>
<body>
<div class="stage">
  <div class="status-badge">Draft &middot; Module 7</div>
  <div class="card">
    <div class="top-bar"><span class="eyebrow">AI Fluency for K&ndash;12 Educators &nbsp;&middot;&nbsp; Module 7</span></div>
    <div class="title-area">
      <h1 class="headline">Set it in motion.</h1>
      <p class="subhead">Four competencies. One shared structure. Watch what happens when they all run together.</p>
    </div>
    <div class="field-wrap" id="fieldWrap"><canvas id="c"></canvas></div>
    <div class="step-text" id="stepText">
      <div class="step-title" id="stepTitle">&nbsp;</div>
      <div class="step-body" id="stepBody">Four competencies. One shared structure. Click to set the framework in motion.</div>
    </div>
    <div class="nav-area">
      <div class="dots" id="dots"></div>
      <button class="nav-btn primary" id="nextBtn">Begin &rarr;</button>
    </div>
  </div>
</div>

<script>
var CV=document.getElementById('c'),CTX=CV.getContext('2d');
var wrap=document.getElementById('fieldWrap');
var W=0,H=0,dpr=1,barY=0;
var raf=null, lastT=null;
var SUBSTEPS=6;

// Physics: natural frequencies (rad/s)^2
// Outer pair: period ~2.4s → ω² = (2π/2.4)² ≈ 6.85
// Inner pair: period ~1.55s → ω² = (2π/1.55)² ≈ 16.4
var W0SQ_OUT=6.85, W0SQ_IN=16.4;
var K_PAIR=3.2;   // coupling within each loop pair
var K_CROSS=0.28; // weak coupling across loops
var DAMP=0.11;    // velocity damping coefficient

var pends={
  del:{x0f:0.16,Lf:0.66,w0sq:W0SQ_OUT,rgb:[20,20,19],   name:'Delegation', sub:'Ethical Focus',  theta:0,omega:0,active:false,glow:0,trail:[]},
  des:{x0f:0.38,Lf:0.42,w0sq:W0SQ_IN, rgb:[217,119,87], name:'Description', sub:'Quality Focus',  theta:0,omega:0,active:false,glow:0,trail:[]},
  dsc:{x0f:0.62,Lf:0.42,w0sq:W0SQ_IN, rgb:[217,119,87], name:'Discernment', sub:'Quality Focus',  theta:0,omega:0,active:false,glow:0,trail:[]},
  dil:{x0f:0.84,Lf:0.66,w0sq:W0SQ_OUT,rgb:[20,20,19],   name:'Diligence',  sub:'Ethical Focus',  theta:0,omega:0,active:false,glow:0,trail:[]}
};
var ORDER=['del','des','dsc','dil'];

// Starting angles (same direction → will beat and settle into anti-phase)
var START_THETA={del:0.24, des:0.22, dsc:0.20, dil:0.18};

var STEPS=[
  {pend:null,    title:'',                               body:'Four competencies. One shared structure. Click anywhere to set the framework in motion.'},
  {pend:'del',   title:'Delegation.',                    body:'Should AI be involved at all? And how much? The outer loop opens.'},
  {pend:'dil',   title:'Diligence.',                     body:'What is your professional responsibility here? Before a single prompt — the outer loop is set.'},
  {pend:'des',   title:'Description.',                   body:'Now you brief AI. With precision. The inner loop begins.'},
  {pend:'dsc',   title:'Discernment.',                   body:'Evaluate what comes back. Not right? Describe again. All four are in motion.'},
  {pend:null,    title:'Watch.',                         body:'The framework is finding its resonance. This is what it feels like when the practice runs on its own.'},
  {pend:null,    title:'Diligence, once more.',          body:'Before the output leaves your hands — your sign-off. The outer loop closes. The work is yours.', highlight:'dil'},
  {pend:null,    title:'Four competencies in resonance.',body:'Not steps — a living system, self-sustaining. This is what it looks like when all four work together. Now try it on something real.'},
];

var step=0;
var dilHighlight=0, dilHighlightTgt=0;

function bobPos(id){
  var p=pends[id];
  var L=p.Lf*(H-barY);
  return{x:p.x0f*W + L*Math.sin(p.theta), y:barY + L*Math.cos(p.theta)};
}

function activate(id){
  var p=pends[id];
  p.theta=START_THETA[id];
  p.omega=0;
  p.active=true;
  p.trail=[];
}

function setStep(s){
  step=s;
  var st=STEPS[s];
  if(st.pend) activate(st.pend);
  dilHighlightTgt=st.highlight==='dil'?1:0;
  fadeText(st);
  buildDots();
  var btn=document.getElementById('nextBtn');
  if(s>=STEPS.length-1){btn.textContent='Start over';btn.className='nav-btn';}
  else{btn.textContent=s===0?'Begin \u2192':'Continue \u2192';btn.className='nav-btn primary';}
}

function fadeText(st){
  var el=document.getElementById('stepText');
  el.style.opacity='0';
  setTimeout(function(){
    document.getElementById('stepTitle').textContent=st.title||'\u00a0';
    document.getElementById('stepBody').textContent=st.body;
    el.style.opacity='1';
  },190);
}

function buildDots(){
  var dc=document.getElementById('dots');
  dc.innerHTML='';
  for(var i=0;i<STEPS.length;i++){
    var d=document.createElement('div');
    d.className='dot'+(i===step?' active':(i<step?' done':''));
    dc.appendChild(d);
  }
}

function advance(){setStep(step<STEPS.length-1?step+1:0);}

function resize(){
  dpr=window.devicePixelRatio||1;
  var r=wrap.getBoundingClientRect();
  W=r.width; H=Math.round(W*0.66);
  CV.width=Math.round(W*dpr); CV.height=Math.round(H*dpr);
  CV.style.width=W+'px'; CV.style.height=H+'px';
  CTX.setTransform(dpr,0,0,dpr,0,0);
  barY=H*0.09;
}

function physics(dt){
  var sub_dt=dt/SUBSTEPS;
  for(var s=0;s<SUBSTEPS;s++){
    var th={}, om={};
    ORDER.forEach(function(id){th[id]=pends[id].theta; om[id]=pends[id].omega;});

    ORDER.forEach(function(id){
      var p=pends[id];
      if(!p.active) return;
      var a=-p.w0sq*th[id] - DAMP*om[id];
      // Within-loop pair coupling
      if(id==='del'&&pends.dil.active) a+=K_PAIR*(th.dil-th.del);
      if(id==='dil'&&pends.del.active) a+=K_PAIR*(th.del-th.dil);
      if(id==='des'&&pends.dsc.active) a+=K_PAIR*(th.dsc-th.des);
      if(id==='dsc'&&pends.des.active) a+=K_PAIR*(th.des-th.dsc);
      // Cross-loop coupling (shared professional structure)
      if(id==='del'&&pends.des.active) a+=K_CROSS*(th.des-th.del);
      if(id==='des'&&pends.del.active) a+=K_CROSS*(th.del-th.des);
      if(id==='dil'&&pends.dsc.active) a+=K_CROSS*(th.dsc-th.dil);
      if(id==='dsc'&&pends.dil.active) a+=K_CROSS*(th.dil-th.dsc);
      p.omega+=a*sub_dt;
      p.theta+=p.omega*sub_dt;
    });
  }
}

function render(ts){
  raf=requestAnimationFrame(render);
  if(!lastT){lastT=ts;}
  var dt=Math.min((ts-lastT)/1000, 0.04);
  lastT=ts;

  if(W===0){resize(); return;}

  physics(dt);

  // Lerp glow values
  ORDER.forEach(function(id){
    var p=pends[id];
    var tgt=p.active?1:0;
    p.glow+=(tgt-p.glow)*0.06;
  });
  dilHighlight+=(dilHighlightTgt-dilHighlight)*0.04;

  CTX.clearRect(0,0,W,H);

  var TRAIL=52, BOB_R_OUT=Math.max(13,Math.min(20,W*0.030));
  var BOB_R_IN =Math.max(10,Math.min(16,W*0.023));

  // Draw bar
  CTX.beginPath(); CTX.moveTo(W*0.06,barY); CTX.lineTo(W*0.94,barY);
  CTX.strokeStyle='rgba(20,20,19,0.22)'; CTX.lineWidth=1.5; CTX.stroke();

  // Subtle bracket lines connecting coupled pairs (appears when both active)
  var outerBothActive=pends.del.active&&pends.dil.active;
  var innerBothActive=pends.des.active&&pends.dsc.active;
  var bracketAlpha=0;

  if(outerBothActive){
    bracketAlpha=Math.min(pends.del.glow,pends.dil.glow)*0.35;
    CTX.beginPath();
    CTX.moveTo(pends.del.x0f*W+4, barY+6);
    CTX.lineTo(pends.dil.x0f*W-4, barY+6);
    CTX.strokeStyle='rgba(20,20,19,'+bracketAlpha+')';
    CTX.lineWidth=0.5; CTX.setLineDash([3,5]); CTX.stroke(); CTX.setLineDash([]);
  }
  if(innerBothActive){
    bracketAlpha=Math.min(pends.des.glow,pends.dsc.glow)*0.45;
    CTX.beginPath();
    CTX.moveTo(pends.des.x0f*W+2, barY+10);
    CTX.lineTo(pends.dsc.x0f*W-2, barY+10);
    CTX.strokeStyle='rgba(217,119,87,'+bracketAlpha+')';
    CTX.lineWidth=0.5; CTX.setLineDash([3,5]); CTX.stroke(); CTX.setLineDash([]);
  }

  // Draw each pendulum
  ORDER.forEach(function(id){
    var p=pends[id];
    var r=p.rgb;
    var pos=bobPos(id);
    var bR=p.w0sq===W0SQ_OUT?BOB_R_OUT:BOB_R_IN;
    var g=p.glow;

    // Add to trail
    if(p.active){
      p.trail.push({x:pos.x,y:pos.y});
      if(p.trail.length>TRAIL) p.trail.shift();
    }

    // Trail
    for(var i=1;i<p.trail.length;i++){
      var tf=(i/p.trail.length);
      var ta=tf*tf*0.55*g;
      CTX.beginPath();
      CTX.moveTo(p.trail[i-1].x,p.trail[i-1].y);
      CTX.lineTo(p.trail[i].x,p.trail[i].y);
      CTX.strokeStyle='rgba('+r[0]+','+r[1]+','+r[2]+','+ta+')';
      CTX.lineWidth=1.5*tf;
      CTX.stroke();
    }

    // String
    CTX.beginPath();
    CTX.moveTo(p.x0f*W,barY);
    CTX.lineTo(pos.x,pos.y);
    CTX.strokeStyle='rgba('+r[0]+','+r[1]+','+r[2]+','+(0.15+g*0.40)+')';
    CTX.lineWidth=0.5+g*0.5;
    CTX.stroke();

    // Diligence highlight ring (step 6 "again" pulse)
    if(id==='dil'&&dilHighlight>0.02){
      var hp=0.5+0.5*Math.sin(Date.now()*0.005);
      CTX.beginPath();
      CTX.arc(pos.x,pos.y,bR+4+hp*5,0,Math.PI*2);
      CTX.strokeStyle='rgba('+r[0]+','+r[1]+','+r[2]+','+dilHighlight*0.55*hp+')';
      CTX.lineWidth=1.5; CTX.stroke();
      CTX.beginPath();
      CTX.arc(pos.x,pos.y,bR+10+hp*8,0,Math.PI*2);
      CTX.strokeStyle='rgba('+r[0]+','+r[1]+','+r[2]+','+dilHighlight*0.22*hp+')';
      CTX.lineWidth=1; CTX.stroke();
    }

    // Glow halo
    if(g>0.04){
      var spd=Math.abs(p.omega);
      var hR=bR+3+spd*8*g;
      var grd=CTX.createRadialGradient(pos.x,pos.y,bR*0.5,pos.x,pos.y,hR);
      grd.addColorStop(0,'rgba('+r[0]+','+r[1]+','+r[2]+','+(g*0.30)+')');
      grd.addColorStop(1,'rgba('+r[0]+','+r[1]+','+r[2]+',0)');
      CTX.beginPath(); CTX.arc(pos.x,pos.y,hR,0,Math.PI*2);
      CTX.fillStyle=grd; CTX.fill();
    }

    // Bob
    CTX.beginPath(); CTX.arc(pos.x,pos.y,bR,0,Math.PI*2);
    CTX.fillStyle='rgba('+r[0]+','+r[1]+','+r[2]+','+(0.08+g*0.82)+')';
    CTX.fill();
    CTX.strokeStyle='rgba('+r[0]+','+r[1]+','+r[2]+','+(0.22+g*0.60)+')';
    CTX.lineWidth=0.5+g*0.5; CTX.stroke();

    // Pivot dot
    CTX.beginPath(); CTX.arc(p.x0f*W,barY,2,0,Math.PI*2);
    CTX.fillStyle='rgba('+r[0]+','+r[1]+','+r[2]+','+(0.18+g*0.45)+')'; CTX.fill();

    // Label below bob (anchored to pivot, not bob, for readability)
    var labelY=barY+(p.Lf*(H-barY))+bR+14;
    var labelAlpha=0.22+g*0.68;
    CTX.textAlign='center'; CTX.textBaseline='top';
    CTX.font='600 12px "DM Sans",Arial,sans-serif';
    CTX.fillStyle='rgba('+r[0]+','+r[1]+','+r[2]+','+labelAlpha+')';
    CTX.fillText(p.name, p.x0f*W, labelY);
    CTX.font='400 9.5px "DM Sans",Arial,sans-serif';
    CTX.fillStyle='rgba('+r[0]+','+r[1]+','+r[2]+','+(labelAlpha*0.55)+')';
    CTX.fillText(p.sub, p.x0f*W, labelY+14);
  });
}

// Init
resize();
window.addEventListener('resize',function(){resize();});
buildDots();
requestAnimationFrame(render);

// Nav
document.getElementById('nextBtn').addEventListener('click',function(e){e.stopPropagation();advance();});
document.getElementById('fieldWrap').addEventListener('click',advance);
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();advance();}
  if(e.key==='ArrowLeft'){e.preventDefault();if(step>0)setStep(step-1);}
});
</script>
</body>
</html>
