<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>4D Runner &mdash; Module 7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf9f5;--surface:#f0eee6;--dark:#141413;
  --muted:rgba(20,20,19,0.42);--border:rgba(20,20,19,0.1);
  --coral:#d97757;--green:#3d6b4f;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--dark);font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
}
.wrap{width:100%;max-width:600px}
.eyebrow{text-align:center;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
h1{text-align:center;font-family:'Source Serif 4',serif;font-size:20px;font-weight:400;line-height:1.35;margin-bottom:18px}
canvas{display:block;width:100%;border-radius:8px;background:var(--surface);touch-action:none;cursor:default}
.msg{min-height:40px;margin-top:12px;text-align:center;padding:0 8px}
.msg p{font:500 13px 'DM Sans',sans-serif;line-height:1.5;opacity:0;transition:opacity .25s}
.msg p.show{opacity:1}
.msg p.win{color:var(--green)}
.msg p.fail{color:#b94a38}
.hint{font-size:12px;color:var(--muted);text-align:center;margin-top:4px;min-height:18px}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Module 7 &middot; Tying It All Together</div>
  <h1>Navigate the 4D workflow in real time.</h1>
  <canvas id="c"></canvas>
  <div class="msg"><p id="msg-text"></p></div>
  <div class="hint" id="hint">Press Space or tap to start &nbsp;&middot;&nbsp; &larr;&rarr; to switch lanes</div>
</div>

<script>
var C=document.getElementById('c');
var CTX=C.getContext('2d');
var msgP=document.getElementById('msg-text');
var hintEl=document.getElementById('hint');

// Layout
var W,H,LANE_W,PLAYER_Y,HEADER_H,PLAY_H,ORB_R,GATE_H,HIT_ZONE;

var LANES=[
  {name:'Delegation', sub:'Ethical Focus', dark:true,  x:0},
  {name:'Diligence',  sub:'Ethical Focus', dark:true,  x:0},
  {name:'Description',sub:'Quality Focus', dark:false, x:0},
  {name:'Discernment',sub:'Quality Focus', dark:false, x:0},
];

var GATES=[
  {
    lane:0,
    scenario:'A student wants AI to draft their essay',
    win:'Delegation -- you decided AI\'s role before anything else.',
    fail:'Start with Delegation. Decide how much to hand off before prompting.'
  },
  {
    lane:1,
    scenario:'The AI-generated rubric mentions a student by name',
    win:'Diligence -- you caught the privacy issue before it reached students.',
    fail:'Diligence checks professional guardrails first. FERPA applies here.'
  },
  {
    lane:2,
    scenario:'Your prompt is vague and AI keeps missing the mark',
    win:'Description -- you told AI exactly what you needed.',
    fail:'Description fixes the prompt. Give AI the context it needs.'
  },
  {
    lane:3,
    scenario:'The AI feedback looks polished but contains a factual error',
    win:'Discernment -- surface quality never fooled you.',
    fail:'Discernment: always evaluate output critically, not just aesthetics.'
  },
  {
    lane:1,
    scenario:'Ready to send AI-generated feedback to 30 students',
    win:'Diligence again -- the outer loop closes. Your signature, not AI\'s.',
    fail:'Diligence closes the loop. Professional sign-off before delivery.'
  },
];

// State
var STATE='IDLE'; // IDLE COUNTDOWN PLAYING WIN_PAUSE FAIL COMPLETE
var player={lane:1, x:0, targetX:0, trail:[]};
var gateY=0, gateSpeed=0, gateIdx=0, gateResolved=false;
var cdNum=3, cdTimer=0;
var flashAlpha=0, flashGreen=true;
var pauseTimer=0;
var touchStartX=0;
var lastT=performance.now();

function resize(){
  W=C.offsetWidth;
  H=Math.round(W*0.70);
  C.width=Math.round(W*devicePixelRatio);
  C.height=Math.round(H*devicePixelRatio);
  C.style.height=H+'px';
  CTX.setTransform(1,0,0,1,0,0);
  CTX.scale(devicePixelRatio,devicePixelRatio);
  LANE_W=W/4;
  HEADER_H=40;
  PLAYER_Y=H*0.83;
  PLAY_H=PLAYER_Y-HEADER_H;
  ORB_R=Math.max(10,Math.round(W*0.022));
  GATE_H=Math.max(5,Math.round(H*0.012));
  HIT_ZONE=ORB_R*1.8;
  gateSpeed=PLAY_H/3.0; // px/s, arrive in ~3s
  for(var i=0;i<4;i++) LANES[i].x=LANE_W*i+LANE_W/2;
  player.x=LANES[player.lane].x;
  player.targetX=LANES[player.lane].x;
}

function startGame(){
  STATE='COUNTDOWN';
  cdNum=3; cdTimer=0;
  gateIdx=0;
  player.lane=1;
  player.x=LANES[1].x;
  player.targetX=LANES[1].x;
  player.trail=[];
  spawnGate();
  setMsg('','');
  hintEl.textContent='\u2190\u2192 to switch lanes';
}

function spawnGate(){
  gateY=HEADER_H;
  gateResolved=false;
}

function setMsg(text,cls){
  msgP.classList.remove('show','win','fail');
  msgP.textContent=text;
  if(text){
    void msgP.offsetWidth;
    msgP.classList.add('show');
    if(cls) msgP.classList.add(cls);
  }
}

function wrapLines(text,maxW){
  CTX.textBaseline='top';
  var words=text.split(' ');
  var lines=[], line='';
  for(var i=0;i<words.length;i++){
    var test=line+(line?' ':'')+words[i];
    if(CTX.measureText(test).width>maxW&&line){
      lines.push(line); line=words[i];
    } else { line=test; }
  }
  if(line) lines.push(line);
  return lines;
}

// ── DRAW ──────────────────────────────────────────────────────
function draw(){
  CTX.clearRect(0,0,W,H);

  // Lane backgrounds
  for(var i=0;i<4;i++){
    var lx=i*LANE_W;
    CTX.fillStyle=LANES[i].dark?'rgba(20,20,19,0.055)':'rgba(217,119,87,0.065)';
    CTX.fillRect(lx,0,LANE_W,H);
  }

  // Lane dividers
  CTX.setLineDash([3,4]);
  CTX.strokeStyle='rgba(20,20,19,0.11)';
  CTX.lineWidth=0.5;
  for(var i=1;i<4;i++){
    CTX.beginPath();
    CTX.moveTo(i*LANE_W,HEADER_H);
    CTX.lineTo(i*LANE_W,PLAYER_Y+24);
    CTX.stroke();
  }
  CTX.setLineDash([]);

  // Header bottom line
  CTX.strokeStyle='rgba(20,20,19,0.1)';
  CTX.lineWidth=0.5;
  CTX.beginPath();
  CTX.moveTo(0,HEADER_H);
  CTX.lineTo(W,HEADER_H);
  CTX.stroke();

  // Lane header labels
  CTX.textAlign='center';
  CTX.textBaseline='middle';
  for(var i=0;i<4;i++){
    var cx=i*LANE_W+LANE_W/2;
    var isActive=(STATE!=='IDLE'&&STATE!=='COUNTDOWN'&&player.lane===i);
    CTX.font='600 11px "DM Sans"';
    CTX.fillStyle=LANES[i].dark?
      (isActive?'rgba(20,20,19,0.9)':'rgba(20,20,19,0.5)'):
      (isActive?'rgba(217,119,87,1.0)':'rgba(217,119,87,0.6)');
    CTX.fillText(LANES[i].name,cx,HEADER_H/2);
  }

  // IDLE screen
  if(STATE==='IDLE'){
    CTX.font='400 14px "Source Serif 4"';
    CTX.fillStyle='rgba(20,20,19,0.38)';
    CTX.textAlign='center';
    CTX.textBaseline='middle';
    CTX.fillText('Five challenges. One workflow.',W/2,H*0.40);
    CTX.font='500 12px "DM Sans"';
    CTX.fillStyle='rgba(20,20,19,0.28)';
    CTX.fillText('Outer loop \u2192 inner loop \u2192 outer loop',W/2,H*0.40+22);
    drawOrb(false);
    return;
  }

  // Gate + scenario text
  if(STATE!=='COMPLETE'){
    var g=GATES[Math.min(gateIdx,GATES.length-1)];
    var proximity=(gateY-HEADER_H)/PLAY_H; // 0=spawn, 1=player
    var textAlpha=Math.min(1,Math.max(0,proximity*2.4));

    // Scenario text: hovers above the gate, pinned to a min y
    if(textAlpha>0.02){
      var scenTextY=Math.max(HEADER_H+H*0.08, gateY-H*0.09);
      CTX.globalAlpha=textAlpha;
      CTX.font='400 14px "Source Serif 4"';
      CTX.fillStyle='rgba(20,20,19,0.88)';
      CTX.textAlign='center';
      var maxTW=W*0.78;
      var lines=wrapLines(g.scenario,maxTW);
      var lineH=20;
      var totalH=lines.length*lineH;
      var ty=scenTextY-totalH/2;
      for(var li=0;li<lines.length;li++){
        CTX.textBaseline='top';
        CTX.fillText(lines[li],W/2,ty+li*lineH);
      }
      CTX.globalAlpha=1;
    }

    // Gate segments
    for(var i=0;i<4;i++){
      var segX=i*LANE_W;
      var isCorrect=(i===g.lane);
      // Subtle hint glow for correct lane as gate approaches
      var alpha;
      if(isCorrect){
        var hintGlow=proximity>0.6?Math.min(1,(proximity-0.6)/0.3):0;
        alpha=LANES[i].dark?(0.4+hintGlow*0.45):(0.45+hintGlow*0.4);
      } else {
        alpha=LANES[i].dark?0.28:0.32;
      }
      CTX.fillStyle=LANES[i].dark?
        'rgba(20,20,19,'+alpha+')':
        'rgba(217,119,87,'+(alpha*1.05)+')';
      CTX.fillRect(segX,gateY-GATE_H/2,LANE_W,GATE_H);
    }
  }

  // Player trail
  for(var t=0;t<player.trail.length;t++){
    var tp=player.trail[t];
    var ta=(t+1)/player.trail.length*0.18;
    var tr=ORB_R*(0.35+0.4*((t+1)/player.trail.length));
    CTX.beginPath();
    CTX.arc(tp.x,PLAYER_Y,tr,0,Math.PI*2);
    CTX.fillStyle='rgba(20,20,19,'+ta+')';
    CTX.fill();
  }

  // Player orb
  var inCorrect=STATE==='PLAYING'&&
    player.lane===GATES[Math.min(gateIdx,GATES.length-1)].lane&&
    (GATES[Math.min(gateIdx,GATES.length-1)].lane===player.lane);
  drawOrb(inCorrect);

  // Flash overlay
  if(flashAlpha>0.005){
    CTX.fillStyle=flashGreen?
      'rgba(61,107,79,'+flashAlpha+')':
      'rgba(185,74,56,'+flashAlpha+')';
    CTX.fillRect(0,0,W,H);
  }

  // Countdown overlay
  if(STATE==='COUNTDOWN'){
    CTX.fillStyle='rgba(250,249,245,0.78)';
    CTX.fillRect(0,0,W,H);
    var cdLabel=(cdNum>0)?String(cdNum):'Go';
    CTX.font='700 60px "DM Sans"';
    CTX.fillStyle='rgba(20,20,19,0.82)';
    CTX.textAlign='center';
    CTX.textBaseline='middle';
    CTX.fillText(cdLabel,W/2,H/2);
  }

  // Progress dots
  if(STATE!=='IDLE'&&STATE!=='COUNTDOWN'&&STATE!=='COMPLETE'){
    var dotR=3,dotGap=10,dotY=H-11;
    var tx=(GATES.length-1)*dotGap;
    var dx=W/2-tx/2;
    for(var i=0;i<GATES.length;i++){
      CTX.beginPath();
      CTX.arc(dx+i*dotGap,dotY,dotR,0,Math.PI*2);
      CTX.fillStyle=i<gateIdx?
        'rgba(20,20,19,0.6)':
        (i===gateIdx?'rgba(20,20,19,0.88)':'rgba(20,20,19,0.18)');
      CTX.fill();
    }
  }

  // Complete screen
  if(STATE==='COMPLETE'){
    CTX.fillStyle='rgba(250,249,245,0.93)';
    CTX.fillRect(0,0,W,H);
    var rows=[
      {t:'You just ran the full 4D workflow.',sz:17,wt:'600',gap:30},
      {t:'',sz:8,wt:'400',gap:8},
      {t:'Outer loop set the terms.',sz:15,wt:'400',gap:22},
      {t:'Inner loop refined the work.',sz:15,wt:'400',gap:22},
      {t:'Outer loop signed off.',sz:15,wt:'400',gap:22},
      {t:'',sz:8,wt:'400',gap:8},
      {t:"That's the practice.",sz:15,wt:'600',gap:22},
      {t:'Start it tomorrow.',sz:15,wt:'400',gap:0},
    ];
    var cy=H*0.20;
    CTX.textAlign='center';
    for(var ri=0;ri<rows.length;ri++){
      var row=rows[ri];
      if(!row.t){cy+=row.gap;continue;}
      CTX.font=row.wt+' '+row.sz+'px "Source Serif 4"';
      CTX.fillStyle=row.wt==='600'?'rgba(20,20,19,0.9)':'rgba(20,20,19,0.65)';
      CTX.textBaseline='top';
      CTX.fillText(row.t,W/2,cy);
      cy+=row.gap;
    }
    CTX.font='500 11px "DM Sans"';
    CTX.fillStyle='rgba(20,20,19,0.32)';
    CTX.textBaseline='bottom';
    CTX.fillText('Press Space or tap to play again',W/2,H-12);
  }
}

function drawOrb(glowing){
  var ox=player.x, oy=PLAYER_Y;
  if(glowing){
    var grd=CTX.createRadialGradient(ox,oy,0,ox,oy,ORB_R*3.5);
    grd.addColorStop(0,'rgba(20,20,19,0.14)');
    grd.addColorStop(1,'rgba(20,20,19,0)');
    CTX.fillStyle=grd;
    CTX.beginPath();
    CTX.arc(ox,oy,ORB_R*3.5,0,Math.PI*2);
    CTX.fill();
  }
  CTX.beginPath();
  CTX.arc(ox,oy,ORB_R,0,Math.PI*2);
  CTX.fillStyle='rgba(20,20,19,0.86)';
  CTX.fill();
}

// ── UPDATE ─────────────────────────────────────────────────────
function update(dt){
  // Smooth player x
  player.x+=(player.targetX-player.x)*Math.min(1,dt*14);

  // Trail (only during active play)
  if(STATE==='PLAYING'||STATE==='COUNTDOWN'){
    player.trail.push({x:player.x});
    if(player.trail.length>5) player.trail.shift();
  }

  if(STATE==='COUNTDOWN'){
    cdTimer+=dt;
    if(cdTimer>0.72){
      cdTimer=0;
      cdNum--;
      if(cdNum<0) STATE='PLAYING';
    }
    return;
  }

  if(STATE==='PLAYING'){
    gateY+=gateSpeed*dt;
    if(!gateResolved&&gateY>=PLAYER_Y-HIT_ZONE){
      gateResolved=true;
      gateY=PLAYER_Y;
      var g=GATES[gateIdx];
      if(player.lane===g.lane){
        STATE='WIN_PAUSE';
        pauseTimer=1.7;
        flashAlpha=0.28;
        flashGreen=true;
        setMsg(g.win,'win');
      } else {
        STATE='FAIL';
        pauseTimer=0.55;
        flashAlpha=0.22;
        flashGreen=false;
        setMsg(g.fail,'fail');
      }
    }
    return;
  }

  if(STATE==='WIN_PAUSE'||STATE==='FAIL'){
    flashAlpha=Math.max(0,flashAlpha-dt*1.6);
    pauseTimer-=dt;
    if(pauseTimer<=0){
      if(STATE==='WIN_PAUSE'){
        gateIdx++;
        if(gateIdx>=GATES.length){
          STATE='COMPLETE';
          setMsg('','');
          hintEl.textContent='Press Space or tap to play again';
        } else {
          STATE='PLAYING';
          spawnGate();
          setMsg('','');
        }
      } else {
        STATE='PLAYING';
        spawnGate();
        setMsg('','');
      }
    }
  }
}

// ── LOOP ───────────────────────────────────────────────────────
function loop(ts){
  var dt=Math.min((ts-lastT)/1000,0.05);
  lastT=ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ── INPUT ──────────────────────────────────────────────────────
function moveLeft(){
  if(player.lane>0){
    player.lane--;
    player.targetX=LANES[player.lane].x;
  }
}
function moveRight(){
  if(player.lane<3){
    player.lane++;
    player.targetX=LANES[player.lane].x;
  }
}
function tryStart(){
  if(STATE==='IDLE'||STATE==='COMPLETE') startGame();
}

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){
    if(STATE!=='IDLE'&&STATE!=='COMPLETE') e.preventDefault();
    moveLeft();
  } else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){
    if(STATE!=='IDLE'&&STATE!=='COMPLETE') e.preventDefault();
    moveRight();
  } else if(e.key===' '){
    e.preventDefault();
    tryStart();
  }
});

C.addEventListener('touchstart',function(e){
  touchStartX=e.touches[0].clientX;
  if(STATE==='IDLE'||STATE==='COMPLETE'){
    startGame();
    e.preventDefault();
    return;
  }
  e.preventDefault();
},{passive:false});

C.addEventListener('touchend',function(e){
  if(STATE==='IDLE'||STATE==='COMPLETE') return;
  var dx=e.changedTouches[0].clientX-touchStartX;
  if(dx<-18) moveLeft();
  else if(dx>18) moveRight();
  e.preventDefault();
},{passive:false});

window.addEventListener('resize',function(){
  resize();
  if(STATE==='IDLE') player.x=player.targetX=LANES[player.lane].x;
  draw();
});

resize();
player.x=player.targetX=LANES[player.lane].x;
requestAnimationFrame(function(ts){lastT=ts;loop(ts);});
</script>
</body>
</html>
