<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Build &mdash; Module 7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf9f5;--surface:#f0eee6;--dark:#141413;
  --muted:rgba(20,20,19,0.42);--border:rgba(20,20,19,0.1);
  --coral:#d97757;--green:#3d6b4f;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--dark);font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
}
.wrap{width:100%;max-width:540px}
.eyebrow{
  text-align:center;font-size:11px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);margin-bottom:8px;
}
h1{
  text-align:center;font-family:'Source Serif 4',serif;
  font-size:20px;font-weight:400;line-height:1.35;margin-bottom:20px;
}

/* Document card */
.doc-card{
  background:var(--bg);
  border:.5px solid var(--border);
  border-radius:8px;overflow:hidden;
}
.doc-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 16px;border-bottom:.5px solid var(--border);
  background:var(--surface);
}
.doc-title{font:500 11px 'DM Sans',sans-serif;color:var(--muted)}
.prog-dots{display:flex;gap:5px;align-items:center}
.prog-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(20,20,19,0.13);transition:background .4s;
}
.prog-dot.done{background:rgba(20,20,19,0.5)}
.prog-dot.active{background:rgba(20,20,19,0.85)}

.doc-body{padding:20px 20px 16px;min-height:220px}
.doc-text{
  font:400 14px/1.75 'Source Serif 4',serif;
  color:var(--dark);white-space:pre-wrap;word-break:break-word;
}
.doc-text::after{
  content:'|';
  font-weight:300;color:rgba(20,20,19,0.55);
  animation:blink .85s step-end infinite;
}
.doc-text.complete::after{animation:none;opacity:0}
@keyframes blink{0%,100%{opacity:.75}50%{opacity:0}}

/* D pills */
.doc-pills{
  display:flex;gap:6px;flex-wrap:wrap;
  padding:10px 16px 12px;border-top:.5px solid var(--border);
  min-height:44px;
}
.d-pill{
  font:600 10px 'DM Sans',sans-serif;letter-spacing:.04em;
  padding:3px 9px;border-radius:20px;
  opacity:0;transform:translateY(3px);
  transition:opacity .4s,transform .4s;
}
.d-pill.show{opacity:1;transform:none}
.d-pill.dk{background:rgba(20,20,19,0.86);color:#fff}
.d-pill.co{background:var(--coral);color:#fff}

/* Stage area */
.stage-area{
  margin-top:18px;min-height:72px;
  transition:opacity .25s;
}
.stage-area.fade{opacity:0}
.stage-label{
  font:600 11px 'DM Sans',sans-serif;letter-spacing:.06em;
  text-transform:uppercase;color:rgba(20,20,19,0.45);
  margin-bottom:6px;
  transition:color .3s;
}
.stage-label.dk{color:rgba(20,20,19,0.7)}
.stage-label.co{color:var(--coral)}
.stage-desc{
  font:400 15px/1.6 'Source Serif 4',serif;
  color:var(--dark);
}

/* Apply button */
.apply-btn{
  display:block;width:100%;margin-top:18px;
  background:var(--coral);border:none;border-radius:6px;
  padding:12px 20px;font:600 14px 'DM Sans',sans-serif;
  color:#fff;cursor:pointer;
  transition:background .15s,box-shadow .15s,opacity .2s;
  box-shadow:0 2px 8px rgba(217,119,87,0);
}
.apply-btn:hover:not(:disabled){
  background:#c46846;
  box-shadow:0 2px 12px rgba(217,119,87,0.35);
}
.apply-btn:disabled{opacity:0.38;cursor:default}
.apply-btn.gone{display:none}

/* Payoff */
.payoff{
  margin-top:20px;text-align:center;
  font:400 15px/1.65 'Source Serif 4',serif;
  color:var(--dark);opacity:0;transition:opacity .7s;
}
.payoff.show{opacity:1}
.payoff strong{font-weight:600}

.hint{font-size:12px;color:var(--muted);text-align:center;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Module 7 &middot; Tying It All Together</div>
  <h1>One task. Five moves. The full 4D workflow.</h1>

  <div class="doc-card">
    <div class="doc-head">
      <span class="doc-title">Ms. Okafor &mdash; Lesson Plan</span>
      <div class="prog-dots" id="prog"></div>
    </div>
    <div class="doc-body">
      <div class="doc-text" id="doc"></div>
    </div>
    <div class="doc-pills" id="pills"></div>
  </div>

  <div class="stage-area" id="stage-area">
    <div class="stage-label" id="stage-label"></div>
    <p class="stage-desc" id="stage-desc"></p>
  </div>

  <button class="apply-btn" id="btn" onclick="advance()" disabled>...</button>

  <div class="payoff" id="payoff">
    <strong>Five moves. One complete workflow.</strong><br>
    Now do it with something of your own.
  </div>

  <div class="hint" id="hint">Follow Ms. Okafor through a full 4D lesson planning workflow</div>
</div>

<script>
var docEl  = document.getElementById('doc');
var progEl = document.getElementById('prog');
var pillsEl= document.getElementById('pills');
var stageArea = document.getElementById('stage-area');
var labelEl= document.getElementById('stage-label');
var descEl = document.getElementById('stage-desc');
var btnEl  = document.getElementById('btn');
var payoffEl = document.getElementById('payoff');
var hintEl = document.getElementById('hint');

// ── Data ──────────────────────────────────────────────────────

var BLOCKS = [
  // 0: Initial task (no pill, shown on load)
  {
    text: 'Need: Differentiated reading passages on\nthe circulatory system for 7th grade science.\n\n3 reading levels (4th, 6th, 8th grade).\n4 students with IEPs. Multilingual learners.\nEnd goal: claim-evidence-reasoning task.',
    pill: null,
    speed: 22,
  },
  // 1: Delegation
  {
    text: '\n\nDelegation: AI drafts the reading scaffold.\nMs. Okafor reviews, adapts, and owns\nthe final product and its pedagogical fit.',
    pill: {label:'Delegation', dk:true},
    speed: 24,
  },
  // 2: Diligence
  {
    text: '\n\nDiligence:\n\u2713 District-approved tool confirmed\n\u2713 No student names in prompt\n\u2713 IEP details de-identified\n\u2713 Anonymized class context only',
    pill: {label:'Diligence', dk:true},
    speed: 24,
  },
  // 3: Description
  {
    text: '\n\nPrompt: "Write 3 informational passages on\nthe circulatory system at 4th, 6th, and 8th\ngrade reading levels. Include: chamber, valve,\nartery, vein. Align to NGSS LS1.A. Each\npassage should set up a CER writing task."',
    pill: {label:'Description', dk:false},
    speed: 20,
  },
  // 4: Discernment
  {
    text: '\n\nDiscernment review:\n\u2713 Reading levels accurate\n\u2713 Science accurate\n\u26a0 8th grade passage: "blood vessels" too\n  generic -- revised to distinguish arteries,\n  veins, and capillaries specifically\n\u2713 CER task setup confirmed in all three',
    pill: {label:'Discernment', dk:false},
    speed: 20,
  },
  // 5: Diligence (final sign-off)
  {
    text: '\n\n\u2713 No student data included\n\u2713 Science verified by teacher\n\u2713 Pedagogical judgment applied\n\u2713 Ready for classroom use',
    pill: {label:'Diligence \u2713', dk:true},
    speed: 24,
  },
];

// Info shown AFTER each block types (before next click)
var INFO = [
  // After block 0
  {
    d: null,
    desc: 'Ms. Okafor has a task. Before opening AI -- does it belong here, and on what terms?',
    btn: 'Apply Delegation \u2192',
  },
  // After block 1 (Delegation applied)
  {
    d: 'Delegation',
    dk: true,
    desc: 'Scope set. AI drafts, Ms. Okafor owns. Next -- is it safe to proceed?',
    btn: 'Apply Diligence \u2192',
  },
  // After block 2 (Diligence)
  {
    d: 'Diligence',
    dk: true,
    desc: 'Guardrails confirmed. Now tell AI exactly what you need.',
    btn: 'Apply Description \u2192',
  },
  // After block 3 (Description)
  {
    d: 'Description',
    dk: false,
    desc: 'AI returned three passages. Does the output hold up?',
    btn: 'Apply Discernment \u2192',
  },
  // After block 4 (Discernment)
  {
    d: 'Discernment',
    dk: false,
    desc: 'Error caught and fixed. One last step -- your professional sign-off.',
    btn: 'Apply Diligence \u2192',
  },
  // After block 5 (final Diligence) -- complete
  {d: null, desc: null, btn: null},
];

// ── State ─────────────────────────────────────────────────────
var blockIdx = -1;
var fullText = '';
var typing   = false;
var typeTimer = null;

// ── Progress dots ─────────────────────────────────────────────
(function buildDots(){
  for(var i=0;i<5;i++){
    var d=document.createElement('div');
    d.className='prog-dot';
    progEl.appendChild(d);
  }
})();

function updateDots(bi){
  // dots 0-4 correspond to blocks 1-5
  var dots=progEl.querySelectorAll('.prog-dot');
  var di=bi-1; // -1 when only block0 shown
  dots.forEach(function(d,i){
    d.classList.remove('done','active');
    if(i<di) d.classList.add('done');
    else if(i===di) d.classList.add('active');
  });
}

// ── Typewriter ────────────────────────────────────────────────
function typeBlock(bi, onDone){
  typing=true;
  btnEl.disabled=true;
  var chars=BLOCKS[bi].text.split('');
  var spd=BLOCKS[bi].speed;
  var i=0;
  function tick(){
    if(i<chars.length){
      fullText+=chars[i++];
      docEl.textContent=fullText;
      typeTimer=setTimeout(tick,spd);
    } else {
      typing=false;
      if(onDone) onDone();
    }
  }
  tick();
}

// ── Pills ─────────────────────────────────────────────────────
function addPill(pill){
  if(!pill) return;
  var p=document.createElement('span');
  p.className='d-pill '+(pill.dk?'dk':'co');
  p.textContent=pill.label;
  pillsEl.appendChild(p);
  // Trigger animation
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){ p.classList.add('show'); });
  });
}

// ── Stage info ────────────────────────────────────────────────
function showInfo(bi){
  var info=INFO[bi];

  // Fade area in after brief pause
  stageArea.classList.remove('fade');

  if(info.d){
    labelEl.textContent=info.d;
    labelEl.className='stage-label '+(info.dk?'dk':'co');
  } else {
    labelEl.textContent='';
    labelEl.className='stage-label';
  }

  if(info.desc){
    descEl.textContent=info.desc;
  } else {
    descEl.textContent='';
  }

  if(info.btn){
    btnEl.textContent=info.btn;
    btnEl.disabled=false;
    btnEl.classList.remove('gone');
  } else {
    // Complete
    btnEl.classList.add('gone');
    docEl.classList.add('complete');
    setTimeout(function(){
      payoffEl.classList.add('show');
      hintEl.style.opacity='0';
    },400);
  }
}

// ── Advance ───────────────────────────────────────────────────
function advance(){
  if(typing) return;
  var next=blockIdx+1;
  if(next>=BLOCKS.length) return;

  blockIdx=next;

  // Fade stage area out while typing
  stageArea.classList.add('fade');

  typeBlock(blockIdx, function(){
    addPill(BLOCKS[blockIdx].pill);
    updateDots(blockIdx);
    setTimeout(function(){
      showInfo(blockIdx);
    },180);
  });
}

// ── Init ──────────────────────────────────────────────────────
// Type initial block on load
blockIdx=0;
typeBlock(0, function(){
  updateDots(0);
  showInfo(0);
});
</script>
</body>
</html>
