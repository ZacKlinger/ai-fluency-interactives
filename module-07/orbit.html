<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chain Reaction &mdash; Module 7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf9f5;--surface:#f0eee6;--dark:#141413;
  --muted:rgba(20,20,19,0.42);--border:rgba(20,20,19,0.1);--coral:#d97757;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--dark);font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
}
.wrap{width:100%;max-width:560px}
.eyebrow{
  text-align:center;font-size:11px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);margin-bottom:8px;
}
h1{
  text-align:center;font-family:'Source Serif 4',serif;
  font-size:20px;font-weight:400;line-height:1.35;margin-bottom:20px;
}
canvas{
  display:block;width:100%;border-radius:8px;
  background:var(--surface);cursor:default;touch-action:none;
}
.cap{min-height:52px;margin-top:16px;text-align:center;padding:0 8px}
.cap p{
  font-family:'Source Serif 4',serif;font-size:15px;
  line-height:1.6;color:var(--dark);opacity:0;
  transition:opacity .5s ease;
}
.cap p.show{opacity:1}
.hint{
  font-size:12px;color:var(--muted);text-align:center;
  margin-top:6px;min-height:18px;transition:opacity .3s;
}
.actions{
  display:flex;gap:8px;justify-content:center;
  margin-top:16px;flex-wrap:wrap;
}
.btn{
  background:none;border:.5px solid var(--border);border-radius:6px;
  padding:7px 18px;font:500 13px 'DM Sans',sans-serif;
  color:var(--dark);cursor:pointer;
  transition:border-color .15s,color .15s,background .15s;
}
.btn:hover{border-color:var(--coral);color:var(--coral)}
.btn.on{background:var(--coral);border-color:var(--coral);color:#fff}
.btn.on:hover{background:#c46846;border-color:#c46846}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Module 7 &middot; Tying It All Together</div>
  <h1>The 4D Framework is a chain reaction.</h1>
  <canvas id="c"></canvas>
  <div class="cap"><p id="cap-text"></p></div>
  <div class="hint" id="hint">Pull any ball back and release</div>
  <div class="actions">
    <button class="btn" id="btn-demo" onclick="autoDemo()">Auto demo</button>
    <button class="btn" id="btn-remove" onclick="toggleRemoveMode()">Remove a D</button>
    <button class="btn" id="btn-reset" onclick="resetAll()">Reset</button>
  </div>
</div>

<script>
var C=document.getElementById('c');
var CTX=C.getContext('2d');
var capEl=document.getElementById('cap-text');
var hintEl=document.getElementById('hint');
var btnRemove=document.getElementById('btn-remove');

var W,H,BAR_Y,PX,LL,RAD,SP,GOL;

function resize(){
  W=C.offsetWidth;
  H=Math.round(W*0.60);
  C.width=Math.round(W*devicePixelRatio);
  C.height=Math.round(H*devicePixelRatio);
  C.style.height=H+'px';
  CTX.setTransform(1,0,0,1,0,0);
  CTX.scale(devicePixelRatio,devicePixelRatio);
  RAD=Math.max(20,Math.round(W*0.042));
  SP=RAD*2+2;
  LL=H*0.55;
  BAR_Y=H*0.10;
  GOL=980/LL;
  var s0=W/2-SP*1.5;
  PX=[s0,s0+SP,s0+SP*2,s0+SP*3];
}

var BALLS=[
  {t:0,o:0,rm:false,name:'Delegation', sub:'Ethical Focus',dark:true},
  {t:0,o:0,rm:false,name:'Diligence',  sub:'Ethical Focus',dark:true},
  {t:0,o:0,rm:false,name:'Description',sub:'Quality Focus',dark:false},
  {t:0,o:0,rm:false,name:'Discernment',sub:'Quality Focus',dark:false},
];

var DAMP=0.006,SUBS=8;
var drag=-1,removeMode=false;
var hasSwung=false,gapShown=false,restored=false;
var capTimer=null;
var lastT=performance.now();

function bx(i){return PX[i]+LL*Math.sin(BALLS[i].t);}
function by(i){return BAR_Y+LL*Math.cos(BALLS[i].t);}

function physics(dt){
  var sub_dt=dt/SUBS;
  for(var s=0;s<SUBS;s++){
    for(var i=0;i<4;i++){
      if(BALLS[i].rm||drag===i) continue;
      var a=-GOL*Math.sin(BALLS[i].t)-DAMP*BALLS[i].o;
      BALLS[i].o+=a*sub_dt;
      BALLS[i].t+=BALLS[i].o*sub_dt;
    }
    // 3 passes for chain collision propagation
    for(var pass=0;pass<3;pass++){
      for(var i=0;i<3;i++){
        if(BALLS[i].rm||BALLS[i+1].rm) continue;
        var xi=bx(i),xi1=bx(i+1);
        var gap=xi1-xi-2*RAD;
        if(gap<0){
          var ci=Math.max(0.1,Math.cos(BALLS[i].t));
          var ci1=Math.max(0.1,Math.cos(BALLS[i+1].t));
          var vi=LL*BALLS[i].o*ci;
          var vi1=LL*BALLS[i+1].o*ci1;
          if(vi>vi1){
            BALLS[i].o=vi1/LL/ci;
            BALLS[i+1].o=vi/LL/ci1;
            var half=-gap*0.5;
            BALLS[i].t-=half/LL;
            BALLS[i+1].t+=half/LL;
          }
        }
      }
    }
  }
}

function rrect(x,y,w,h,r){
  CTX.beginPath();
  CTX.moveTo(x+r,y);
  CTX.lineTo(x+w-r,y);
  CTX.quadraticCurveTo(x+w,y,x+w,y+r);
  CTX.lineTo(x+w,y+h-r);
  CTX.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  CTX.lineTo(x+r,y+h);
  CTX.quadraticCurveTo(x,y+h,x,y+h-r);
  CTX.lineTo(x,y+r);
  CTX.quadraticCurveTo(x,y,x+r,y);
  CTX.closePath();
}

function draw(){
  CTX.clearRect(0,0,W,H);

  // Bar
  var barX=PX[0]-RAD-2;
  var barW=PX[3]-PX[0]+RAD*2+4;
  CTX.fillStyle='rgba(20,20,19,0.82)';
  rrect(barX,BAR_Y-6,barW,12,4);
  CTX.fill();

  for(var i=0;i<4;i++){
    var b=BALLS[i];
    var bbx=bx(i),bby=by(i);

    // String
    CTX.beginPath();
    CTX.moveTo(PX[i],BAR_Y);
    CTX.lineTo(bbx,bby);
    if(b.rm){
      CTX.setLineDash([5,4]);
      CTX.strokeStyle='rgba(20,20,19,0.18)';
    } else {
      CTX.setLineDash([]);
      CTX.strokeStyle='rgba(20,20,19,0.32)';
    }
    CTX.lineWidth=1;
    CTX.stroke();
    CTX.setLineDash([]);

    // Ball
    CTX.beginPath();
    CTX.arc(bbx,bby,RAD,0,Math.PI*2);
    if(b.rm){
      CTX.fillStyle='rgba(20,20,19,0.04)';
      CTX.fill();
      CTX.strokeStyle='rgba(20,20,19,0.22)';
      CTX.lineWidth=1;
      CTX.stroke();
    } else {
      CTX.fillStyle=b.dark?'rgba(20,20,19,0.88)':'rgba(217,119,87,0.92)';
      CTX.fill();
      // Label inside ball
      var sz=Math.max(9,Math.round(RAD*0.44));
      var label=RAD>24?b.name.substring(0,3):b.name[0];
      CTX.fillStyle='rgba(255,255,255,0.92)';
      CTX.font='600 '+sz+'px "DM Sans"';
      CTX.textAlign='center';
      CTX.textBaseline='middle';
      CTX.fillText(label,bbx,bby);
    }

    // Name label below — anchored to pivot x for stability while swinging
    var labelY=BAR_Y+LL+RAD+8;
    CTX.textAlign='center';
    CTX.textBaseline='top';
    CTX.font='500 11px "DM Sans"';
    CTX.fillStyle=b.rm?'rgba(20,20,19,0.22)':'rgba(20,20,19,0.78)';
    CTX.fillText(b.name,PX[i],labelY);
    CTX.font='400 10px "DM Sans"';
    CTX.fillStyle=b.rm?'rgba(20,20,19,0.14)':'rgba(20,20,19,0.42)';
    CTX.fillText(b.sub,PX[i],labelY+14);
  }
}

function setCaption(text){
  if(capTimer) clearTimeout(capTimer);
  capEl.classList.remove('show');
  capTimer=setTimeout(function(){
    capEl.textContent=text;
    capEl.classList.add('show');
  },280);
}

function getPos(e){
  var r=C.getBoundingClientRect();
  var src=e.touches?e.touches[0]:e;
  return {x:(src.clientX-r.left),y:(src.clientY-r.top)};
}

function onDown(e){
  if(e.cancelable) e.preventDefault();
  var m=getPos(e);
  for(var i=0;i<4;i++){
    var dx=m.x-bx(i),dy=m.y-by(i);
    if(Math.sqrt(dx*dx+dy*dy)<=RAD+8){
      if(removeMode){
        BALLS[i].rm=!BALLS[i].rm;
        var anyRemoved=BALLS.some(function(b){return b.rm;});
        if(anyRemoved){
          var names=BALLS.filter(function(b){return b.rm;}).map(function(b){return b.name;});
          gapShown=true;
          setCaption('Without '+names.join(' or ')+', the chain breaks here. All four are essential.');
          hintEl.textContent='Pull any ball to see the gap';
        } else {
          restored=true;
          setCaption('Four Ds. One unbroken practice. Now make it yours.');
          hintEl.textContent='';
        }
      } else {
        drag=i;
        BALLS[i].o=0;
        C.style.cursor='grabbing';
      }
      return;
    }
  }
}

function onMove(e){
  if(drag<0) return;
  if(e.cancelable) e.preventDefault();
  var m=getPos(e);
  var theta=Math.atan2(m.x-PX[drag],m.y-BAR_Y);
  BALLS[drag].t=Math.max(-0.45,Math.min(0.45,theta));
  BALLS[drag].o=0;
}

function onUp(){
  if(drag>=0){
    if(!hasSwung&&Math.abs(BALLS[drag].t)>0.05){
      hasSwung=true;
      if(!gapShown&&!restored){
        setCaption('Each D passes energy to the next \u2014 this is the 4D chain reaction.');
        hintEl.textContent='Try pulling from the other end';
      }
    }
    drag=-1;
    C.style.cursor=removeMode?'pointer':'default';
  }
}

C.addEventListener('mousedown',onDown);
C.addEventListener('mousemove',onMove);
C.addEventListener('mouseup',onUp);
C.addEventListener('mouseleave',onUp);
C.addEventListener('touchstart',onDown,{passive:false});
C.addEventListener('touchmove',onMove,{passive:false});
C.addEventListener('touchend',onUp);

function autoDemo(){
  resetAll(true);
  setTimeout(function(){
    BALLS[0].t=-0.65;
    BALLS[0].o=0;
    hasSwung=true;
    setCaption('Each D passes energy to the next \u2014 this is the 4D chain reaction.');
    hintEl.textContent='Pull any ball to keep exploring';
  },80);
}

function toggleRemoveMode(){
  removeMode=!removeMode;
  btnRemove.classList.toggle('on',removeMode);
  C.style.cursor=removeMode?'pointer':'default';
  if(removeMode){
    hintEl.textContent='Click any ball to remove it from the chain';
  } else {
    var anyRemoved=BALLS.some(function(b){return b.rm;});
    hintEl.textContent=anyRemoved?'Pull any ball to see the gap':'Pull any ball back and release';
  }
}

function resetAll(silent){
  BALLS.forEach(function(b){b.t=0;b.o=0;b.rm=false;});
  removeMode=false;
  drag=-1;
  hasSwung=false;
  gapShown=false;
  restored=false;
  btnRemove.classList.remove('on');
  C.style.cursor='default';
  if(!silent){
    if(capTimer) clearTimeout(capTimer);
    capEl.classList.remove('show');
    setTimeout(function(){capEl.textContent='';},500);
    hintEl.textContent='Pull any ball back and release';
  }
}

function loop(ts){
  var dt=Math.min((ts-lastT)/1000,0.033);
  lastT=ts;
  if(drag<0) physics(dt);
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('resize',function(){resize();draw();});
resize();
requestAnimationFrame(function(ts){lastT=ts;loop(ts);});
</script>
</body>
</html>
