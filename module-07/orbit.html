<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Workflow &mdash; Module 7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf9f5;--surface:#f0eee6;--dark:#141413;
  --muted:rgba(20,20,19,0.42);--border:rgba(20,20,19,0.1);
  --coral:#cc6b5a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--dark);font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
}
.wrap{width:100%;max-width:540px}
.eyebrow{
  text-align:center;font-size:11px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);margin-bottom:8px;
}
h1{
  text-align:center;font-family:'Source Serif 4',serif;
  font-size:20px;font-weight:400;line-height:1.35;margin-bottom:16px;
}
.diagram-wrap{
  background:var(--surface);border-radius:8px;
  border:.5px solid var(--border);overflow:hidden;
  position:relative;
}
#svg{display:block;width:100%;height:auto}
.caption-area{min-height:72px;margin-top:14px;text-align:center;padding:0 8px}
.step-label{
  font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;min-height:15px;
}
.caption-text{
  font-family:'Source Serif 4',serif;font-size:15px;line-height:1.6;
  color:var(--dark);opacity:0;transition:opacity .4s;
}
.caption-text.show{opacity:1}
.nav-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px}
.nav-btn{
  padding:9px 20px;border-radius:6px;
  font:600 13px 'DM Sans',sans-serif;cursor:pointer;
  transition:background .2s,border-color .2s,color .2s,opacity .2s;
}
.nav-btn.prev{
  background:none;color:var(--muted);
  border:.5px solid var(--border);
}
.nav-btn.prev:hover:not(:disabled){border-color:rgba(20,20,19,0.4);color:var(--dark)}
.nav-btn.prev:disabled{opacity:.28;cursor:default;pointer-events:none}
.nav-btn.next{
  background:rgba(20,20,19,0.88);color:#fff;
  border:.5px solid transparent;
  box-shadow:0 2px 12px rgba(20,20,19,0.18);
}
.nav-btn.next:hover:not(:disabled){background:rgba(20,20,19,1)}
.nav-btn.next:disabled{opacity:.45;cursor:default;pointer-events:none}
.nav-btn.next.restart{
  background:var(--coral);
  box-shadow:0 2px 12px rgba(204,107,90,0.28);
}
.nav-btn.next.restart:hover{background:#b85d4c}
.dots{display:flex;gap:7px;align-items:center}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(20,20,19,0.15);
  transition:background .3s,transform .3s;
}
.dot.active{background:rgba(20,20,19,0.72);transform:scale(1.3)}
@keyframes flow{to{stroke-dashoffset:-300}}
.arc{animation:flow 9s linear infinite}
@keyframes outerPulse{
  0%,100%{stroke:rgba(20,20,19,0.16)}
  50%{stroke:rgba(20,20,19,0.44)}
}
.pulse-outer{animation:outerPulse 2.4s ease-in-out infinite}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Module 7 &middot; Tying It All Together</div>
  <h1>Two loops. One workflow.</h1>

  <div class="diagram-wrap">
    <svg id="svg" width="560" height="430" viewBox="0 0 560 430"
         preserveAspectRatio="xMidYMid meet">
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="8" refX="5.5" refY="4" orient="auto">
          <path d="M1.5,1.5 L6,4 L1.5,6.5" fill="none" stroke="rgba(20,20,19,0.28)"
            stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
        </marker>
      </defs>

      <!-- Outer group: ellipse + Delegation + Diligence -->
      <g id="og">
        <ellipse id="outerE" cx="280" cy="210" rx="236" ry="170"
          fill="none" stroke="rgba(20,20,19,0.12)" stroke-width="0.5"/>

        <!-- Delegation -->
        <g id="nDel" transform="translate(280,40)">
          <rect x="-80" y="-30" width="160" height="60" rx="10" fill="#f0eee6"/>
          <rect id="nDelFill" x="-80" y="-30" width="160" height="60" rx="10"
            fill="#cc6b5a" fill-opacity="0.07"/>
          <rect x="-80" y="-30" width="160" height="60" rx="10"
            fill="none" stroke="#cc6b5a" stroke-width="0.5"/>
          <text id="nDelTxt" text-anchor="middle" dominant-baseline="middle"
            style="font-family:'Source Serif 4',Georgia,serif;font-size:15px;font-weight:400"
            fill="#cc6b5a">Delegation</text>
        </g>

        <!-- Diligence -->
        <g id="nDil" transform="translate(280,380)">
          <rect x="-80" y="-30" width="160" height="60" rx="10" fill="#f0eee6"/>
          <rect id="nDilFill" x="-80" y="-30" width="160" height="60" rx="10"
            fill="#cc6b5a" fill-opacity="0.07"/>
          <rect x="-80" y="-30" width="160" height="60" rx="10"
            fill="none" stroke="#cc6b5a" stroke-width="0.5"/>
          <text id="nDilTxt" text-anchor="middle" dominant-baseline="middle"
            style="font-family:'Source Serif 4',Georgia,serif;font-size:15px;font-weight:400"
            fill="#cc6b5a">Diligence</text>
        </g>
      </g>

      <!-- Inner arcs -->
      <path id="arcTop" class="arc"
        d="M 154,210 C 154,106 406,106 406,210"
        fill="none" stroke="rgba(20,20,19,0.14)" stroke-width="1"
        stroke-dasharray="4 6" marker-end="url(#arr)"/>
      <path id="arcBot" class="arc"
        d="M 406,210 C 406,314 154,314 154,210"
        fill="none" stroke="rgba(20,20,19,0.14)" stroke-width="1"
        stroke-dasharray="4 6" marker-end="url(#arr)"/>

      <!-- Description -->
      <g id="nDes" transform="translate(154,210)">
        <rect x="-80" y="-30" width="160" height="60" rx="10" fill="#f0eee6"/>
        <rect id="nDesFill" x="-80" y="-30" width="160" height="60" rx="10"
          fill="#cc6b5a" fill-opacity="1"/>
        <text text-anchor="middle" dominant-baseline="middle"
          style="font-family:'Source Serif 4',Georgia,serif;font-size:15px;font-weight:400"
          fill="#faf9f5">Description</text>
      </g>

      <!-- Discernment -->
      <g id="nDsc" transform="translate(406,210)">
        <rect x="-80" y="-30" width="160" height="60" rx="10" fill="#f0eee6"/>
        <rect id="nDscFill" x="-80" y="-30" width="160" height="60" rx="10"
          fill="#cc6b5a" fill-opacity="1"/>
        <text text-anchor="middle" dominant-baseline="middle"
          style="font-family:'Source Serif 4',Georgia,serif;font-size:15px;font-weight:400"
          fill="#faf9f5">Discernment</text>
      </g>
    </svg>
  </div>

  <div class="caption-area">
    <div class="step-label" id="stepLabel"></div>
    <p class="caption-text" id="captionText"></p>
  </div>

  <div class="nav-row">
    <button class="nav-btn prev" id="btnPrev" disabled>&#8592;</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn next" id="btnNext">Begin &#8594;</button>
  </div>
</div>

<script>
var svg       = document.getElementById('svg');
var btnNext   = document.getElementById('btnNext');
var btnPrev   = document.getElementById('btnPrev');
var dotsEl    = document.getElementById('dots');
var stepLabel = document.getElementById('stepLabel');
var captionEl = document.getElementById('captionText');

var outerE   = document.getElementById('outerE');
var arcTop   = document.getElementById('arcTop');
var arcBot   = document.getElementById('arcBot');
var nDelFill = document.getElementById('nDelFill');
var nDilFill = document.getElementById('nDilFill');
var nDesFill = document.getElementById('nDesFill');
var nDscFill = document.getElementById('nDscFill');

// Scene definitions
// type 'content' = click to advance, dot index shown
// type 'transition' = auto-advances after 2s, button locked
var SCENES = [
  { vb:[0,0,560,430],    type:'content',    dot:0, label:'',
    btn:'Begin \u2192',
    caption:'A teacher. A task. The 4D workflow. Follow Marcus through the framework.' },
  { vb:[160,-50,240,160],type:'content',    dot:1, label:'Step 1 of 4',
    btn:'Continue \u2192',
    caption:'Delegation: Marcus decides to design his PD session with AI \u2014 and sets the terms for what AI will handle.' },
  { vb:[0,0,560,430],    type:'transition', dot:-1, label:'Step 1 of 4',
    btn:'Continue \u2192', caption:'' },
  { vb:[140,310,280,160],type:'content',    dot:2, label:'Step 2 of 4',
    btn:'Continue \u2192',
    caption:'Diligence: Before touching any tool \u2014 he checks district guidance and selects a compliant platform. Boundaries first.' },
  { vb:[0,0,560,430],    type:'transition', dot:-1, label:'Step 2 of 4',
    btn:'Continue \u2192', caption:'' },
  { vb:[54,100,452,240], type:'content',    dot:3, label:'Step 3 of 4',
    btn:'Continue \u2192',
    caption:'Description + Discernment: He crafts a precise prompt. Evaluates what comes back. Refines. Repeats. This is where the quality happens.' },
  { vb:[0,0,560,430],    type:'transition', dot:-1, label:'Step 3 of 4',
    btn:'Continue \u2192', caption:'' },
  { vb:[140,310,280,160],type:'content',    dot:4, label:'Step 4 of 4',
    btn:'Complete \u2192',
    caption:'Diligence again: The outer loop closes. Marcus reviews everything before it reaches a student. His name. His call.' },
  { vb:[0,0,560,430],    type:'content',    dot:5, label:'',
    btn:'Start over',
    caption:'Outer loop. Inner loop. Outer loop. Two loops working together \u2014 a map you can follow for any task.' }
];

var DOT_COUNT = 6;
var sceneIdx  = 0;
var locked    = false;
var currentVB = [0,0,560,430];
var targetVB  = [0,0,560,430];

// Build dots
for(var i = 0; i < DOT_COUNT; i++){
  var d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  dotsEl.appendChild(d);
}

function lerp(a, b, t){ return a + (b - a) * t; }

function applyHighlight(idx){
  // Reset
  outerE.setAttribute('stroke', 'rgba(20,20,19,0.12)');
  outerE.setAttribute('stroke-width', '0.5');
  outerE.classList.remove('pulse-outer');
  arcTop.setAttribute('stroke', 'rgba(20,20,19,0.14)');
  arcBot.setAttribute('stroke', 'rgba(20,20,19,0.14)');
  nDelFill.setAttribute('fill-opacity', '0.07');
  nDilFill.setAttribute('fill-opacity', '0.07');
  nDesFill.setAttribute('fill-opacity', '1');
  nDscFill.setAttribute('fill-opacity', '1');

  if(idx === 1){ // Delegation zoom
    outerE.setAttribute('stroke', 'rgba(20,20,19,0.3)');
    outerE.setAttribute('stroke-width', '1');
    nDelFill.setAttribute('fill-opacity', '0.3');
    nDesFill.setAttribute('fill-opacity', '0.45');
    nDscFill.setAttribute('fill-opacity', '0.45');
  } else if(idx === 3 || idx === 7){ // Diligence zoom
    outerE.setAttribute('stroke', 'rgba(20,20,19,0.3)');
    outerE.setAttribute('stroke-width', '1');
    nDilFill.setAttribute('fill-opacity', '0.3');
    nDesFill.setAttribute('fill-opacity', '0.45');
    nDscFill.setAttribute('fill-opacity', '0.45');
  } else if(idx === 5){ // Inner loop
    arcTop.setAttribute('stroke', 'rgba(204,107,90,0.65)');
    arcBot.setAttribute('stroke', 'rgba(204,107,90,0.65)');
    outerE.setAttribute('stroke', 'rgba(20,20,19,0.06)');
    nDelFill.setAttribute('fill-opacity', '0.02');
    nDilFill.setAttribute('fill-opacity', '0.02');
  } else if(idx === 8){ // Complete
    outerE.setAttribute('stroke-width', '1.2');
    outerE.classList.add('pulse-outer');
    nDelFill.setAttribute('fill-opacity', '0.2');
    nDilFill.setAttribute('fill-opacity', '0.2');
    arcTop.setAttribute('stroke', 'rgba(204,107,90,0.45)');
    arcBot.setAttribute('stroke', 'rgba(204,107,90,0.45)');
  }
}

function updateDots(dotIdx){
  var all = dotsEl.querySelectorAll('.dot');
  for(var i = 0; i < all.length; i++){
    all[i].classList.toggle('active', i === dotIdx);
  }
}

function setCaption(text, label){
  captionEl.classList.remove('show');
  stepLabel.textContent = label || '';
  if(!text){ return; }
  var t = text;
  setTimeout(function(){
    captionEl.textContent = t;
    captionEl.classList.add('show');
  }, 220);
}

function goToScene(idx){
  if(idx < 0 || idx >= SCENES.length) return;
  sceneIdx = idx;
  var s = SCENES[idx];
  targetVB = s.vb.slice();
  applyHighlight(idx);

  if(s.dot >= 0) updateDots(s.dot);

  if(s.type !== 'transition'){
    setCaption(s.caption, s.label);
  }

  btnNext.textContent = s.btn;
  btnNext.classList.toggle('restart', idx === SCENES.length - 1);
  btnPrev.disabled = (idx === 0);

  if(s.type === 'transition'){
    locked = true;
    btnNext.disabled = true;
    setTimeout(function(){
      locked = false;
      goToScene(sceneIdx + 1);
    }, 2000);
  } else {
    btnNext.disabled = false;
  }
}

btnNext.addEventListener('click', function(){
  if(locked) return;
  if(sceneIdx >= SCENES.length - 1){
    goToScene(0);
  } else {
    goToScene(sceneIdx + 1);
  }
});

btnPrev.addEventListener('click', function(){
  if(locked) return;
  // Walk back past transition scenes
  var target = sceneIdx - 1;
  while(target > 0 && SCENES[target].type === 'transition') target--;
  goToScene(Math.max(0, target));
});

function frame(){
  var snap = true;
  var next = currentVB.map(function(v, i){
    var n = lerp(v, targetVB[i], 0.055);
    if(Math.abs(n - targetVB[i]) > 0.05) snap = false;
    return n;
  });
  if(snap){
    currentVB = targetVB.slice();
  } else {
    currentVB = next;
  }
  svg.setAttribute('viewBox', currentVB.join(' '));
  requestAnimationFrame(frame);
}

goToScene(0);
requestAnimationFrame(frame);
</script>
</body>
</html>
