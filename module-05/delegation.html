<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What's Worth Delegating - Module 5 - AI Fluency for K-12 Educators</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300..700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f5;--surface:#f0eee6;--dark:#141413;
  --muted:rgba(20,20,19,0.42);--border:rgba(20,20,19,0.1);
  --coral:#d97757;--blue:#6a9bcc;--amber:#9a6e2a;--green:#3d6b4f;
  --sans:'DM Sans',Arial,sans-serif;--serif:'Source Serif 4',Georgia,serif;
}
html,body{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;font-family:var(--sans);color:var(--dark)}
.stage{width:100%;max-width:720px;position:relative}
.status-badge{position:absolute;top:0;right:0;z-index:10;font-size:9.5px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;background:var(--surface);border:0.5px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:0 6px 0 4px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:6px;overflow:hidden}
.top-bar{padding:1.75rem 2rem 0;padding-right:9rem}
.eyebrow{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted)}
.title-area{padding:0.75rem 2rem 0.5rem}
.headline{font-family:var(--serif);font-variation-settings:'opsz' 24;font-size:clamp(20px,2.8vw,26px);font-weight:600;color:var(--dark);line-height:1.2;margin-bottom:0.25rem;letter-spacing:-0.025em}
.subhead{font-size:13px;color:var(--muted);line-height:1.5}

/* Progress */
.progress-wrap{padding:0 2rem 0.9rem}
.progress-meta{font-size:10px;color:var(--muted);margin-bottom:0.4rem;display:flex;justify-content:space-between}
.progress-track{height:2px;background:var(--border);border-radius:1px}
.progress-fill{height:100%;background:var(--coral);border-radius:1px;transition:width 0.4s ease;width:0%}

/* Arena */
.arena{padding:1.75rem 2rem 1.75rem;background:var(--surface);border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:1.5rem;min-height:320px;justify-content:center}

/* Deck */
.deck-wrap{position:relative;width:100%;max-width:460px;height:130px}
.task-card{
  position:absolute;inset:0;background:var(--bg);border:0.5px solid var(--border);border-radius:6px;
  padding:1.4rem 1.75rem;display:flex;align-items:center;
  transition:transform 0.3s ease,opacity 0.3s ease;pointer-events:none;
}
.task-card.active{z-index:10;pointer-events:auto}
.task-card.behind-1{transform:translateY(7px) scale(0.97);opacity:0.5;z-index:5}
.task-card.behind-2{transform:translateY(13px) scale(0.94);opacity:0.25;z-index:1}
.task-text{font-family:var(--serif);font-variation-settings:'opsz' 15;font-size:15px;font-weight:400;color:var(--dark);line-height:1.5}

/* Fly */
.fly-left{transform:translateX(-130%) rotate(-10deg) !important;opacity:0 !important;transition:transform 0.26s ease-in,opacity 0.18s !important}
.fly-up{transform:translateY(-80px) scale(0.93) !important;opacity:0 !important;transition:transform 0.26s ease-in,opacity 0.18s !important}
.fly-right{transform:translateX(130%) rotate(10deg) !important;opacity:0 !important;transition:transform 0.26s ease-in,opacity 0.18s !important}

/* Hint card */
.hint-card{
  position:absolute;inset:0;background:var(--bg);
  border:0.5px solid var(--border);border-radius:6px;
  padding:1.25rem 1.5rem 1rem;
  display:flex;flex-direction:column;justify-content:space-between;gap:0.6rem;
  opacity:0;pointer-events:none;transition:opacity 0.2s;z-index:20;
}
.hint-card.show{opacity:1;pointer-events:auto}
.hint-card.incorrect{border-color:#b94a38;cursor:pointer}
.hint-card.correct{border-color:var(--green)}
.hint-top{display:flex;align-items:flex-start;gap:0.75rem}
.hint-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:0.35rem}
.hint-dot.correct-dot{background:var(--green)}
.hint-dot.wrong-dot{background:#b94a38}
.hint-text{font-family:var(--serif);font-variation-settings:'opsz' 14;font-size:14px;color:var(--dark);line-height:1.6}
.hint-footer{font-size:10.5px;color:var(--muted);letter-spacing:0.04em;align-self:flex-end}
.hint-footer.tap{color:var(--amber);font-weight:500}
.hint-footer.tap-correct{color:var(--green);font-weight:500}

/* Zone buttons */
.zones{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.55rem;width:100%;max-width:490px}
.zone-btn{
  font-family:var(--sans);font-size:11.5px;font-weight:500;
  padding:0.7rem 0.5rem;border-radius:4px;cursor:pointer;
  border:0.5px solid var(--border);background:var(--bg);color:var(--muted);
  transition:background 0.15s,border-color 0.15s,color 0.15s,transform 0.1s;
  text-align:center;line-height:1.35;
}
.zone-btn:hover{transform:translateY(-2px)}
.zone-btn:active{transform:translateY(0)}
.zone-btn.z-mine:hover{background:var(--coral);border-color:var(--coral);color:#fff}
.zone-btn.z-collab:hover{background:var(--coral);border-color:var(--coral);color:#fff}
.zone-btn.z-ai:hover{background:var(--coral);border-color:var(--coral);color:#fff}
/* Flash states */
.zone-btn.flash-correct{background:var(--green) !important;border-color:var(--green) !important;color:#fff !important;transform:scale(1.1) translateY(-3px) !important;box-shadow:0 6px 20px rgba(61,107,79,0.38) !important;transition:transform 0.12s,box-shadow 0.12s !important}
.zone-btn.flash-wrong{background:#b94a38 !important;border-color:#b94a38 !important;color:#fff !important;transform:scale(1.04) !important;transition:transform 0.1s !important}
.zone-name{display:block;font-weight:600;font-size:12px;margin-bottom:2px}
.zone-sub{display:block;font-size:10px;opacity:0.7}
.key-hint{font-size:10px;color:var(--muted);letter-spacing:0.03em;opacity:0.65}

/* Results */
.results{padding:2rem;display:none}
.results.visible{display:block}
.result-hed{font-family:var(--serif);font-variation-settings:'opsz' 22;font-size:clamp(18px,2.6vw,24px);font-weight:600;color:var(--dark);letter-spacing:-0.025em;line-height:1.2;margin-bottom:0.3rem}
.result-sub{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:1.5rem}
.result-sub strong{color:var(--dark);font-weight:600}
.result-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border:0.5px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:1.25rem}
.result-col{background:var(--bg);padding:1.1rem 1rem}
.result-col-label{font-size:9.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.35rem}
.col-count{font-size:11px;opacity:0.55;font-weight:400;letter-spacing:0;text-transform:none}
.col-mine .result-col-label{color:var(--dark)}
.col-collab .result-col-label{color:var(--coral)}
.col-ai .result-col-label{color:var(--blue)}
.result-item{font-size:11.5px;color:var(--muted);line-height:1.45;margin-bottom:0.4rem;padding-left:0.8rem;position:relative}
.result-item::before{content:'';position:absolute;left:0;top:0.52em;width:3px;height:3px;border-radius:50%}
.col-mine .result-item::before{background:var(--dark)}
.col-collab .result-item::before{background:var(--coral)}
.col-ai .result-item::before{background:var(--blue)}
.result-item.empty{opacity:0.32;padding-left:0}
.result-item.empty::before{display:none}
.result-item.flag-amber{color:var(--amber)}
.result-item.flag-amber::before{background:var(--amber)}
.result-item.flag-nudge{color:var(--coral)}
.result-item.flag-nudge::before{background:var(--coral)}
.insights{display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.2rem}
.insight{background:var(--surface);border-left:2px solid var(--border);border-radius:0 4px 4px 0;padding:0.9rem 1.1rem;font-size:12.5px;color:var(--muted);line-height:1.65}
.insight strong{color:var(--dark);font-weight:600}
.insight.good{border-left-color:var(--green)}
.insight.warn{border-left-color:var(--amber)}
.insight.nudge{border-left-color:var(--coral)}
.restart{font-family:var(--sans);font-size:12px;font-weight:500;padding:0.45rem 1.1rem;border-radius:3px;cursor:pointer;border:0.5px solid var(--border);background:transparent;color:var(--muted);transition:border-color 0.15s,color 0.15s}
.restart:hover{border-color:var(--coral);color:var(--coral)}
.foot{text-align:center;font-size:11px;color:var(--muted);padding:0.65rem 0 1rem;border-top:0.5px solid var(--border);background:var(--surface);letter-spacing:0.02em}
</style>
</head>
<body>
<div class="stage">
  <div class="status-badge">Draft &middot; Module 5</div>
  <div class="card">
    <div class="top-bar"><span class="eyebrow">AI Fluency for K&ndash;12 Educators &nbsp;&middot;&nbsp; Module 5</span></div>
    <div class="title-area">
      <h1 class="headline">What's worth delegating?</h1>
      <p class="subhead">Ten teaching tasks. For each one, make a call: keep it, build it together, or hand it off.</p>
    </div>
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="progressText">Task 1 of 10</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="arena" id="arena">
      <div class="deck-wrap" id="deckWrap"></div>
      <div class="zones">
        <button class="zone-btn z-mine" id="btn0" onclick="choose(0)">
          <span class="zone-name">Mine</span>
          <span class="zone-sub">Needs my judgment</span>
        </button>
        <button class="zone-btn z-collab" id="btn1" onclick="choose(1)">
          <span class="zone-name">We build it</span>
          <span class="zone-sub">AI drafts, I refine</span>
        </button>
        <button class="zone-btn z-ai" id="btn2" onclick="choose(2)">
          <span class="zone-name">AI leads</span>
          <span class="zone-sub">Delegate &mdash; I review</span>
        </button>
      </div>
      <span class="key-hint">Keys: &larr; Mine &nbsp;&nbsp; &uarr; We build it &nbsp;&nbsp; &rarr; AI leads</span>
    </div>
    <div class="results" id="results"></div>
    <div class="foot" id="foot">Trust your instincts &mdash; there are no wrong answers here</div>
  </div>
</div>

<script>
// ideal: 0=Mine, 1=We build it, 2=AI leads
// type: 'protect'|'ambitious'|'delegate'
var tasks=[
  {t:"Notice when a student seems withdrawn or emotionally off",
   mins:0,type:'protect',ideal:0,
   hint:"Human attunement cannot be automated. You read the room. No tool can perceive a child the way you do."},
  {t:"Write substantive, personalized feedback on 30 student essays",
   mins:160,type:'ambitious',ideal:1,
   hint:"AI can draft personalized feedback at scale. You bring what you know about each student. Together, you produce something neither could do alone."},
  {t:"Generate 20 quiz questions aligned to your current unit",
   mins:25,type:'delegate',ideal:2,
   hint:"One of AI's clearest wins. Strong, aligned questions in seconds. Review before using -- then move on."},
  {t:"Decide whether a student's changing behavior signals something serious",
   mins:0,type:'protect',ideal:0,
   hint:"This call draws on everything you know about this specific child -- context, history, gut. No tool has that."},
  {t:"Design a semester-long interdisciplinary unit from scratch",
   mins:200,type:'ambitious',ideal:1,
   hint:"Vision is yours. Structure, research, and resource lists are where AI earns its place -- and saves you days."},
  {t:"Create reading materials differentiated across five levels",
   mins:85,type:'delegate',ideal:2,
   hint:"Hours of formatting work AI handles accurately. Give it your content and level criteria, review the output, done."},
  {t:"Write individualized reading recommendations for every student",
   mins:110,type:'ambitious',ideal:1,
   hint:"You know your students. AI knows thousands of books. Together: something remarkable that used to be impossible."},
  {t:"Facilitate a charged discussion about a polarizing current event",
   mins:0,type:'protect',ideal:0,
   hint:"A room full of real students needs a real teacher to navigate this. Presence, judgment, and the ability to read the room -- yours alone."},
  {t:"Convert your lesson outline into a full slide deck",
   mins:45,type:'delegate',ideal:2,
   hint:"Structure and formatting work that AI handles cleanly. Your time is better spent on the decisions that require you."},
  {t:"Write personalized progress narratives for 28 families before conferences",
   mins:110,type:'ambitious',ideal:1,
   hint:"Your knowledge of each student is the ingredient. AI handles the writing at scale. Review each one before it goes out -- that review is the practice."},
];

// Shuffle
for(var i=tasks.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=tasks[i];tasks[i]=tasks[j];tasks[j]=tmp;}

var N=tasks.length;
var choices=[];
var cur=0;
var busy=false;
var awaitingDismiss=false;
var autoTimer=null;

function buildDeck(){
  var wrap=document.getElementById('deckWrap');
  var existing=wrap.querySelectorAll('.task-card');
  existing.forEach(function(e){e.remove();});
  var remaining=N-cur;
  for(var i=0;i<Math.min(3,remaining);i++){
    var el=document.createElement('div');
    el.className='task-card'+(i===0?' active':(i===1?' behind-1':' behind-2'));
    if(i===0)el.innerHTML='<span class="task-text">'+tasks[cur].t+'</span>';
    wrap.insertBefore(el,wrap.firstChild);
  }
}

function getOrCreateHint(){
  var wrap=document.getElementById('deckWrap');
  var hc=wrap.querySelector('.hint-card');
  if(!hc){hc=document.createElement('div');hc.className='hint-card';wrap.appendChild(hc);}
  return hc;
}

function hideHint(){
  var hc=document.getElementById('deckWrap').querySelector('.hint-card');
  if(hc){hc.classList.remove('show','correct','incorrect');}
}

function advance(){
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  awaitingDismiss=false;
  hideHint();
  cur++;
  var pct=Math.round(cur/N*100);
  document.getElementById('progressFill').style.width=pct+'%';
  if(cur>=N){
    document.getElementById('progressText').textContent='Done';
    document.getElementById('progressPct').textContent='100%';
    showResults();
    busy=false;
    return;
  }
  document.getElementById('progressText').textContent='Task '+(cur+1)+' of '+N;
  document.getElementById('progressPct').textContent=pct+'%';
  buildDeck();
  busy=false;
}

function flashBtn(idx,cls,duration){
  var b=document.getElementById('btn'+idx);
  b.classList.add(cls);
  setTimeout(function(){b.classList.remove(cls);},duration||320);
}

function choose(zone){
  if(busy||cur>=N)return;
  if(awaitingDismiss)return;
  busy=true;

  var task=tasks[cur];
  var correct=(zone===task.ideal);
  choices.push({task:task,zone:zone,correct:correct});

  // Flash button
  flashBtn(zone,correct?'flash-correct':'flash-wrong',correct?600:320);

  // Fly card out
  var active=document.querySelector('.task-card.active');
  if(active)active.classList.add(zone===0?'fly-left':(zone===2?'fly-right':'fly-up'));

  setTimeout(function(){
    var hc=getOrCreateHint();
    var dotClass=correct?'correct-dot':'wrong-dot';
    var footer=correct
      ?'<span class="hint-footer tap-correct">Tap to continue &rarr;</span>'
      :'<span class="hint-footer tap">Tap anywhere to continue</span>';
    hc.innerHTML=
      '<div class="hint-top"><span class="hint-dot '+dotClass+'"></span>'+
      '<span class="hint-text">'+task.hint+'</span></div>'+
      footer;
    hc.className='hint-card show '+(correct?'correct':'incorrect');
    awaitingDismiss=true;
    busy=false;
  },280);
}

// Click-to-dismiss incorrect hints
document.getElementById('arena').addEventListener('click',function(e){
  if(awaitingDismiss){advance();}
});

document.addEventListener('keydown',function(e){
  if(awaitingDismiss&&(e.key===' '||e.key==='Enter')){advance();return;}
  if(busy||awaitingDismiss)return;
  if(e.key==='ArrowLeft'||e.key==='1')choose(0);
  if(e.key==='ArrowUp'||e.key==='2')choose(1);
  if(e.key==='ArrowRight'||e.key==='3')choose(2);
});

function showResults(){
  document.getElementById('arena').style.display='none';
  document.getElementById('foot').style.display='none';

  var mine=choices.filter(function(c){return c.zone===0;});
  var collab=choices.filter(function(c){return c.zone===1;});
  var ai=choices.filter(function(c){return c.zone===2;});
  var correct=choices.filter(function(c){return c.correct;}).length;

  var mins=0;
  collab.forEach(function(c){mins+=Math.round(c.task.mins*0.5);});
  ai.forEach(function(c){mins+=c.task.mins;});
  var timeStr=mins>=60?(Math.round(mins/6)/10)+' hours':mins+' min';

  var misdelegated=choices.filter(function(c){return c.task.type==='protect'&&c.zone>0;});
  var underutilized=choices.filter(function(c){return c.task.type==='ambitious'&&c.zone===0;});
  var heldBack=choices.filter(function(c){return c.task.type==='delegate'&&c.zone===0;});

  function items(arr){
    if(!arr.length)return '<p class="result-item empty">Nothing here</p>';
    return arr.map(function(c){
      var flag='';
      if(c.zone===0&&(c.task.type==='ambitious'||c.task.type==='delegate'))flag=' flag-nudge';
      if(c.zone>0&&c.task.type==='protect')flag=' flag-amber';
      return '<p class="result-item'+flag+'">'+c.task.t+'</p>';
    }).join('');
  }

  var insightHtml='<div class="insights">';
  if(misdelegated.length>0){
    insightHtml+='<div class="insight warn"><strong>A few to reconsider.</strong> '+
      misdelegated.map(function(c){return '"'+c.task.t+'"';}).join(' and ')+
      ' require professional judgment and human presence that AI cannot replicate. These stay with you.</div>';
  }
  if(underutilized.length>=2){
    insightHtml+='<div class="insight nudge"><strong>You kept some ambitious work entirely to yourself.</strong> '+
      'Tasks like these are where AI collaboration multiplies your reach without replacing your judgment. '+
      'Think about what you could do with that time back.</div>';
  }
  if(heldBack.length>=2){
    insightHtml+='<div class="insight nudge"><strong>Some routine tasks stayed in your pile.</strong> '+
      'Freeing yourself from structural and repetitive work is what creates space for the teaching only you can do.</div>';
  }
  if(misdelegated.length===0&&underutilized.length<2&&heldBack.length<2){
    insightHtml+='<div class="insight good"><strong>Well-calibrated.</strong> '+
      'You protected the work that needs human presence and delegated where AI genuinely earns it. '+
      correct+' of '+N+' matched the ideal zone. That judgment -- knowing when AI helps versus when it doesn\'t -- is the skill.</div>';
  }
  insightHtml+='</div>';

  var r=document.getElementById('results');
  r.innerHTML=
    '<p class="result-hed">Your delegation profile.</p>'+
    '<p class="result-sub">You matched <strong>'+correct+' of '+N+'</strong> ideal zones, and could recover roughly <strong>'+timeStr+' per week</strong> with this approach.</p>'+
    '<div class="result-cols">'+
      '<div class="result-col col-mine"><div class="result-col-label">Mine <span class="col-count">('+mine.length+')</span></div>'+items(mine)+'</div>'+
      '<div class="result-col col-collab"><div class="result-col-label">We build it <span class="col-count">('+collab.length+')</span></div>'+items(collab)+'</div>'+
      '<div class="result-col col-ai"><div class="result-col-label">AI leads <span class="col-count">('+ai.length+')</span></div>'+items(ai)+'</div>'+
    '</div>'+
    insightHtml+
    '<button class="restart" onclick="restart()">Try again &rarr;</button>';
  r.classList.add('visible');
}

function restart(){
  choices=[];cur=0;busy=false;awaitingDismiss=false;
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  for(var i=N-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=tasks[i];tasks[i]=tasks[j];tasks[j]=tmp;}
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('progressText').textContent='Task 1 of '+N;
  document.getElementById('progressPct').textContent='0%';
  document.getElementById('results').classList.remove('visible');
  document.getElementById('results').innerHTML='';
  document.getElementById('arena').style.display='';
  document.getElementById('foot').style.display='';
  buildDeck();
}

buildDeck();
</script>
</body>
</html>
