<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conduct the Symphony - Module 6 - AI Fluency for K-12 Educators</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf9f5;--surface:#f0eee6;--dark:#141413;--muted:rgba(20,20,19,0.42);--border:rgba(20,20,19,0.1);--coral:#d97757;--sans:'DM Sans',Arial,sans-serif}
html,body{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;font-family:var(--sans);color:var(--dark)}
.stage{width:100%;max-width:760px;position:relative}
.status-badge{position:absolute;top:0;right:0;z-index:10;font-size:9.5px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;background:var(--surface);border:0.5px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:0 6px 0 4px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:6px;overflow:hidden}
.top-bar{padding:1.75rem 2rem 0;padding-right:8rem}
.eyebrow{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted)}
.title-area{padding:0.75rem 2rem 0.25rem}
.headline{font-family:var(--sans);font-size:clamp(20px,3.2vw,28px);font-weight:600;color:var(--dark);line-height:1.2;margin-bottom:0.25rem;letter-spacing:-0.02em}
.subhead{font-size:13px;color:var(--muted);line-height:1.5}
.field-wrap{position:relative;background:var(--surface);border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border)}
canvas{display:block;width:100%}
.controls{padding:1.25rem 2rem 1.5rem;background:var(--bg)}
.controls-label{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:0.85rem;display:block}
.btn-row{display:flex;gap:0.5rem;flex-wrap:wrap}
.ctx-btn{font-family:var(--sans);font-size:12px;font-weight:500;padding:0.45rem 1rem;border-radius:3px;cursor:pointer;border:0.5px solid var(--border);background:var(--bg);color:var(--muted);transition:background 0.2s,border-color 0.2s,color 0.2s,box-shadow 0.2s;letter-spacing:0.02em;user-select:none}
.ctx-btn:hover{border-color:rgba(217,119,87,0.4);color:var(--dark)}
.ctx-btn.active{background:var(--coral);border-color:var(--coral);color:#fff;box-shadow:0 2px 8px rgba(217,119,87,0.25)}
.ctx-btn.fifth{display:none;border-style:dashed;border-color:rgba(217,119,87,0.45);color:rgba(217,119,87,0.85);background:rgba(217,119,87,0.04)}
.ctx-btn.fifth.show{display:inline-block}
.ctx-btn.fifth.active{border-style:solid;background:var(--coral);color:#fff}
.foot{text-align:center;font-size:11px;font-weight:400;color:var(--muted);padding:0.6rem 0 1rem;border-top:0.5px solid var(--border);background:var(--surface);transition:color 0.4s;letter-spacing:0.02em}
</style>
</head>
<body>
<div class="stage">
  <div class="status-badge">Draft &middot; Module 6</div>
  <div class="card">
    <div class="top-bar"><span class="eyebrow">AI Fluency for K&ndash;12 Educators &nbsp;&middot;&nbsp; Module 6</span></div>
    <div class="title-area">
      <h1 class="headline">Conduct the symphony.</h1>
      <p class="subhead">Each piece of context you give AI is a note. Add them all and watch what takes shape.</p>
    </div>
    <div class="field-wrap" id="wrap"><canvas id="c"></canvas></div>
    <div class="controls">
      <span class="controls-label">Add context &mdash; watch the field respond</span>
      <div class="btn-row">
        <button class="ctx-btn" data-i="0">Grade level</button>
        <button class="ctx-btn" data-i="1">Topic</button>
        <button class="ctx-btn" data-i="2">Purpose</button>
        <button class="ctx-btn" data-i="3">Your students</button>
        <button class="ctx-btn fifth" id="fifthbtn" data-i="4">What only you know</button>
      </div>
    </div>
    <div class="foot" id="foot">Start by adding context. Each one matters.</div>
  </div>
</div>
<script>
var CV=document.getElementById('c'),CTX=CV.getContext('2d'),wrap=document.getElementById('wrap');
var W=0,H=0,dpr=1,tick=0;
var N=2500;
var parts=[];
var act=[false,false,false,false,false];
var actN=0;

// Dense outline sampler: given a list of {x,y} outline points, repeat to fill count
function densify(pts, count){
  var out=[];
  for(var i=0;i<count;i++){
    var p=pts[Math.floor(Math.random()*pts.length)];
    out.push({x:p.x+(Math.random()-0.5)*1.5, y:p.y+(Math.random()-0.5)*1.5});
  }
  return out;
}

// ---- LIGHTBULB (outline only) ----
function bulbOutline(cx,cy,R){
  var p=[];
  // Upper dome arc (180 deg)
  for(var i=0;i<=500;i++){var a=Math.PI*0.01+i/500*Math.PI*0.98; p.push({x:cx+R*Math.cos(a),y:cy+R*Math.sin(a)});}
  // Lower sides curving inward to neck
  for(var i=0;i<=80;i++){var f=i/80; p.push({x:cx-R*(0.98-f*0.75),y:cy+R*(0.02+f*0.48)});}
  for(var i=0;i<=80;i++){var f=i/80; p.push({x:cx+R*(0.98-f*0.75),y:cy+R*(0.02+f*0.48)});}
  // Neck - 3 horizontal bands
  for(var j=0;j<3;j++){var ny=cy+R*(0.52+j*0.14); for(var i=0;i<=60;i++){p.push({x:cx-R*0.23+i/60*R*0.46,y:ny});}}
  // Neck verticals
  for(var i=0;i<=30;i++){var f=i/30; p.push({x:cx-R*0.23,y:cy+R*(0.50+f*0.45)}); p.push({x:cx+R*0.23,y:cy+R*(0.50+f*0.45)});}
  // Rays - 7 outward spokes
  for(var k=0;k<7;k++){
    var ra=(k/7)*Math.PI*1.0+Math.PI*0.0;
    for(var i=0;i<=20;i++){var r=R*(1.08+i*0.04); p.push({x:cx+r*Math.cos(ra),y:cy+r*Math.sin(ra)});}
  }
  return p;
}

// ---- PENCIL (outline only) ----
function pencilOutline(cx,cy,R){
  var p=[];
  var w=R*0.28, h=R*0.95;
  // Long body - left and right edges, very dense
  for(var i=0;i<=200;i++){var f=i/200; p.push({x:cx-w,y:cy-h+f*h*1.55}); p.push({x:cx+w,y:cy-h+f*h*1.55});}
  // Top of body (flat top edge)
  for(var i=0;i<=50;i++){p.push({x:cx-w+i/50*w*2,y:cy-h});}
  // Eraser band (line across partway down from top)
  for(var i=0;i<=50;i++){p.push({x:cx-w+i/50*w*2,y:cy-h+R*0.18});}
  // Tip - two converging lines to a point
  for(var i=0;i<=80;i++){var f=i/80; p.push({x:cx-w+f*w,y:cy+h*0.60+f*h*0.40}); p.push({x:cx+w-f*w,y:cy+h*0.60+f*h*0.40});}
  // Tip wood reveal band
  for(var i=0;i<=50;i++){p.push({x:cx-w+i/50*w*2,y:cy+h*0.60});}
  return p;
}

// ---- APPLE (outline only) ----
function appleOutline(cx,cy,R){
  var p=[];
  // Body - very dense parametric outline
  for(var i=0;i<=600;i++){
    var a=i/600*Math.PI*2;
    var rx=R*(0.88+0.08*Math.cos(a*2+0.3));
    var ry=R*(0.82+0.06*Math.sin(a));
    // Top center dip
    var dip=0;
    if(a>Math.PI*1.25&&a<Math.PI*1.75){dip=-R*0.22*Math.pow(Math.sin((a-Math.PI*1.25)/0.5*Math.PI),0.6);}
    p.push({x:cx+rx*Math.cos(a), y:cy+ry*Math.sin(a)+dip});
  }
  // Stem
  for(var i=0;i<=35;i++){var f=i/35; p.push({x:cx+f*R*0.1,y:cy-R*0.80-f*R*0.28});}
  // Leaf outline
  for(var i=0;i<=80;i++){var la=i/80*Math.PI; p.push({x:cx+R*0.1+R*0.32*Math.cos(la),y:cy-R*0.88-R*0.18*Math.sin(la)});}
  // Leaf center vein
  for(var i=0;i<=25;i++){p.push({x:cx+R*0.1+i/25*R*0.30,y:cy-R*0.88});}
  return p;
}

// ---- STAR (outline only) ----
function starOutline(cx,cy,R){
  var p=[];
  var n=5;
  for(var k=0;k<n*2;k++){
    var a0=(k/(n*2))*Math.PI*2-Math.PI/2;
    var a1=((k+1)/(n*2))*Math.PI*2-Math.PI/2;
    var r0=k%2===0?R:R*0.42;
    var r1=k%2===0?R*0.42:R;
    for(var j=0;j<=40;j++){var f=j/40; p.push({x:cx+(r0+f*(r1-r0))*Math.cos(a0+f*(a1-a0)),y:cy+(r0+f*(r1-r0))*Math.sin(a0+f*(a1-a0))});}
  }
  return p;
}

// Layout - larger radii, better positions
// [fxc, fyc, fr_of_minDim]
var layouts=[
  [0.50, 0.44, 0.30],  // lightbulb center - large
  [0.15, 0.50, 0.16],  // pencil left
  [0.85, 0.50, 0.16],  // apple right
  [0.50, 0.84, 0.12]   // star bottom center
];
var generators=[bulbOutline,pencilOutline,appleOutline,starOutline];

function getOutline(si){
  var l=layouts[si], cx=l[0]*W, cy=l[1]*H, R=l[2]*Math.min(W,H);
  return generators[si](cx,cy,R);
}

function initParts(){
  parts=[];
  for(var i=0;i<N;i++){
    var ang=Math.random()*Math.PI*2, spd=0.12+Math.random()*0.15;
    parts.push({
      x:Math.random()*W, y:Math.random()*H,
      vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
      wx:Math.random()*W, wy:Math.random()*H,
      tx:0, ty:0, shaped:false,
      sz:Math.random()*1.4+0.8,
      alpha:0.1+Math.random()*0.12,
      talpha:0.1+Math.random()*0.12,
      phase:Math.random()*Math.PI*2
    });
  }
}

function assignTargets(){
  var n=actN, fifth=act[4];
  // Bulb share grows with each click
  var bf=[0,0.30,0.46,0.62,0.82][Math.min(n,4)];
  // Satellites: each gets equal share of remaining 18%
  var sf=0.06;

  // Pre-compute outlines once (expensive)
  var ol0=n>0||fifth?getOutline(0):null;
  var ol1=fifth?getOutline(1):null;
  var ol2=fifth?getOutline(2):null;
  var ol3=fifth?getOutline(3):null;

  parts.forEach(function(p,idx){
    var roll=idx/N;
    if(n===0&&!fifth){
      p.shaped=false; p.talpha=0.07+Math.random()*0.09;
    } else if(roll<bf){
      var pt=ol0[Math.floor(Math.random()*ol0.length)];
      p.tx=pt.x+(Math.random()-0.5)*1.8; p.ty=pt.y+(Math.random()-0.5)*1.8;
      p.shaped=true; p.talpha=0.60+Math.random()*0.38;
    } else if(fifth&&roll<bf+sf){
      var pt2=ol1[Math.floor(Math.random()*ol1.length)];
      p.tx=pt2.x+(Math.random()-0.5)*1.5; p.ty=pt2.y+(Math.random()-0.5)*1.5;
      p.shaped=true; p.talpha=0.52+Math.random()*0.35;
    } else if(fifth&&roll<bf+sf*2){
      var pt3=ol2[Math.floor(Math.random()*ol2.length)];
      p.tx=pt3.x+(Math.random()-0.5)*1.5; p.ty=pt3.y+(Math.random()-0.5)*1.5;
      p.shaped=true; p.talpha=0.52+Math.random()*0.35;
    } else if(fifth&&roll<bf+sf*3){
      var pt4=ol3[Math.floor(Math.random()*ol4.length)];
      p.tx=pt4.x+(Math.random()-0.5)*1.5; p.ty=pt4.y+(Math.random()-0.5)*1.5;
      p.shaped=true; p.talpha=0.48+Math.random()*0.32;
    } else {
      p.shaped=false; p.talpha=0.06+Math.random()*0.08;
    }
  });
}

function resize(){
  dpr=window.devicePixelRatio||1;
  var r=wrap.getBoundingClientRect();
  W=r.width; H=Math.round(W*0.54);
  CV.width=Math.round(W*dpr); CV.height=Math.round(H*dpr);
  CV.style.width=W+'px'; CV.style.height=H+'px';
  CTX.setTransform(dpr,0,0,dpr,0,0);
  if(parts.length>0){parts.forEach(function(p){p.wx=Math.random()*W;p.wy=Math.random()*H;});assignTargets();}
}

function loop(){
  requestAnimationFrame(loop);
  if(W===0){resize();return;}
  tick+=0.007;
  CTX.clearRect(0,0,W,H);
  parts.forEach(function(p){
    if(p.shaped){
      p.vx+=(p.tx-p.x)*0.003; p.vy+=(p.ty-p.y)*0.003;
      p.vx+=(Math.random()-0.5)*0.010; p.vy+=(Math.random()-0.5)*0.010;
      p.vx*=0.86; p.vy*=0.86;
    } else {
      p.vx+=(p.wx-p.x)*0.0005; p.vy+=(p.wy-p.y)*0.0005;
      p.vx+=(Math.random()-0.5)*0.028; p.vy+=(Math.random()-0.5)*0.028;
      p.vx*=0.94; p.vy*=0.94;
      var ddx=p.wx-p.x,ddy=p.wy-p.y;
      if(ddx*ddx+ddy*ddy<200){p.wx=Math.random()*W;p.wy=Math.random()*H;}
    }
    var spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    var maxS=p.shaped?1.8:0.7;
    if(spd>maxS){var sc=maxS/spd;p.vx*=sc;p.vy*=sc;}
    if(spd>0.005&&spd<0.08){var sm=0.08/spd;p.vx*=sm;p.vy*=sm;}
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<-12)p.x=W+12; if(p.x>W+12)p.x=-12;
    if(p.y<-12)p.y=H+12; if(p.y>H+12)p.y=-12;
    p.alpha+=(p.talpha-p.alpha)*0.02;
    var pulse=p.shaped?Math.sin(tick*1.9+p.phase)*0.04:0;
    var sz=p.sz+(p.shaped?actN*0.08:0);
    CTX.beginPath();
    CTX.arc(p.x,p.y,Math.max(0.4,sz),0,Math.PI*2);
    CTX.fillStyle='rgba(217,119,87,'+Math.min(1,Math.max(0,p.alpha+pulse))+')';
    CTX.fill();
  });
}

var footEl=document.getElementById('foot');
var fifthBtn=document.getElementById('fifthbtn');
var msgs=['Start by adding context. Each one matters.','Something is stirring.','The shape is finding itself.','Almost there.','There it is. Now add what only you know.','This is what description does. The more you bring, the more it becomes yours.'];

document.querySelectorAll('.ctx-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    var i=parseInt(btn.getAttribute('data-i'));
    act[i]=!act[i]; btn.classList.toggle('active',act[i]);
    actN=act.slice(0,4).filter(Boolean).length;
    assignTargets();
    if(actN>=4) fifthBtn.classList.add('show');
    var mi=act[4]?5:actN;
    footEl.textContent=msgs[Math.min(mi,5)];
    footEl.style.color=mi>=5?'rgba(20,20,19,0.78)':mi>=4?'rgba(20,20,19,0.62)':'rgba(20,20,19,0.42)';
  });
});

window.addEventListener('load',function(){requestAnimationFrame(function(){requestAnimationFrame(function(){resize();initParts();assignTargets();loop();});});});
window.addEventListener('resize',function(){resize();assignTargets();});
if(window.ResizeObserver){new ResizeObserver(function(){resize();assignTargets();}).observe(wrap);}
</script>
</body>
</html>
