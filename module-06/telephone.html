<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conduct the Symphony - Module 6 - AI Fluency for K-12 Educators</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf9f5;--surface:#f0eee6;--dark:#141413;--muted:rgba(20,20,19,0.42);--border:rgba(20,20,19,0.1);--coral:#d97757;--sans:'DM Sans',Arial,sans-serif}
html,body{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;font-family:var(--sans);color:var(--dark)}
.stage{width:100%;max-width:760px;position:relative}
.status-badge{position:absolute;top:0;right:0;z-index:10;font-size:9.5px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;background:var(--surface);border:0.5px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:0 6px 0 4px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:6px;overflow:hidden}
.top-bar{padding:1.75rem 2rem 0;padding-right:8rem}
.eyebrow{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted)}
.title-area{padding:0.75rem 2rem 0.25rem}
.headline{font-family:var(--sans);font-size:clamp(20px,3.2vw,28px);font-weight:600;color:var(--dark);line-height:1.2;margin-bottom:0.25rem;letter-spacing:-0.02em}
.subhead{font-size:13px;color:var(--muted);line-height:1.5}
.field-wrap{position:relative;background:var(--surface);border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border)}
canvas{display:block;width:100%}
.controls{padding:1.25rem 2rem 1.5rem;background:var(--bg)}
.controls-label{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:0.85rem;display:block}
.btn-row{display:flex;gap:0.5rem;flex-wrap:wrap}
.ctx-btn{font-family:var(--sans);font-size:12px;font-weight:500;padding:0.45rem 1rem;border-radius:3px;cursor:pointer;border:0.5px solid var(--border);background:var(--bg);color:var(--muted);transition:background 0.2s,border-color 0.2s,color 0.2s,box-shadow 0.2s;letter-spacing:0.02em;user-select:none}
.ctx-btn:hover{border-color:rgba(217,119,87,0.4);color:var(--dark)}
.ctx-btn.active{background:var(--coral);border-color:var(--coral);color:#fff;box-shadow:0 2px 8px rgba(217,119,87,0.25)}
.ctx-btn.fifth{display:none;border-style:dashed;border-color:rgba(217,119,87,0.45);color:rgba(217,119,87,0.85);background:rgba(217,119,87,0.04)}
.ctx-btn.fifth.show{display:inline-block}
.ctx-btn.fifth.active{border-style:solid;background:var(--coral);color:#fff}
.foot{text-align:center;font-size:11px;font-weight:400;color:var(--muted);padding:0.6rem 0 1rem;border-top:0.5px solid var(--border);background:var(--surface);transition:color 0.4s;letter-spacing:0.02em}
</style>
</head>
<body>
<div class="stage">
  <div class="status-badge">Draft &middot; Module 6</div>
  <div class="card">
    <div class="top-bar"><span class="eyebrow">AI Fluency for K&ndash;12 Educators &nbsp;&middot;&nbsp; Module 6</span></div>
    <div class="title-area">
      <h1 class="headline">Conduct the symphony.</h1>
      <p class="subhead">Each piece of context you give AI is a note. Add them all and watch what takes shape.</p>
    </div>
    <div class="field-wrap" id="wrap"><canvas id="c"></canvas></div>
    <div class="controls">
      <span class="controls-label">Add context &mdash; watch the field respond</span>
      <div class="btn-row">
        <button class="ctx-btn" data-i="0">Grade level</button>
        <button class="ctx-btn" data-i="1">Topic</button>
        <button class="ctx-btn" data-i="2">Purpose</button>
        <button class="ctx-btn" data-i="3">Your students</button>
        <button class="ctx-btn fifth" id="fifthbtn" data-i="4">What only you know</button>
      </div>
    </div>
    <div class="foot" id="foot">Start by adding context. Each one matters.</div>
  </div>
</div>
<script>
var CV=document.getElementById('c'),CTX=CV.getContext('2d'),wrap=document.getElementById('wrap');
var W=0,H=0,dpr=1,tick=0;
var N=1000;
var parts=[];
var act=[false,false,false,false,false];
var actN=0;

// ---- Pure outline generators - NO interior fill ----
// Each returns a dense array of {x,y} points along the outline only

function genBulb(cx,cy,R){
  var p=[];
  // Main glass dome - upper arc, very dense
  var arcSteps=320;
  for(var i=0;i<=arcSteps;i++){
    var a=Math.PI*0.02+i/arcSteps*Math.PI*0.96;
    p.push({x:cx+R*0.62*Math.cos(a),y:cy+R*0.62*Math.sin(a)});
  }
  // Lower pinch curves (where bulb meets neck)
  for(var i=0;i<=60;i++){
    var a2=-0.28+i/60*0.56;
    p.push({x:cx+R*0.62*Math.cos(a2),y:cy+R*0.62*Math.sin(a2)});
  }
  // Left neck side
  for(var i=0;i<=40;i++){
    var f=i/40;
    p.push({x:cx-R*0.2+f*0.04*R,y:cy+R*0.48+f*R*0.28});
  }
  // Right neck side
  for(var i=0;i<=40;i++){
    var f=i/40;
    p.push({x:cx+R*0.2-f*0.04*R,y:cy+R*0.48+f*R*0.28});
  }
  // 3 horizontal base lines
  for(var j=0;j<3;j++){
    var y=cy+R*0.5+j*R*0.12;
    for(var i=0;i<=30;i++){p.push({x:cx-R*0.18+i/30*R*0.36,y:y});}
  }
  // 8 rays
  for(var k=0;k<8;k++){
    var ra=(k/8)*Math.PI*2-Math.PI/2;
    for(var i=0;i<14;i++){
      var r=R*0.70+i*R*0.025;
      p.push({x:cx+r*Math.cos(ra),y:cy+r*Math.sin(ra)});
    }
  }
  return p;
}

function genPencil(cx,cy,R){
  var p=[];
  var w=R*0.22,h=R*0.88;
  var steps=60;
  // Left edge
  for(var i=0;i<=steps;i++){var f=i/steps;p.push({x:cx-w,y:cy-h+f*h*1.3});}
  // Right edge
  for(var i=0;i<=steps;i++){var f=i/steps;p.push({x:cx+w,y:cy-h+f*h*1.3});}
  // Left tip to point
  for(var i=0;i<=28;i++){var f=i/28;p.push({x:cx-w*(1-f),y:cy+h*0.3+f*h*0.5});}
  // Right tip to point
  for(var i=0;i<=28;i++){var f=i/28;p.push({x:cx+w*(1-f),y:cy+h*0.3+f*h*0.5});}
  // Eraser top
  for(var i=0;i<=20;i++){p.push({x:cx-w+i/20*w*2,y:cy-h});}
  // Eraser band (line across)
  for(var i=0;i<=20;i++){p.push({x:cx-w+i/20*w*2,y:cy-h+R*0.15});}
  // Top of eraser (filled rectangle outline)
  for(var i=0;i<=16;i++){var f=i/16;p.push({x:cx-w+f*w*2,y:cy-h-R*0.1});}
  for(var i=0;i<=8;i++){p.push({x:cx-w,y:cy-h-i/8*R*0.1});p.push({x:cx+w,y:cy-h-i/8*R*0.1});}
  // Pencil tip point accent
  for(var i=0;i<6;i++){p.push({x:cx+(Math.random()-0.5)*R*0.08,y:cy+h*0.82+Math.random()*R*0.06});}
  return p;
}

function genApple(cx,cy,R){
  var p=[];
  // Main body outline - very dense
  var steps=300;
  for(var i=0;i<=steps;i++){
    var a=i/steps*Math.PI*2;
    var rx=R*0.55*(1+0.08*Math.cos(a*2+0.4));
    var ry=R*0.52*(1+0.05*Math.sin(a));
    // Indent at top center
    var dip=0;
    if(a>Math.PI*1.28&&a<Math.PI*1.72){
      dip=-R*0.16*Math.pow(Math.sin((a-Math.PI*1.28)/(0.44)*Math.PI),0.5);
    }
    p.push({x:cx+rx*Math.cos(a),y:cy+ry*Math.sin(a)+dip});
  }
  // Stem - curved
  for(var i=0;i<=20;i++){
    var f=i/20;
    p.push({x:cx+f*R*0.06,y:cy-R*0.5-f*R*0.18});
  }
  // Leaf outline
  var leafSteps=40;
  for(var i=0;i<=leafSteps;i++){
    var la=i/leafSteps*Math.PI;
    p.push({x:cx+R*0.08+R*0.24*Math.cos(la),y:cy-R*0.54-R*0.13*Math.sin(la)});
  }
  // Leaf vein
  for(var i=0;i<=12;i++){
    p.push({x:cx+R*0.08+i/12*R*0.22,y:cy-R*0.54});
  }
  return p;
}

function genStar(cx,cy,R){
  var p=[];
  var n=5;
  // Outline - trace every edge
  for(var k=0;k<n*2;k++){
    var a0=(k/(n*2))*Math.PI*2-Math.PI/2;
    var a1=((k+1)/(n*2))*Math.PI*2-Math.PI/2;
    var r0=k%2===0?R*0.58:R*0.25;
    var r1=k%2===0?R*0.25:R*0.58;
    for(var j=0;j<=22;j++){
      var f=j/22;
      p.push({x:cx+(r0+f*(r1-r0))*Math.cos(a0+f*(a1-a0)),y:cy+(r0+f*(r1-r0))*Math.sin(a0+f*(a1-a0))});
    }
  }
  return p;
}

var shapes=[
  {fxc:0.5, fyc:0.46, fr:0.30, gen:genBulb},    // lightbulb - center, large
  {fxc:0.16,fyc:0.50, fr:0.14, gen:genPencil},    // pencil - left
  {fxc:0.84,fyc:0.50, fr:0.14, gen:genApple},     // apple - right
  {fxc:0.5, fyc:0.83, fr:0.10, gen:genStar}       // star - bottom
];

function getShapePts(si){
  var s=shapes[si];
  var cx=s.fxc*W,cy=s.fyc*H,R=s.fr*Math.min(W,H);
  return s.gen(cx,cy,R);
}

function initParts(){
  parts=[];
  for(var i=0;i<N;i++){
    var ang=Math.random()*Math.PI*2,spd=0.14+Math.random()*0.18;
    parts.push({
      x:Math.random()*W, y:Math.random()*H,
      vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
      wx:Math.random()*W, wy:Math.random()*H,
      tx:0, ty:0,
      shaped:false,
      sz:Math.random()*1.6+0.85,
      alpha:0.1+Math.random()*0.14,
      talpha:0.1+Math.random()*0.14,
      phase:Math.random()*Math.PI*2
    });
  }
}

function assignTargets(){
  var n=actN, fifth=act[4];
  // Bulb grows: 0=0, 1=28%, 2=44%, 3=60%, 4=80%
  var bulkF=[0,0.28,0.44,0.60,0.80][Math.min(n,4)];
  var satF=0.06; // per satellite

  parts.forEach(function(p,idx){
    var roll=idx/N;
    if(n===0&&!fifth){
      p.shaped=false; p.talpha=0.08+Math.random()*0.1;
    } else if(roll<bulkF){
      var sp=getShapePts(0); var pt=sp[Math.floor(Math.random()*sp.length)];
      p.tx=pt.x+(Math.random()-0.5)*2; p.ty=pt.y+(Math.random()-0.5)*2;
      p.shaped=true; p.talpha=0.55+Math.random()*0.42;
    } else if(fifth&&roll<bulkF+satF){
      var sp2=getShapePts(1); var pt2=sp2[Math.floor(Math.random()*sp2.length)];
      p.tx=pt2.x+(Math.random()-0.5)*2; p.ty=pt2.y+(Math.random()-0.5)*2;
      p.shaped=true; p.talpha=0.45+Math.random()*0.38;
    } else if(fifth&&roll<bulkF+satF*2){
      var sp3=getShapePts(2); var pt3=sp3[Math.floor(Math.random()*sp3.length)];
      p.tx=pt3.x+(Math.random()-0.5)*2; p.ty=pt3.y+(Math.random()-0.5)*2;
      p.shaped=true; p.talpha=0.45+Math.random()*0.38;
    } else if(fifth&&roll<bulkF+satF*3){
      var sp4=getShapePts(3); var pt4=sp4[Math.floor(Math.random()*sp4.length)];
      p.tx=pt4.x+(Math.random()-0.5)*2; p.ty=pt4.y+(Math.random()-0.5)*2;
      p.shaped=true; p.talpha=0.40+Math.random()*0.35;
    } else {
      p.shaped=false; p.talpha=0.07+Math.random()*0.09;
    }
  });
}

function resize(){
  dpr=window.devicePixelRatio||1;
  var r=wrap.getBoundingClientRect();
  W=r.width; H=Math.round(W*0.52);
  CV.width=Math.round(W*dpr); CV.height=Math.round(H*dpr);
  CV.style.width=W+'px'; CV.style.height=H+'px';
  CTX.setTransform(dpr,0,0,dpr,0,0);
  if(parts.length>0){parts.forEach(function(p){p.wx=Math.random()*W;p.wy=Math.random()*H;});assignTargets();}
}

function loop(){
  requestAnimationFrame(loop);
  if(W===0){resize();return;}
  tick+=0.007;
  CTX.clearRect(0,0,W,H);

  parts.forEach(function(p){
    if(p.shaped){
      // Gentle spring pull
      p.vx+=(p.tx-p.x)*0.003;
      p.vy+=(p.ty-p.y)*0.003;
      // Tiny wander so they breathe
      p.vx+=(Math.random()-0.5)*0.012;
      p.vy+=(Math.random()-0.5)*0.012;
      p.vx*=0.86; p.vy*=0.86;
    } else {
      // Slow calm drift toward personal wander target
      p.vx+=(p.wx-p.x)*0.0006;
      p.vy+=(p.wy-p.y)*0.0006;
      p.vx+=(Math.random()-0.5)*0.03;
      p.vy+=(Math.random()-0.5)*0.03;
      p.vx*=0.93; p.vy*=0.93;
      // Pick new wander target when close
      var dx=p.wx-p.x,dy=p.wy-p.y;
      if(dx*dx+dy*dy<400){p.wx=Math.random()*W;p.wy=Math.random()*H;}
    }

    // Hard speed clamp - prevents runaway
    var spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    var maxS=p.shaped?2.2:0.9;
    if(spd>maxS){var sc=maxS/spd;p.vx*=sc;p.vy*=sc;}
    // Keep them alive with min speed
    if(spd>0.01&&spd<0.1){var sm=0.1/spd;p.vx*=sm;p.vy*=sm;}

    p.x+=p.vx; p.y+=p.vy;
    if(p.x<-10)p.x=W+10; if(p.x>W+10)p.x=-10;
    if(p.y<-10)p.y=H+10; if(p.y>H+10)p.y=-10;

    p.alpha+=(p.talpha-p.alpha)*0.022;
    var pulse=p.shaped?Math.sin(tick*1.9+p.phase)*0.05:0;
    var sz=p.sz+(p.shaped?actN*0.1:0);
    CTX.beginPath();
    CTX.arc(p.x,p.y,Math.max(0.5,sz),0,Math.PI*2);
    CTX.fillStyle='rgba(217,119,87,'+Math.min(1,Math.max(0,p.alpha+pulse))+')';
    CTX.fill();
  });
}

var footEl=document.getElementById('foot');
var fifthBtn=document.getElementById('fifthbtn');
var msgs=['Start by adding context. Each one matters.','Something is stirring.','The shape is finding itself.','Almost there.','There it is. Now add what only you know.','This is what description does. The more you bring, the more it becomes yours.'];

document.querySelectorAll('.ctx-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    var i=parseInt(btn.getAttribute('data-i'));
    act[i]=!act[i];
    btn.classList.toggle('active',act[i]);
    actN=act.slice(0,4).filter(Boolean).length;
    assignTargets();
    if(actN>=4) fifthBtn.classList.add('show');
    var mi=act[4]?5:actN;
    footEl.textContent=msgs[Math.min(mi,5)];
    footEl.style.color=mi>=5?'rgba(20,20,19,0.78)':mi>=4?'rgba(20,20,19,0.62)':'rgba(20,20,19,0.42)';
  });
});

window.addEventListener('load',function(){requestAnimationFrame(function(){requestAnimationFrame(function(){resize();initParts();assignTargets();loop();});});});
window.addEventListener('resize',function(){resize();assignTargets();});
if(window.ResizeObserver){new ResizeObserver(function(){resize();assignTargets();}).observe(wrap);}
</script>
</body>
</html>
