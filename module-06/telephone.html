<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conduct the Symphony - Module 6 - AI Fluency for K-12 Educators</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf9f5;--surface:#f0eee6;--dark:#141413;--muted:rgba(20,20,19,0.42);--border:rgba(20,20,19,0.1);--coral:#d97757;--sans:'DM Sans',Arial,sans-serif}
html,body{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;font-family:var(--sans);color:var(--dark)}
.stage{width:100%;max-width:760px;position:relative}
.status-badge{position:absolute;top:0;right:0;z-index:10;font-size:9.5px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;background:var(--surface);border:0.5px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:0 6px 0 4px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:6px;overflow:hidden}
.top-bar{padding:1.75rem 2rem 0;padding-right:8rem}
.eyebrow{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted)}
.title-area{padding:0.75rem 2rem 0.25rem}
.headline{font-family:var(--sans);font-size:clamp(20px,3.2vw,28px);font-weight:600;color:var(--dark);line-height:1.2;margin-bottom:0.25rem;letter-spacing:-0.02em}
.subhead{font-size:13px;color:var(--muted);line-height:1.5}
.field-wrap{position:relative;background:var(--surface);border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border)}
canvas{display:block;width:100%}
.controls{padding:1.25rem 2rem 1.5rem;background:var(--bg)}
.controls-label{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:0.85rem;display:block}
.btn-row{display:flex;gap:0.5rem;flex-wrap:wrap}
.ctx-btn{font-family:var(--sans);font-size:12px;font-weight:500;padding:0.45rem 1rem;border-radius:3px;cursor:pointer;border:0.5px solid var(--border);background:var(--bg);color:var(--muted);transition:background 0.2s,border-color 0.2s,color 0.2s,box-shadow 0.2s;letter-spacing:0.02em;user-select:none}
.ctx-btn:hover{border-color:rgba(217,119,87,0.4);color:var(--dark)}
.ctx-btn.active{background:var(--coral);border-color:var(--coral);color:#fff;box-shadow:0 2px 8px rgba(217,119,87,0.25)}
.ctx-btn.fifth{display:none;border-style:dashed;border-color:rgba(217,119,87,0.45);color:rgba(217,119,87,0.85);background:rgba(217,119,87,0.04)}
.ctx-btn.fifth.show{display:inline-block}
.ctx-btn.fifth.active{border-style:solid;background:var(--coral);color:#fff}
.foot{text-align:center;font-size:11px;font-weight:400;color:var(--muted);padding:0.6rem 0 1rem;border-top:0.5px solid var(--border);background:var(--surface);transition:color 0.4s;letter-spacing:0.02em}
</style>
</head>
<body>
<div class="stage">
  <div class="status-badge">Draft &middot; Module 6</div>
  <div class="card">
    <div class="top-bar"><span class="eyebrow">AI Fluency for K&ndash;12 Educators &nbsp;&middot;&nbsp; Module 6</span></div>
    <div class="title-area">
      <h1 class="headline">Conduct the symphony.</h1>
      <p class="subhead">Each piece of context you give AI is a note. Add them all and watch what takes shape.</p>
    </div>
    <div class="field-wrap" id="wrap"><canvas id="c"></canvas></div>
    <div class="controls">
      <span class="controls-label">Add context &mdash; watch the field respond</span>
      <div class="btn-row">
        <button class="ctx-btn" data-i="0">Grade level</button>
        <button class="ctx-btn" data-i="1">Topic</button>
        <button class="ctx-btn" data-i="2">Purpose</button>
        <button class="ctx-btn" data-i="3">Your students</button>
        <button class="ctx-btn fifth" data-i="4" id="fifthbtn">What only you know</button>
      </div>
    </div>
    <div class="foot" id="foot">Start by adding context. Each one matters.</div>
  </div>
</div>
<script>
var CV=document.getElementById('c'),CTX=CV.getContext('2d'),wrap=document.getElementById('wrap');
var W=0,H=0,dpr=1,tick=0;
var N=900;
var pts=[];
var active=[false,false,false,false,false];
var activeN=0;

/* ---- shape generators: return array of {x,y} in canvas coords ---- */
function genBulb(cx,cy,R){
  var p=[];
  // Glass bulb - dense arc
  for(var i=0;i<200;i++){var a=Math.PI*1.05+i/200*Math.PI*0.9;p.push({x:cx+R*0.58*Math.cos(a),y:cy-R*0.05+R*0.58*Math.sin(a)});}
  // Right and left lower curve
  for(var i=0;i<60;i++){var a=-0.32+i/60*0.64;p.push({x:cx+R*0.58*Math.cos(a),y:cy-R*0.05+R*0.58*Math.sin(a)});}
  // Fill interior of bulb with some dots
  for(var i=0;i<120;i++){var a2=Math.random()*Math.PI*2;var r2=Math.random()*R*0.45;p.push({x:cx+r2*Math.cos(a2),y:cy-R*0.05+r2*Math.sin(a2)});}
  // Neck - three horizontal bands
  var neckY=[R*0.56,R*0.64,R*0.72];
  neckY.forEach(function(dy){for(var i=0;i<28;i++){var t=i/27;p.push({x:cx-R*0.2+t*R*0.4,y:cy+dy});}});
  // Rays emanating outward - 8 directions
  for(var k=0;k<8;k++){
    var ra=(k/8)*Math.PI*2-Math.PI/2;
    for(var j=0;j<10;j++){var r=R*0.65+j*R*0.025;p.push({x:cx+r*Math.cos(ra),y:cy-R*0.05+r*Math.sin(ra)});}
  }
  return p;
}

function genPencil(cx,cy,R){
  var p=[];
  var w=R*0.18,h=R*0.82;
  // Body - dense fill
  for(var i=0;i<180;i++){p.push({x:cx-w+Math.random()*w*2,y:cy-h+Math.random()*h*1.35});}
  // Left and right edges
  for(var i=0;i<40;i++){var f=i/39;p.push({x:cx-w,y:cy-h+f*h*1.35});p.push({x:cx+w,y:cy-h+f*h*1.35});}
  // Tip
  for(var i=0;i<35;i++){var f=i/34;p.push({x:cx-w*(1-f)+w*(1-f)*0,y:cy+h*0.35+f*h*0.45});}
  for(var i=0;i<35;i++){var f=i/34;p.push({x:cx+w*(1-f),y:cy+h*0.35+f*h*0.45});}
  // Eraser
  for(var i=0;i<30;i++){p.push({x:cx-w+Math.random()*w*2,y:cy-h-Math.random()*R*0.15});}
  return p;
}

function genApple(cx,cy,R){
  var p=[];
  // Body
  for(var i=0;i<240;i++){
    var a=i/240*Math.PI*2;
    var rx=R*0.5*(1+0.08*Math.cos(a*2+0.5));
    var ry=R*0.48*(1+0.05*Math.sin(a));
    var dip=(a>Math.PI*1.3&&a<Math.PI*1.7)?-R*0.14*Math.sin((a-Math.PI*1.3)/0.4*Math.PI):0;
    p.push({x:cx+rx*Math.cos(a),y:cy+ry*Math.sin(a)+dip});
  }
  // Fill interior
  for(var i=0;i<80;i++){var a2=Math.random()*Math.PI*2;var r2=Math.random()*R*0.38;p.push({x:cx+r2*Math.cos(a2),y:cy+r2*Math.sin(a2)});}
  // Stem
  for(var i=0;i<18;i++){p.push({x:cx+i*0.5-4,y:cy-R*0.44-i*R*0.055});}
  // Leaf
  for(var i=0;i<30;i++){var a3=i/29*Math.PI;p.push({x:cx+R*0.1+R*0.2*Math.cos(a3),y:cy-R*0.5-R*0.11*Math.sin(a3)});}
  return p;
}

function genStar(cx,cy,R){
  var p=[];
  var n=5;
  // Outline
  for(var k=0;k<n*2;k++){
    var a0=k/n/2*Math.PI*2-Math.PI/2;
    var a1=(k+1)/n/2*Math.PI*2-Math.PI/2;
    var r0=k%2===0?R*0.55:R*0.23;
    var r1=k%2===0?R*0.23:R*0.55;
    for(var j=0;j<18;j++){var f=j/17;p.push({x:cx+(r0+f*(r1-r0))*Math.cos(a0+f*(a1-a0)),y:cy+(r0+f*(r1-r0))*Math.sin(a0+f*(a1-a0))});}
  }
  // Fill core
  for(var i=0;i<60;i++){var a4=Math.random()*Math.PI*2;var r4=Math.random()*R*0.18;p.push({x:cx+r4*Math.cos(a4),y:cy+r4*Math.sin(a4)});}
  return p;
}

// Shape layout - positions as fractions of W,H
var shapes=[
  {fxc:0.5,fyc:0.47,fr:0.28,gen:genBulb},     // lightbulb center
  {fxc:0.18,fyc:0.5,fr:0.13,gen:genPencil},     // pencil left
  {fxc:0.82,fyc:0.5,fr:0.13,gen:genApple},      // apple right
  {fxc:0.5,fyc:0.83,fr:0.10,gen:genStar}        // star bottom
];

function shapeTargets(si){
  var s=shapes[si];
  var cx=s.fxc*W,cy=s.fyc*H,R=s.fr*Math.min(W,H);
  return s.gen(cx,cy,R);
}

function initPts(){
  pts=[];
  for(var i=0;i<N;i++){
    var ang=Math.random()*Math.PI*2;
    var spd=0.15+Math.random()*0.2;
    pts.push({
      x:Math.random()*W, y:Math.random()*H,
      vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
      wx:Math.random()*W, wy:Math.random()*H, // wander target - stable
      tx:0, ty:0,
      shaped:false,
      sz:Math.random()*1.8+0.8,
      alpha:0.12+Math.random()*0.14,
      talpha:0.12+Math.random()*0.14,
      phase:Math.random()*Math.PI*2
    });
  }
}

function assignTargets(){
  var n=activeN, fifth=active[4];

  // Shares: bulb grows 0->80%, satellites appear on 5th click
  var bulbFrac=[0,0.28,0.44,0.60,0.78,0.78][Math.min(n,5)];
  var satFrac=fifth?0.06:0; // per satellite (3 satellites)

  pts.forEach(function(p,idx){
    var roll=idx/N;
    var inBulb=roll<bulbFrac;
    var inP=!inBulb&&fifth&&roll<bulbFrac+satFrac;
    var inA=!inBulb&&!inP&&fifth&&roll<bulbFrac+satFrac*2;
    var inS=!inBulb&&!inP&&!inA&&fifth&&roll<bulbFrac+satFrac*3;

    if(n===0&&!fifth){
      // fully free - don't reassign wx/wy, let them wander to existing target
      p.shaped=false;
      p.talpha=0.1+Math.random()*0.12;
    } else if(inBulb){
      var sp=shapeTargets(0);
      var pt=sp[Math.floor(Math.random()*sp.length)];
      p.tx=pt.x; p.ty=pt.y;
      p.shaped=true;
      p.talpha=0.5+Math.random()*0.45;
    } else if(inP){
      var sp2=shapeTargets(1);
      var pt2=sp2[Math.floor(Math.random()*sp2.length)];
      p.tx=pt2.x; p.ty=pt2.y;
      p.shaped=true;
      p.talpha=0.38+Math.random()*0.4;
    } else if(inA){
      var sp3=shapeTargets(2);
      var pt3=sp3[Math.floor(Math.random()*sp3.length)];
      p.tx=pt3.x; p.ty=pt3.y;
      p.shaped=true;
      p.talpha=0.38+Math.random()*0.4;
    } else if(inS){
      var sp4=shapeTargets(3);
      var pt4=sp4[Math.floor(Math.random()*sp4.length)];
      p.tx=pt4.x; p.ty=pt4.y;
      p.shaped=true;
      p.talpha=0.35+Math.random()*0.38;
    } else {
      // unshaped - give them a calm fixed wander target so they dont rush
      // only reassign wander target if they've arrived (to prevent velocity build-up)
      p.shaped=false;
      p.talpha=0.08+Math.random()*0.1;
    }
  });
}

function resize(){
  dpr=window.devicePixelRatio||1;
  var r=wrap.getBoundingClientRect();
  W=r.width; H=Math.round(W*0.52);
  CV.width=Math.round(W*dpr); CV.height=Math.round(H*dpr);
  CV.style.width=W+'px'; CV.style.height=H+'px';
  CTX.setTransform(dpr,0,0,dpr,0,0);
  if(pts.length>0){
    // Rescale wander targets
    pts.forEach(function(p){p.wx=Math.random()*W;p.wy=Math.random()*H;});
    assignTargets();
  }
}

function loop(){
  requestAnimationFrame(loop);
  if(W===0){resize();return;}
  tick+=0.007;
  CTX.clearRect(0,0,W,H);

  // Very gentle spring: 0.003 for shaped, pure wander for free
  var spring=0.003;

  pts.forEach(function(p){
    if(p.shaped){
      // Soft pull toward shape target
      p.vx+=(p.tx-p.x)*spring;
      p.vy+=(p.ty-p.y)*spring;
      // Tiny wander overlay so they never freeze
      p.vx+=(Math.random()-0.5)*0.015;
      p.vy+=(Math.random()-0.5)*0.015;
    } else {
      // Pure slow wander - pull toward calm wander target
      p.vx+=(p.wx-p.x)*0.0008;
      p.vy+=(p.wy-p.y)*0.0008;
      p.vx+=(Math.random()-0.5)*0.04;
      p.vy+=(Math.random()-0.5)*0.04;
      // Occasionally pick new wander target when close
      var dwx=p.wx-p.x,dwy=p.wy-p.y;
      if(dwx*dwx+dwy*dwy<100){p.wx=Math.random()*W;p.wy=Math.random()*H;}
    }

    // Damping - key: unshaped gets more damping to prevent runaway
    p.vx*=p.shaped?0.86:0.92;
    p.vy*=p.shaped?0.86:0.92;

    // Speed clamp - max speed to prevent chaos on 5th click
    var spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    var maxSpd=p.shaped?2.5:1.2;
    if(spd>maxSpd){var sc=maxSpd/spd;p.vx*=sc;p.vy*=sc;}
    // Min speed so they always drift
    var minSpd=0.12;
    if(spd>0.01&&spd<minSpd){var sm=minSpd/spd;p.vx*=sm;p.vy*=sm;}

    p.x+=p.vx; p.y+=p.vy;

    // Soft wrap
    if(p.x<-8)p.x=W+8; if(p.x>W+8)p.x=-8;
    if(p.y<-8)p.y=H+8; if(p.y>H+8)p.y=-8;

    // Alpha lerp
    p.alpha+=(p.talpha-p.alpha)*0.025;

    var pulse=p.shaped?Math.sin(tick*1.8+p.phase)*0.055:0;
    var sz=p.sz+(p.shaped?activeN*0.12:0);

    CTX.beginPath();
    CTX.arc(p.x,p.y,Math.max(0.5,sz),0,Math.PI*2);
    CTX.fillStyle='rgba(217,119,87,'+Math.min(1,Math.max(0,p.alpha+pulse))+')';
    CTX.fill();
  });
}

// Controls
var footEl=document.getElementById('foot');
var fifthBtn=document.getElementById('fifthbtn');
var footTexts=['Start by adding context. Each one matters.','Something is stirring.','The shape is finding itself.','Almost there.','There it is. Now add what only you know.','This is what description does. The more you bring, the more it becomes yours.'];

document.querySelectorAll('.ctx-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    var i=parseInt(btn.getAttribute('data-i'));
    var was=btn.classList.contains('active');
    active[i]=!was;
    btn.classList.toggle('active',!was);
    activeN=active.slice(0,4).filter(Boolean).length;
    assignTargets();
    if(activeN>=4&&!active[4]) fifthBtn.classList.add('show');
    var fi=active[4]?5:activeN;
    footEl.textContent=footTexts[Math.min(fi,5)];
    footEl.style.color=fi>=5?'rgba(20,20,19,0.75)':fi>=4?'rgba(20,20,19,0.6)':'rgba(20,20,19,0.42)';
  });
});

window.addEventListener('load',function(){
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    resize(); initPts(); assignTargets(); loop();
  });});
});
window.addEventListener('resize',function(){resize();assignTargets();});
if(window.ResizeObserver){new ResizeObserver(function(){resize();assignTargets();}).observe(wrap);}
</script>
</body>
</html>
