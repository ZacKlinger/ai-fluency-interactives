<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You already have a head start - Module 1 - AI Fluency for K-12 Educators</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300..700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf9f5;--surface:#f0eee6;--dark:#141413;--muted:rgba(20,20,19,0.42);--border:rgba(20,20,19,0.1);--coral:#d97757;--blue:#6a9bcc;--green:#3d6b4f;--gray:#888780;--sans:'DM Sans',Arial,sans-serif;--serif:'Source Serif 4',Georgia,serif}
html,body{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;font-family:var(--sans);color:var(--dark)}
.stage{width:100%;max-width:820px;position:relative}
.status-badge{position:absolute;top:0;right:0;z-index:10;font-size:9.5px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;background:var(--surface);border:0.5px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:0 6px 0 4px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:6px;overflow:hidden;color:var(--dark)}
.top-bar{padding:1.75rem 2rem 0;padding-right:8rem}
.eyebrow{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted)}
.title-area{padding:0.75rem 2rem 0}
.headline{font-family:var(--serif);font-variation-settings:'opsz' 24;font-size:clamp(20px,3.2vw,28px);font-weight:600;color:var(--dark);line-height:1.2;margin-bottom:0.25rem;letter-spacing:-0.025em}
.subhead{font-size:12px;font-weight:400;color:var(--muted);line-height:1.5}
.field-wrap{position:relative;width:100%;height:420px;margin-top:0.5rem;cursor:none;background:var(--surface);border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border)}
canvas{display:block;width:100%;height:100%}
.panel{padding:1.25rem 2rem 1.75rem;background:var(--bg);min-height:230px}
.panel-inner{display:grid;grid-template-columns:1fr 1.8fr;gap:2rem;align-items:start;opacity:0;transition:opacity 0.35s}
.panel-inner.show{opacity:1}
.pleft{border-right:0.5px solid var(--border);padding-right:2rem;min-height:175px}
.plabel{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--coral);margin-bottom:0.4rem;display:block}
.pname{font-family:var(--sans);font-size:17px;font-weight:600;color:var(--dark);margin-bottom:0.3rem;line-height:1.3;letter-spacing:-0.01em}
.pdesc{font-size:13px;font-weight:400;color:var(--muted);line-height:1.6;margin-bottom:0.75rem}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:3px 9px;border-radius:3px;border:0.5px solid}
.td{border-color:rgba(217,119,87,0.4);color:var(--coral);background:rgba(217,119,87,0.07)}
.ts{border-color:rgba(106,155,204,0.4);color:var(--blue);background:rgba(106,155,204,0.07)}
.tc{border-color:rgba(61,107,79,0.4);color:var(--green);background:rgba(61,107,79,0.07)}
.tg{border-color:rgba(136,135,128,0.4);color:var(--gray);background:rgba(136,135,128,0.07)}
.pinsight{font-family:var(--serif);font-size:16px;font-weight:400;color:var(--dark);line-height:1.75;margin-bottom:0.65rem}
.panchor{font-family:var(--sans);font-size:12px;font-weight:500;color:var(--coral)}
.hint-bar{text-align:center;font-size:11px;font-weight:400;color:var(--muted);padding:0.5rem 0 1.25rem;border-top:0.5px solid var(--border);background:var(--surface);transition:color 0.5s}
@media(max-width:540px){.panel-inner{grid-template-columns:1fr}.pleft{border-right:none;border-bottom:0.5px solid var(--border);padding-right:0;padding-bottom:1rem;min-height:0}.field-wrap{height:340px}}
</style>
</head>
<body>
<div class="stage">
  <div class="status-badge">Draft &middot; Module 1</div>
  <div class="card">
    <div class="top-bar"><span class="eyebrow">AI Fluency for K&ndash;12 Educators &nbsp;&middot;&nbsp; Module 1 &nbsp;&middot;&nbsp; Orientation</span></div>
    <div class="title-area">
      <h1 class="headline">You already have a head start.</h1>
      <p class="subhead">Move through the field. Find what sounds like your work.</p>
    </div>
    <div class="field-wrap" id="field"><canvas id="c"></canvas></div>
    <div class="panel">
      <div class="panel-inner" id="pi">
        <div class="pleft">
          <span class="plabel" id="pl"></span>
          <p class="pname" id="pn"></p>
          <p class="pdesc" id="pd"></p>
          <div class="tags" id="pt"></div>
        </div>
        <div>
          <p class="pinsight" id="pins"></p>
          <span class="panchor" id="panc"></span>
        </div>
      </div>
    </div>
    <div class="hint-bar" id="hint">Hover to explore &mdash; no path required.</div>
  </div>
</div>
<script>
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),field=document.getElementById('field');
var W=0,H=0,dpr=1,mx=-999,my=-999,trail=[],activeNode=null,revealedSet={};
var nodes=[
  {l1:"My students always",l2:"know what's expected",fx:0.18,fy:0.24,name:"You define what good work looks like",desc:"Your rubrics and objectives say exactly what you mean.",tags:[["Description","ts"]],d4:"Description",col:"rgba(106,155,204,",insight:"This is Description - telling AI exactly what you need. You already do it every time you write a learning target.",anchor:"Your lesson planning instincts are a prompting superpower."},
  {l1:"I can tell when",l2:"something's off",fx:0.82,fy:0.21,name:"You catch what isn't working",desc:"You read the room and adjust before anyone falls behind.",tags:[["Discernment","tc"]],d4:"Discernment",col:"rgba(61,107,79,",insight:"This is Discernment - evaluating what AI gives you. Most people skip this step. You won't.",anchor:"Your instinct for 'something is off' is your most important AI skill."},
  {l1:"My feedback actually",l2:"changes the work",fx:0.5,fy:0.14,name:"Your feedback opens a door",desc:"Your comments show the path. Students know exactly what to do next.",tags:[["Description","ts"],["Discernment","tc"]],d4:"Inner Loop",col:"rgba(183,148,100,",insight:"Description and Discernment work as a loop. Describe, evaluate, refine. You have been doing this with students your whole career.",anchor:"You have been running the inner loop your entire career."},
  {l1:"I know what's not",l2:"mine to share",fx:0.13,fy:0.65,name:"You hold student information with care",desc:"You know what goes in writing and what stays in the room.",tags:[["Diligence","tg"]],d4:"Diligence",col:"rgba(136,135,128,",insight:"This is Diligence - owning your AI use responsibly. Your professional judgment does not live in the model.",anchor:"AI assistance does not transfer professional responsibility."},
  {l1:"I protect my time",l2:"for what matters",fx:0.87,fy:0.63,name:"You decide what's worth your energy",desc:"You guard your attention for the students and decisions that need you.",tags:[["Delegation","td"]],d4:"Delegation",col:"rgba(217,119,87,",insight:"This is Delegation - deciding what to hand off to AI and what to keep. You have been making this call your entire career.",anchor:"Every effective teacher is already a strategic delegator."},
  {l1:"I break hard things",l2:"into learnable steps",fx:0.31,fy:0.76,name:"You scaffold learning beautifully",desc:"You decompose a standard into pieces students can actually climb.",tags:[["Description","ts"],["Delegation","td"]],d4:"Description + Delegation",col:"rgba(140,148,118,",insight:"Decomposing a task for a student and for AI are the same skill. Your scaffolding instincts transfer directly.",anchor:"Teaching is task design. Prompting is task design."},
  {l1:"My name is on it,",l2:"so I make sure it's right",fx:0.68,fy:0.79,name:"You stand behind what you send",desc:"When something goes out under your name, you have made sure it is right.",tags:[["Diligence","tg"],["Delegation","td"]],d4:"Diligence",col:"rgba(197,155,128,",insight:"AI helps you move faster - but you are the one who stands behind everything that reaches your students.",anchor:"The work is yours. AI is a tool in service of it."},
  {l1:"I know when to call",l2:"in the right person",fx:0.5,fy:0.51,name:"You recognize the edges of your knowledge",desc:"You know when to bring in the specialist. That is a professional strength.",tags:[["Delegation","td"],["Discernment","tc"]],d4:"Delegation + Discernment",col:"rgba(150,158,128,",insight:"Knowing what only you can do - and what AI cannot - is the whole game.",anchor:"Knowing when not to use AI is as important as knowing when to."}
];
var decor=[{fx:0.62,fy:0.58},{fx:0.67,fy:0.65}];
function resize(){dpr=window.devicePixelRatio||1;var rect=field.getBoundingClientRect();W=rect.width;H=rect.height;if(W===0)W=field.offsetWidth;if(H===0)H=field.offsetHeight;canvas.width=Math.round(W*dpr);canvas.height=Math.round(H*dpr);canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);nodes.forEach(function(n){n.x=n.fx*W;n.y=n.fy*H;if(!n.r)n.r=26;if(n.pulse===undefined)n.pulse=Math.random()*Math.PI*2;});decor.forEach(function(d){d.x=d.fx*W;d.y=d.fy*H;});}
field.addEventListener('mousemove',function(e){var r=field.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top;trail.push({x:mx,y:my,a:1,s:Math.random()*1.5+1});if(trail.length>48)trail.shift();});
field.addEventListener('mouseleave',function(){mx=-999;my=-999;});
function dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)*(x2-x1)+(y2-y1)*(y2-y1));}
function getHov(){var b=null,bd=9999;nodes.forEach(function(n){var d=dist(mx,my,n.x,n.y);if(d<bd){bd=d;b=n;}});return b&&bd<(b.r+36)?b:null;}
function draw(){requestAnimationFrame(draw);if(W===0||H===0){resize();return;}ctx.clearRect(0,0,W,H);
for(var i=0;i<trail.length;i++){var tr=trail[i];tr.a*=0.88;if(tr.a<0.008)continue;ctx.beginPath();ctx.arc(tr.x,tr.y,tr.s*(i/trail.length)+0.5,0,Math.PI*2);ctx.fillStyle='rgba(217,119,87,'+tr.a*0.3+')';ctx.fill();}
ctx.strokeStyle='rgba(20,20,19,0.08)';ctx.lineWidth=0.5;
[[decor[0],nodes[7]],[decor[0],decor[1]],[decor[1],nodes[4]],[decor[1],nodes[6]]].forEach(function(p){ctx.beginPath();ctx.moveTo(p[0].x,p[0].y);ctx.lineTo(p[1].x,p[1].y);ctx.stroke();});
decor.forEach(function(d){ctx.beginPath();ctx.arc(d.x,d.y,1.8,0,Math.PI*2);ctx.fillStyle='rgba(20,20,19,0.18)';ctx.fill();});
var hov=getHov();
nodes.forEach(function(n){var isH=hov===n,wasR=revealedSet[n.l1];var tgt=isH?44:(wasR?32:24);n.r=n.r+(tgt-n.r)*0.1;n.pulse+=0.02;var pls=isH?0:Math.sin(n.pulse)*2;
if(isH||wasR){var grd=ctx.createRadialGradient(n.x,n.y,n.r*0.4,n.x,n.y,n.r+20);grd.addColorStop(0,n.col+(isH?0.2:0.08)+')');grd.addColorStop(1,n.col+'0)');ctx.beginPath();ctx.arc(n.x,n.y,n.r+20+pls,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();}
ctx.beginPath();ctx.arc(n.x,n.y,n.r+pls,0,Math.PI*2);ctx.fillStyle=n.col+(isH?0.85:(wasR?0.5:0.15))+')';ctx.fill();ctx.strokeStyle=isH?'rgba(20,20,19,0.25)':'rgba(20,20,19,0.07)';ctx.lineWidth=0.5;ctx.stroke();
if(isH||wasR){ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';var lh=16,yS=n.y-lh/2;[n.l1,n.l2].forEach(function(ln,li){ctx.font=(isH?'500 13px':'400 12px')+' "DM Sans",Arial,sans-serif';ctx.fillStyle=isH?'rgba(20,20,19,0.9)':'rgba(20,20,19,0.45)';ctx.fillText(ln,n.x,yS+li*lh);});if(isH){ctx.font='600 9px "DM Sans",Arial,sans-serif';ctx.fillStyle='rgba(217,119,87,0.8)';ctx.fillText(n.d4.toUpperCase(),n.x,n.y+n.r+15);}ctx.restore();}
else{ctx.beginPath();ctx.arc(n.x,n.y,3,0,Math.PI*2);ctx.fillStyle='rgba(20,20,19,0.18)';ctx.fill();}});
if(hov){ctx.beginPath();ctx.moveTo(mx,my);var ex=mx+(hov.x-mx)*0.3,ey=my+(hov.y-my)*0.3;ctx.quadraticCurveTo(ex,ey,hov.x,hov.y);ctx.strokeStyle='rgba(217,119,87,0.14)';ctx.lineWidth=1;ctx.setLineDash([3,5]);ctx.stroke();ctx.setLineDash([]);}
if(mx>0&&mx<W&&my>0&&my<H){ctx.beginPath();ctx.arc(mx,my,4,0,Math.PI*2);ctx.fillStyle='rgba(20,20,19,0.55)';ctx.fill();ctx.beginPath();ctx.arc(mx,my,9,0,Math.PI*2);ctx.strokeStyle='rgba(20,20,19,0.12)';ctx.lineWidth=0.5;ctx.stroke();}
if(hov&&hov!==activeNode){activeNode=hov;revealedSet[hov.l1]=true;showNode(hov);}}
function showNode(n){document.getElementById('pl').textContent='Your strength -> '+n.d4;document.getElementById('pn').textContent=n.name;document.getElementById('pd').textContent=n.desc;document.getElementById('pins').textContent=n.insight;document.getElementById('panc').textContent=n.anchor;var tw=document.getElementById('pt');tw.innerHTML='';n.tags.forEach(function(t){var s=document.createElement('span');s.className='tag '+t[1];s.textContent=t[0];tw.appendChild(s);});var pi=document.getElementById('pi');pi.classList.remove('show');void pi.offsetWidth;pi.classList.add('show');var c=Object.keys(revealedSet).length,h=document.getElementById('hint');if(c>=7)h.textContent='You have traced the full 4D framework - built from what you already do.';else if(c>=4)h.textContent=c+' of 8 explored.';else if(c>=1)h.textContent=c+' explored. Keep moving.';h.style.color='rgba(20,20,19,0.5)';}
window.addEventListener('load',function(){requestAnimationFrame(function(){requestAnimationFrame(function(){resize();draw();});});});
window.addEventListener('resize',resize);
if(window.ResizeObserver){new ResizeObserver(function(){resize();}).observe(field);}
</script>
</body>
</html>
