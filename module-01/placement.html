<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You already have a head start â Module 1 Â· AI Fluency for Kâ12 Educators</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f5;
  --surface:#f0eee6;
  --dark:#141413;
  --muted:rgba(20,20,19,0.5);
  --border:rgba(20,20,19,0.1);
  --coral:#d97757;
  --coral-light:rgba(217,119,87,0.1);
  --blue:#6a9bcc;
  --green:#788c5d;
  --gray:#888780;
  --serif:'Source Serif 4',Georgia,serif;
  --sans:'DM Sans',Arial,sans-serif;
}
html,body{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;font-family:var(--sans);color:var(--dark)}
.stage{width:100%;max-width:860px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:6px;overflow:hidden}
.top-bar{padding:1.5rem 2rem 0;display:flex;justify-content:space-between;align-items:center}
.eyebrow{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted)}
.badge{font-size:9px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;border:0.5px solid var(--border);color:var(--muted);padding:3px 10px;border-radius:2px}
.title-area{padding:0.75rem 2rem 0}
.headline{font-family:var(--sans);font-size:clamp(22px,3.5vw,32px);font-weight:600;color:var(--dark);line-height:1.2;margin-bottom:0.25rem;letter-spacing:-0.02em}
.subhead{font-size:13px;font-weight:400;color:var(--muted);line-height:1.5}
.field-wrap{position:relative;width:100%;height:420px;margin-top:0.5rem;cursor:none;background:var(--surface);border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border)}
canvas{display:block;width:100%;height:100%}
.panel{padding:1.25rem 2rem 1.75rem;background:var(--bg);min-height:200px}
.panel-inner{display:grid;grid-template-columns:1fr 1.8fr;gap:2rem;align-items:start;opacity:0;transition:opacity 0.35s}
.panel-inner.show{opacity:1;transform:translateY(0)}
.pleft{border-right:0.5px solid var(--border);padding-right:2rem}
.plabel{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--coral);margin-bottom:0.4rem;display:block}
.pname{font-family:var(--sans);font-size:17px;font-weight:600;color:var(--dark);margin-bottom:0.3rem;line-height:1.3;letter-spacing:-0.01em}
.pdesc{font-size:13px;font-weight:400;color:var(--muted);line-height:1.6;margin-bottom:0.75rem}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:3px 9px;border-radius:3px;border:0.5px solid}
.td{border-color:rgba(217,119,87,0.4);color:var(--coral);background:rgba(217,119,87,0.07)}
.ts{border-color:rgba(106,155,204,0.4);color:var(--blue);background:rgba(106,155,204,0.07)}
.tc{border-color:rgba(120,140,93,0.4);color:var(--green);background:rgba(120,140,93,0.07)}
.tg{border-color:rgba(136,135,128,0.4);color:var(--gray);background:rgba(136,135,128,0.07)}
.pinsight{font-family:var(--serif);font-size:16px;font-weight:400;color:var(--dark);line-height:1.75;margin-bottom:0.65rem}
.panchor{font-family:var(--sans);font-size:12px;font-weight:500;color:var(--coral);letter-spacing:0.01em}
.hint-bar{text-align:center;font-size:11px;font-weight:400;color:var(--muted);letter-spacing:0.03em;padding:0.5rem 0 1.25rem;border-top:0.5px solid var(--border);transition:color 0.5s;background:var(--surface)}
@media(max-width:540px){.panel-inner{grid-template-columns:1fr}.pleft{border-right:none;border-bottom:0.5px solid var(--border);padding-right:0;padding-bottom:1rem}.field-wrap{height:340px}}
</style>
</head>
<body>
<div class="stage">
  <div class="card">
    <div class="top-bar">
      <span class="eyebrow">AI Fluency for K&ndash;12 Educators &nbsp;&middot;&nbsp; Module 1</span>
      <span class="badge">Draft</span>
    </div>
    <div class="title-area">
      <h1 class="headline">You already have a head start.</h1>
      <p class="subhead">Move through the field. Find what sounds like your work.</p>
    </div>
    <div class="field-wrap" id="field"><canvas id="c"></canvas></div>
    <div class="panel">
      <div class="panel-inner" id="pi">
        <div class="pleft">
          <span class="plabel" id="pl"></span>
          <p class="pname" id="pn"></p>
          <p class="pdesc" id="pd"></p>
          <div class="tags" id="pt"></div>
        </div>
        <div>
          <p class="pinsight" id="pins"></p>
          <span class="panchor" id="panc"></span>
        </div>
      </div>
    </div>
    <div class="hint-bar" id="hint">Hover to explore &mdash; no path required.</div>
  </div>
</div>
<script>
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),field=document.getElementById('field');
var W=0,H=0,dpr=1,mx=-999,my=-999,trail=[],activeNode=null,revealedSet={};

var DARK='rgba(20,20,19,';
var CORAL='rgba(217,119,87,';

var nodes=[
  {l1:"My students always",l2:"know whatâs expected",fx:0.18,fy:0.24,
   name:"You define what good work looks like",
   desc:"Your rubrics and objectives say exactly what you mean.",
   tags:[["Description","ts"]],d4:"Description",
   nc:'rgba(106,155,204,',
   insight:"This is Description â telling AI exactly what you need. You already do it every time you write a learning target.",
   anchor:"Your lesson planning instincts are a prompting superpower."},
  {l1:"I can tell when",l2:"somethingâs off",fx:0.82,fy:0.21,
   name:"You catch what isnât working",
   desc:"You read the room and adjust before anyone falls behind.",
   tags:[["Discernment","tc"]],d4:"Discernment",
   nc:'rgba(120,140,93,',
   insight:"This is Discernment â evaluating what AI gives you. Most people skip this step. You wonât.",
   anchor:"Your instinct for âsomethingâs offâ is your most important AI skill."},
  {l1:"My feedback actually",l2:"changes the work",fx:0.5,fy:0.14,
   name:"Your feedback opens a door",
   desc:"Your comments show the path. Students know exactly what to do next.",
   tags:[["Description","ts"],["Discernment","tc"]],d4:"Inner Loop",
   nc:'rgba(183,148,100,',
   insight:"Description + Discernment work as a loop. Describe, evaluate, refine. Youâve been doing this with students your whole career.",
   anchor:"Youâve been running the inner loop your entire career."},
  {l1:"I know whatâs not",l2:"mine to share",fx:0.13,fy:0.65,
   name:"You hold student information with care",
   desc:"You know what goes in writing and what stays in the room.",
   tags:[["Diligence","tg"]],d4:"Diligence",
   nc:'rgba(136,135,128,',
   insight:"This is Diligence â owning your AI use responsibly. Your professional judgment doesnât live in the model.",
   anchor:"AI assistance doesnât transfer professional responsibility."},
  {l1:"I protect my time",l2:"for what matters",fx:0.87,fy:0.63,
   name:"You decide whatâs worth your energy",
   desc:"You guard your attention for the students and decisions that need you.",
   tags:[["Delegation","td"]],d4:"Delegation",
   nc:CORAL,
   insight:"This is Delegation â deciding what to hand off to AI and what to keep. Youâve been making this call your entire career.",
   anchor:"Every effective teacher is already a strategic delegator."},
  {l1:"I break hard things",l2:"into learnable steps",fx:0.31,fy:0.76,
   name:"You scaffold learning beautifully",
   desc:"You decompose a standard into pieces students can actually climb.",
   tags:[["Description","ts"],["Delegation","td"]],d4:"Description + Delegation",
   nc:'rgba(140,148,118,',
   insight:"Decomposing a task for a student and for AI are the same skill. Your scaffolding instincts transfer directly.",
   anchor:"Teaching is task design. Prompting is task design."},
  {l1:"My name is on it,",l2:"so I make sure itâs right",fx:0.68,fy:0.79,
   name:"You stand behind what you send",
   desc:"When something goes out under your name, youâve made sure itâs right.",
   tags:[["Diligence","tg"],["Delegation","td"]],d4:"Diligence",
   nc:'rgba(197,155,128,',
   insight:"AI helps you move faster â but youâre the one who stands behind everything that reaches your students.",
   anchor:"The work is yours. AI is a tool in service of it."},
  {l1:"I know when to call",l2:"in the right person",fx:0.5,fy:0.51,
   name:"You recognize the edges of your knowledge",
   desc:"You know when to bring in the specialist. Thatâs a professional strength.",
   tags:[["Delegation","td"],["Discernment","tc"]],d4:"Delegation + Discernment",
   nc:'rgba(150,158,128,',
   insight:"Knowing what only you can do â and what AI canât â is the whole game.",
   anchor:"Knowing when not to use AI is as important as knowing when to."}
];

function resize(){
  dpr=window.devicePixelRatio||1;
  var rect=field.getBoundingClientRect();
  W=rect.width;H=rect.height;
  if(W===0||H===0){W=field.offsetWidth;H=field.offsetHeight;}
  canvas.width=Math.round(W*dpr);canvas.height=Math.round(H*dpr);
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  nodes.forEach(function(n){n.x=n.fx*W;n.y=n.fy*H;if(!n.r)n.r=26;if(n.pulse===undefined)n.pulse=Math.random()*Math.PI*2;});
}

field.addEventListener('mousemove',function(e){var r=field.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top;trail.push({x:mx,y:my,a:1,s:Math.random()*1.5+1});if(trail.length>48)trail.shift();});
field.addEventListener('mouseleave',function(){mx=-999;my=-999;});

function dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)*(x2-x1)+(y2-y1)*(y2-y1));}
function getHov(){var b=null,bd=9999;nodes.forEach(function(n){var d=dist(mx,my,n.x,n.y);if(d<bd){bd=d;b=n;}});return b&&bd<(b.r+36)?b:null;}

function draw(){
  requestAnimationFrame(draw);
  if(W===0||H===0){resize();return;}
  ctx.clearRect(0,0,W,H);

  for(var i=0;i<trail.length;i++){
    var tr=trail[i];tr.a*=0.88;if(tr.a<0.008)continue;
    ctx.beginPath();ctx.arc(tr.x,tr.y,tr.s*(i/trail.length)+0.5,0,Math.PI*2);
    ctx.fillStyle=CORAL+tr.a*0.35+')';ctx.fill();
  }

  var hov=getHov();
  nodes.forEach(function(n){
    var isH=hov===n,wasR=revealedSet[n.l1];
    var tgt=isH?44:(wasR?32:24);
    n.r=n.r+(tgt-n.r)*0.1;
    n.pulse+=0.02;
    var pls=isH?0:Math.sin(n.pulse)*2;

    if(isH||wasR){
      var grd=ctx.createRadialGradient(n.x,n.y,n.r*0.4,n.x,n.y,n.r+20);
      grd.addColorStop(0,n.nc+(isH?0.2:0.08)+')');
      grd.addColorStop(1,n.nc+'0)');
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+20+pls,0,Math.PI*2);
      ctx.fillStyle=grd;ctx.fill();
    }

    ctx.beginPath();ctx.arc(n.x,n.y,n.r+pls,0,Math.PI*2);
    ctx.fillStyle=n.nc+(isH?0.85:(wasR?0.5:0.15))+')';
    ctx.fill();
    ctx.strokeStyle=isH?DARK+'0.25)':DARK+'0.06)';
    ctx.lineWidth=0.5;ctx.stroke();

    if(isH||wasR){
      ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
      var lh=16,yS=n.y-lh/2;
      [n.l1,n.l2].forEach(function(ln,li){
        ctx.font=(isH?'500 12.5px':'400 11.5px')+' "DM Sans",Arial,sans-serif';
        ctx.fillStyle=isH?DARK+'0.9)':DARK+'0.45)';
        ctx.fillText(ln,n.x,yS+li*lh);
      });
      if(isH){
        ctx.font='600 8.5px "DM Sans",Arial,sans-serif';
        ctx.fillStyle=CORAL+'0.75)';
        ctx.letterSpacing='0.1em';
        ctx.fillText(n.d4.toUpperCase(),n.x,n.y+n.r+15);
      }
      ctx.restore();
    } else {
      ctx.beginPath();ctx.arc(n.x,n.y,3,0,Math.PI*2);
      ctx.fillStyle=DARK+'0.18)';ctx.fill();
    }
  });

  if(hov){
    ctx.beginPath();ctx.moveTo(mx,my);
    var ex=mx+(hov.x-mx)*0.3,ey=my+(hov.y-my)*0.3;
    ctx.quadraticCurveTo(ex,ey,hov.x,hov.y);
    ctx.strokeStyle=CORAL+'0.18)';ctx.lineWidth=1;
    ctx.setLineDash([3,5]);ctx.stroke();ctx.setLineDash([]);
  }

  if(mx>0&&mx<W&&my>0&&my<H){
    ctx.beginPath();ctx.arc(mx,my,4,0,Math.PI*2);
    ctx.fillStyle=DARK+'0.55)';ctx.fill();
    ctx.beginPath();ctx.arc(mx,my,9,0,Math.PI*2);
    ctx.strokeStyle=DARK+'0.12)';ctx.lineWidth=0.5;ctx.stroke();
  }

  if(hov&&hov!==activeNode){activeNode=hov;revealedSet[hov.l1]=true;showNode(hov);}
}

function showNode(n){
  document.getElementById('pl').textContent='Your strength â '+n.d4;
  document.getElementById('pn').textContent=n.name;
  document.getElementById('pd').textContent=n.desc;
  document.getElementById('pins').textContent=n.insight;
  document.getElementById('panc').textContent=n.anchor;
  var tw=document.getElementById('pt');tw.innerHTML='';
  n.tags.forEach(function(t){var s=document.createElement('span');s.className='tag '+t[1];s.textContent=t[0];tw.appendChild(s);});
  var pi=document.getElementById('pi');pi.classList.remove('show');void pi.offsetWidth;pi.classList.add('show');
  var c=Object.keys(revealedSet).length,h=document.getElementById('hint');
  if(c>=7)h.textContent='Youâve traced the full 4D framework â built from what you already do.';
  else if(c>=4)h.textContent=c+' of 8 explored.';
  else if(c>=1)h.textContent=c+' explored. Keep moving.';
  h.style.color='rgba(20,20,19,0.5)';
}

window.addEventListener('load',function(){requestAnimationFrame(function(){requestAnimationFrame(function(){resize();draw();});});});
window.addEventListener('resize',resize);
if(window.ResizeObserver){new ResizeObserver(function(){resize();}).observe(field);}
</script>
</body>
</html>
